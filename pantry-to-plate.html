<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pantry-to-Plate · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
h2{font-size:1.1rem;margin:4px 0 10px}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.chip{background:var(--teal-tint);color:var(--teal);border-radius:999px;padding:8px 12px;font-weight:700;display:flex;align-items:center;gap:6px}
.chip button{background:none;color:var(--teal);padding:0;min-height:auto;font-size:1rem}
.quick{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.quick button{background:#f4f4f4;color:#555;font-size:.8rem;padding:8px 10px;min-height:40px;border-radius:999px}
.idea{background:var(--pink-tint);border-radius:14px;padding:18px;text-align:center}
.idea .title{font-size:1.3rem;font-weight:800;color:var(--pink);margin-bottom:6px}
.idea .how{font-weight:600}
.match{font-size:.8rem;color:var(--teal);font-weight:800;margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Pantry-to-Plate</h1>
<p class="tagline">Tell me what you've got — I'll suggest tonight's dinner. No store run needed.</p>
</header>
<p class="howto">How to use this: add a few things from your fridge or pantry, then tap "Find me dinner."</p>

<div class="card tint-teal">
<label for="ing">What's on hand?</label>
<div class="row">
<input id="ing" placeholder="e.g. eggs, rice, cheese" autocomplete="off" style="flex:1;min-width:140px">
<button class="btn-secondary" id="add">Add</button>
</div>
<div class="quick" id="quick"></div>
<div class="chips" id="chips" style="margin-top:10px"></div>
</div>

<button class="btn-primary" id="find" style="width:100%;margin-bottom:14px">🍽️ Find me dinner</button>

<div id="result"></div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-pantry';
const QUICK=['eggs','rice','pasta','chicken','cheese','beans','tortillas','potatoes','bread','ground beef','frozen veg','canned tomatoes'];
const RECIPES=[
 {n:'Fried rice',need:['rice'],plus:['eggs','frozen veg'],how:'Fry leftover rice with whatever veg and an egg. Soy sauce if you have it.'},
 {n:'Cheesy quesadillas',need:['tortillas','cheese'],plus:['beans','chicken'],how:'Cheese (and anything else) between tortillas, crisp in a pan. Done in 6 minutes.'},
 {n:'Pasta with what-you-have',need:['pasta'],plus:['canned tomatoes','cheese'],how:'Boil pasta, toss with tomatoes or just butter and cheese. Always a win.'},
 {n:'Breakfast for dinner',need:['eggs'],plus:['bread','cheese','potatoes'],how:'Scramble eggs, make toast, and call it a cozy night. Kids love it.'},
 {n:'Loaded baked potatoes',need:['potatoes'],plus:['cheese','beans','chicken'],how:'Microwave or bake potatoes, pile on toppings. Filling and cheap.'},
 {n:'Bean & cheese bowls',need:['beans'],plus:['rice','cheese','tortillas'],how:'Warm beans over rice with cheese on top. A squeeze of lime if you have it.'},
 {n:'Simple chicken & veg',need:['chicken'],plus:['frozen veg','rice','potatoes'],how:'Season chicken, pan-cook, add veg. Serve over rice or with potatoes.'},
 {n:'Taco night',need:['ground beef','tortillas'],plus:['cheese','beans'],how:'Brown the beef with any seasoning, wrap it up with cheese. Everyone\'s happy.'},
 {n:'Grilled cheese & soup',need:['bread','cheese'],plus:[],how:'Buttery grilled cheese. Pair with any canned soup or just on its own.'}
];
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return []}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}

function addIng(v){v=v.trim().toLowerCase();if(!v)return;if(!state.includes(v)){state.push(v);save();render()}}
document.getElementById('add').onclick=()=>{const el=document.getElementById('ing');addIng(el.value);el.value=''};
document.getElementById('ing').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('add').click()});

function render(){
 const q=document.getElementById('quick');q.innerHTML='';
 QUICK.forEach(item=>{if(state.includes(item))return;const b=document.createElement('button');b.textContent='+ '+item;b.onclick=()=>addIng(item);q.appendChild(b)});
 const chips=document.getElementById('chips');chips.innerHTML='';
 if(!state.length){chips.innerHTML='<span style="color:#999">Nothing added yet — that\'s okay. Tap a few above.</span>';}
 state.forEach(ing=>{
  const c=document.createElement('span');c.className='chip';c.innerHTML='<span></span><button>✕</button>';
  c.querySelector('span').textContent=ing;
  c.querySelector('button').onclick=()=>{state=state.filter(x=>x!==ing);save();render()};
  chips.appendChild(c);
 });
}
document.getElementById('find').onclick=()=>{
 const res=document.getElementById('result');
 if(!state.length){res.innerHTML='<div class="card"><div class="empty">Add a couple of ingredients first, then I\'ll find you something. 💛</div></div>';return}
 const scored=RECIPES.map(r=>{
  const haveNeed=r.need.filter(n=>state.includes(n)).length;
  const havePlus=r.plus.filter(p=>state.includes(p)).length;
  return {r,score:haveNeed*2+havePlus,full:haveNeed===r.need.length};
 }).filter(x=>x.score>0).sort((a,b)=>(b.full-a.full)||b.score-a.score);
 if(!scored.length){
  res.innerHTML='<div class="card idea"><div class="title">Eggs to the rescue 🍳</div><div class="how">No exact match, but eggs + anything = a meal. Scramble, omelette, or fried-egg-on-toast all count tonight.</div></div>';return;
 }
 const top=scored[0].r;
 res.innerHTML='<div class="card idea"><div class="title">'+top.n+'</div><div class="how">'+top.how+'</div>'
  +'<div class="match">Using what you have: '+top.need.concat(top.plus).filter(i=>state.includes(i)).join(', ')+'</div></div>'
  +'<button class="btn-ghost" id="another" style="width:100%;margin-bottom:14px">Show me another idea</button>';
 let idx=0;
 const another=document.getElementById('another');
 if(another)another.onclick=()=>{idx=(idx+1)%scored.length;const t=scored[idx].r;res.querySelector('.title').textContent=t.n;res.querySelector('.how').textContent=t.how;res.querySelector('.match').textContent='Using what you have: '+t.need.concat(t.plus).filter(i=>state.includes(i)).join(', ')};
};
document.getElementById('reset').onclick=()=>{if(confirm('Clear your ingredients?')){localStorage.removeItem(KEY);state=[];document.getElementById('result').innerHTML='';render()}};
render();
</script>
</body>
</html>
