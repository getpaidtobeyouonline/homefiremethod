<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Dinner Generator · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
h2{font-size:1.1rem;margin:4px 0 10px}
.seg{display:flex;gap:8px;margin-bottom:6px}
.seg button{flex:1;background:#f4f4f4;color:#666;font-size:.9rem}
.seg button.on{background:var(--teal);color:#fff}
.meal{background:var(--pink-tint);border-radius:14px;padding:18px;text-align:center}
.meal .name{font-size:1.4rem;font-weight:800;color:var(--pink);margin-bottom:4px}
.meal .cost{display:inline-block;background:#fff;color:var(--teal);font-weight:800;border-radius:999px;padding:4px 12px;margin-bottom:8px}
.meal .ing{font-weight:600;color:#444}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Budget Dinner Generator</h1>
<p class="tagline">Set your dollar limit and get a real, family-friendly dinner that fits.</p>
</header>
<p class="howto">How to use this: pick your budget per meal, then tap to get an idea. Tap again for another.</p>

<div class="card tint-teal">
<label>Budget for tonight's dinner</label>
<div class="seg" id="seg">
<button data-c="8" class="on">Under $8</button>
<button data-c="12">Under $12</button>
<button data-c="18">Under $18</button>
</div>
<div style="color:#1EA5B4;font-weight:700;font-size:.85rem">Feeds a family of about four. Prices are rough guides.</div>
</div>

<button class="btn-primary" id="gen" style="width:100%;margin-bottom:14px">🍲 Give me a dinner</button>

<div id="result"></div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-budget-dinner';
const MEALS=[
 {n:'Beans & rice bowls',c:5,ing:'Dried/canned beans, rice, an onion, a little cheese or salsa'},
 {n:'Pancakes for dinner',c:5,ing:'Flour, eggs, milk, a little syrup or fruit'},
 {n:'Pasta with garlic & oil',c:6,ing:'Pasta, garlic, olive oil, parmesan'},
 {n:'Baked potato bar',c:7,ing:'Potatoes, cheese, beans, whatever toppings you have'},
 {n:'Egg fried rice',c:7,ing:'Rice, eggs, frozen veg, soy sauce'},
 {n:'Grilled cheese & tomato soup',c:7,ing:'Bread, cheese, butter, a can of soup'},
 {n:'Bean & cheese quesadillas',c:8,ing:'Tortillas, beans, cheese, salsa'},
 {n:'Tuna pasta salad',c:9,ing:'Pasta, canned tuna, mayo, frozen peas'},
 {n:'Sheet-pan sausage & veg',c:11,ing:'Sausages, potatoes, any veg, olive oil'},
 {n:'Taco night',c:11,ing:'Ground beef or beans, tortillas, cheese, lettuce'},
 {n:'Chicken thighs & rice',c:12,ing:'Chicken thighs (cheap!), rice, a veg'},
 {n:'Veggie stir-fry & noodles',c:10,ing:'Noodles, frozen stir-fry veg, soy sauce, an egg'},
 {n:'Homemade pizza night',c:14,ing:'Flour or pre-made base, sauce, cheese, toppings'},
 {n:'Chili & cornbread',c:13,ing:'Ground beef or beans, canned tomatoes, beans, cornbread mix'},
 {n:'Roast chicken dinner',c:17,ing:'Whole chicken, potatoes, carrots — leftovers for lunch!'},
 {n:'Beef & broccoli over rice',c:16,ing:'Thin beef, broccoli, rice, soy-garlic sauce'}
];
let cap=8,lastIdx=-1;
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{cap:8}}catch(e){return {cap:8}}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
cap=state.cap||8;
document.querySelectorAll('#seg button').forEach(b=>{
 if(+b.dataset.c===cap)b.classList.add('on');else b.classList.remove('on');
 b.onclick=()=>{cap=+b.dataset.c;state.cap=cap;save();document.querySelectorAll('#seg button').forEach(x=>x.classList.toggle('on',x===b))};
});
document.getElementById('gen').onclick=()=>{
 const opts=MEALS.filter(m=>m.c<=cap);
 if(!opts.length)return;
 let idx;do{idx=Math.floor(Math.random()*opts.length)}while(opts.length>1&&opts[idx].n===lastName);
 lastName=opts[idx].n;
 const m=opts[idx];
 document.getElementById('result').innerHTML='<div class="card meal"><div class="name">'+m.n+'</div><div class="cost">≈ $'+m.c+'</div><div class="ing">'+m.ing+'</div></div>';
};
let lastName='';
document.getElementById('reset').onclick=()=>{localStorage.removeItem(KEY);state={cap:8};cap=8;document.querySelectorAll('#seg button').forEach(x=>x.classList.toggle('on',+x.dataset.c===8));document.getElementById('result').innerHTML=''};
</script>
</body>
</html>
