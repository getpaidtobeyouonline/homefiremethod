<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>$0 Activity Generator · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
h2{font-size:1.05rem;margin:4px 0 10px}
.seg{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.seg button{flex:1;min-width:80px;background:#f4f4f4;color:#666;font-size:.85rem}
.seg button.on{background:var(--teal);color:#fff}
.idea{background:var(--pink-tint);border-radius:14px;padding:22px 18px;text-align:center}
.idea .e{font-size:2.6rem}
.idea .t{font-size:1.35rem;font-weight:800;color:var(--pink);margin:6px 0}
.idea .d{font-weight:600;color:#555}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>$0 Activity Generator</h1>
<p class="tagline">A free family activity, matched to your weather and your kids' ages.</p>
</header>
<p class="howto">How to use this: pick today's weather and age range, then tap for a free idea. Tap again for more.</p>

<div class="card tint-teal">
<label>What's the weather?</label>
<div class="seg" id="weather">
<button data-w="sunny" class="on">☀️ Sunny</button>
<button data-w="rainy">🌧️ Rainy</button>
<button data-w="cold">❄️ Cold</button>
</div>
<label>Kids' ages</label>
<div class="seg" id="ages">
<button data-a="little" class="on">Littles (2–5)</button>
<button data-a="big">Big kids (6–12)</button>
<button data-a="mixed">Mixed ages</button>
</div>
</div>

<button class="btn-primary" id="go" style="width:100%;margin-bottom:14px">🎲 Give me an idea</button>

<div id="result"></div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-activity-gen';
const IDEAS={
 sunny:[['🫧','Bubble chase','Blow bubbles and let them pop and run. Endless giggles.'],['🌳','Nature scavenger hunt','Find a leaf, a rock, something red, something soft.'],['🏃','Backyard obstacle course','Pillows, chairs, hula hoops — race and time each other.'],['🎨','Sidewalk chalk art','Draw a hopscotch, a road for toy cars, or a giant family mural.'],['🧺','Picnic on a blanket','Lunch outside tastes better. Even peanut-butter sandwiches.'],['💧','Water play','Cups, a bucket, a sponge. Wash toys or "paint" the fence with water.']],
 rainy:[['🏰','Blanket fort','Couch cushions + sheets = a fort and an afternoon.'],['🍪','Bake something simple','Cookies or mug cake. Let them stir and lick the spoon.'],['🎭','Indoor dance party','Loud music, silly moves, get the wiggles out.'],['🧩','Puzzle or card games','Dig out a puzzle or play Go Fish / Snap together.'],['📚','Library at home','Build a reading nook and read together by "campfire" flashlight.'],['🎨','Box city','Cardboard boxes become a car, a house, a robot. Decorate away.']],
 cold:[['☕','Hot-cocoa story time','Cocoa, blankets, and a stack of favorite books.'],['🧦','Sock skating','Smooth floor + socks = an indoor ice rink. Slide away.'],['🎬','Homemade movie afternoon','Pick a film, make popcorn, dim the lights — cinema at home.'],['🖍️','Window art','Draw on windows with washable markers or paper snowflakes.'],['🧶','Build & balance','Tower-building with blocks, cups, or canned goods.'],['🍲','Cook together','Make soup or "stone soup" and everyone adds an ingredient.']]
};
let w='sunny',a='little';
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{w:'sunny',a:'little'}}catch(e){return {w:'sunny',a:'little'}}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
w=state.w;a=state.a;
function setupSeg(id,key,setter){
 document.querySelectorAll('#'+id+' button').forEach(b=>{
  const val=b.dataset.w||b.dataset.a;
  if(val===state[key])b.classList.add('on');else b.classList.remove('on');
  b.onclick=()=>{state[key]=val;setter(val);save();document.querySelectorAll('#'+id+' button').forEach(x=>x.classList.toggle('on',x===b))};
 });
}
setupSeg('weather','w',v=>w=v);
setupSeg('ages','a',v=>a=v);
let last='';
document.getElementById('go').onclick=()=>{
 const pool=IDEAS[w];let pick;do{pick=pool[Math.floor(Math.random()*pool.length)]}while(pool.length>1&&pick[1]===last);
 last=pick[1];
 document.getElementById('result').innerHTML='<div class="card idea"><div class="e">'+pick[0]+'</div><div class="t">'+pick[1]+'</div><div class="d">'+pick[2]+'</div></div>';
};
document.getElementById('reset').onclick=()=>{localStorage.removeItem(KEY);state={w:'sunny',a:'little'};w='sunny';a='little';setupSeg('weather','w',v=>w=v);setupSeg('ages','a',v=>a=v);document.getElementById('result').innerHTML=''};
</script>
</body>
</html>
