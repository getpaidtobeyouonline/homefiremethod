<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Junk Drawer Rescue · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
.step{font-size:1.2rem;font-weight:800;color:var(--ink);margin-bottom:6px}
.stepnum{color:var(--teal);font-weight:800}
.steptxt{font-size:1.05rem;margin-bottom:14px}
.bigq{font-size:1.15rem;font-weight:800;text-align:center;margin:10px 0 16px}
.win{background:var(--teal-tint);border-radius:12px;padding:16px;text-align:center;font-weight:700;color:var(--teal)}
.dots{display:flex;gap:8px;justify-content:center;margin-bottom:14px}
.dots i{width:12px;height:12px;border-radius:50%;background:#ddd}
.dots i.on{background:var(--pink)}
.dots i.done{background:var(--teal)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid2 button{width:100%}
h2{font-size:1.1rem;margin:4px 0 10px}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Junk Drawer Rescue</h1>
<p class="tagline">One drawer, shelf, or surface — rescued in a few calm steps.</p>
</header>
<p class="howto">How to use this: pick one small spot, then tap through. We'll guide every step.</p>

<div class="card tint-pink">
<label for="spot">What are we rescuing today?</label>
<input id="spot" placeholder="e.g. the kitchen junk drawer" autocomplete="off">
</div>

<div class="card">
<div class="dots" id="dots"></div>
<div id="stage"></div>
</div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-junk-drawer';
const STEPS=[
 {h:'Empty it out',t:'Tip everything onto a towel or table. Yes, all of it. Seeing it is half the battle — and you\'re already doing it.'},
 {h:'Toss the obvious',t:'Trash, dead pens, random wrappers, anything broken. Quick yes/no — if it\'s clearly junk, let it go.'},
 {h:'Make a "doesn\'t live here" pile',t:'Things that belong in another room. Don\'t walk them over yet — just pile them. We\'ll do that at the end.'},
 {h:'Group the keepers',t:'Batteries with batteries, tape with tape. Little groups, no fancy organizing needed.'},
 {h:'Wipe the empty space',t:'A quick swipe with a cloth. The drawer\'s never this clean — enjoy it for a second.'},
 {h:'Put keepers back, loosely',t:'Place groups back in. A spare box or cut-down container as a divider is a bonus, not a must.'},
 {h:'Rehome the stray pile',t:'Now carry the "doesn\'t live here" pile around and drop things off. Done!'}
];
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{spot:'',i:0}}catch(e){return {spot:'',i:0}}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}

const spot=document.getElementById('spot');
spot.value=state.spot||'';
spot.oninput=()=>{state.spot=spot.value;save()};

function render(){
 const dots=document.getElementById('dots');dots.innerHTML='';
 STEPS.forEach((s,i)=>{const d=document.createElement('i');d.className=i<state.i?'done':(i===state.i?'on':'');dots.appendChild(d)});
 const st=document.getElementById('stage');
 if(state.i>=STEPS.length){
  st.innerHTML='<div class="win">✓ '+ (state.spot?escape(state.spot):'That spot') +' is rescued.<br>One calm corner in your home. That\'s a genuine win. 💛</div>'
   +'<div class="row" style="margin-top:14px"><button class="btn-secondary" id="again" style="flex:1">Rescue another spot</button></div>';
  document.getElementById('again').onclick=()=>{state.i=0;state.spot='';spot.value='';save();render()};
  return;
 }
 const s=STEPS[state.i];
 st.innerHTML='<div class="step"><span class="stepnum">Step '+(state.i+1)+' of '+STEPS.length+'</span></div>'
  +'<div class="bigq">'+s.h+'</div>'
  +'<div class="steptxt">'+s.t+'</div>'
  +'<div class="grid2">'
  +(state.i>0?'<button class="btn-ghost" id="back">Back</button>':'<button class="btn-ghost" id="back" disabled style="opacity:.5">Back</button>')
  +'<button class="btn-primary" id="next">'+(state.i===STEPS.length-1?'Finish ✓':'Done — next')+'</button>'
  +'</div>';
 document.getElementById('next').onclick=()=>{state.i++;save();render()};
 const b=document.getElementById('back');if(b&&!b.disabled)b.onclick=()=>{state.i--;save();render()};
}
function escape(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
document.getElementById('reset').onclick=()=>{if(confirm('Start over from step one?')){localStorage.removeItem(KEY);state={spot:'',i:0};spot.value='';render()}};
render();
</script>
</body>
</html>
