<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The "Done List" · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
h2{font-size:1.05rem;margin:4px 0 10px}
.item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f3f3f3}
.item:last-child{border-bottom:none}
.item .tick{color:var(--teal);font-size:1.3rem}
.item span{flex:1;font-weight:600}
.del{background:none;color:var(--muted);font-size:.85rem;padding:4px;min-height:auto}
.count{text-align:center;font-size:1.1rem;font-weight:800;color:var(--pink)}
.ideas{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.ideas button{background:#f4f4f4;color:#555;font-size:.8rem;padding:8px 10px;min-height:40px;border-radius:999px}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>The "Done List"</h1>
<p class="tagline">Forget the to-do list. Today, let's celebrate everything you actually DID.</p>
</header>
<p class="howto">How to use this: jot down anything you got done today — yes, "kept everyone alive" absolutely counts.</p>

<div class="card tint-teal">
<label for="add">What did you do today?</label>
<div class="row">
<input id="add" placeholder="e.g. Made breakfast, did a load of laundry" autocomplete="off" style="flex:1;min-width:150px">
<button class="btn-secondary" id="addBtn">Add ✓</button>
</div>
<div class="ideas" id="ideas"></div>
</div>

<div class="card">
<div class="count" id="count"></div>
<div id="list"></div>
</div>

<button class="btn-ghost" id="reset" style="width:100%">Start fresh for a new day</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-done-list';
const IDEAS=['Got everyone fed','Survived the morning','Showed up','Did some laundry','Answered the hard questions','Gave a hug','Kept the plates spinning','Took a breath'];
let state=load();
function load(){try{const s=JSON.parse(localStorage.getItem(KEY));if(s&&s.date===today())return s}catch(e){}return {date:today(),items:[]}}
function today(){return new Date().toISOString().slice(0,10)}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}

function add(t){if(!t)return;state.items.unshift({id:Date.now()+Math.random(),t});save();render()}
document.getElementById('addBtn').onclick=()=>{const el=document.getElementById('add');add(el.value.trim());el.value=''};
document.getElementById('add').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('addBtn').click()});
function render(){
 const ideas=document.getElementById('ideas');ideas.innerHTML='';
 IDEAS.forEach(t=>{const b=document.createElement('button');b.textContent='+ '+t;b.onclick=()=>add(t);ideas.appendChild(b)});
 const list=document.getElementById('list');list.innerHTML='';
 if(!state.items.length){list.innerHTML='<div class="empty">Nothing added yet — but you\'ve done more than you think. Add your first win when you\'re ready.</div>';document.getElementById('count').textContent='';return}
 document.getElementById('count').textContent='🎉 '+state.items.length+' thing'+(state.items.length>1?'s':'')+' done today!';
 state.items.forEach(it=>{
  const r=document.createElement('div');r.className='item';
  r.innerHTML='<span class="tick">✓</span><span></span><button class="del">✕</button>';
  r.querySelector('span:nth-child(2)').textContent=it.t;
  r.querySelector('.del').onclick=()=>{state.items=state.items.filter(x=>x.id!==it.id);save();render()};
  list.appendChild(r);
 });
}
document.getElementById('reset').onclick=()=>{if(confirm('Start a fresh list for today?')){localStorage.removeItem(KEY);state={date:today(),items:[]};render()}};
render();
</script>
</body>
</html>
