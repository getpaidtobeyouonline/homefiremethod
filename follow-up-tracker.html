<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Follow-Up Tracker · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
h2{font-size:1.05rem;margin:4px 0 10px}
.lead{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #f3f3f3}
.lead:last-child{border-bottom:none}
.lead.done{opacity:.5}
.lead input[type=checkbox]{width:26px;height:26px;min-height:26px;accent-color:var(--teal)}
.lead .mid{flex:1}
.lead .nm{font-weight:700}
.lead.done .nm{text-decoration:line-through}
.lead .sub{font-size:.82rem;color:#888}
.lead .due{font-size:.72rem;font-weight:800;padding:2px 8px;border-radius:999px;background:var(--teal-tint);color:var(--teal)}
.lead .due.now{background:var(--pink-tint);color:var(--pink)}
.del{background:none;color:var(--muted);font-size:.78rem;padding:4px;min-height:auto}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Follow-Up Tracker</h1>
<p class="tagline">The fortune's in the follow-up — never forget to circle back on a sale or lead.</p>
</header>
<p class="howto">How to use this: log each person to follow up with and when. We'll flag who's due today.</p>

<div class="card tint-teal">
<label for="nm">Add a follow-up</label>
<input id="nm" placeholder="Who? e.g. Sarah — bracelet order" autocomplete="off">
<div class="row" style="margin-top:10px">
<input id="note" placeholder="Note (optional)" autocomplete="off" style="flex:1;min-width:120px">
<input id="when" type="date" style="flex:1;min-width:130px">
<button class="btn-secondary" id="add">Add</button>
</div>
</div>

<div class="card">
<h2>To follow up</h2>
<div id="open"></div>
</div>

<div class="card">
<h2>Done ✓</h2>
<div id="done"></div>
</div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-followup';
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return []}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
document.getElementById('add').onclick=()=>{
 const nm=document.getElementById('nm').value.trim();if(!nm){document.getElementById('nm').focus();return}
 state.push({id:Date.now(),nm,note:document.getElementById('note').value.trim(),when:document.getElementById('when').value,done:false});
 document.getElementById('nm').value='';document.getElementById('note').value='';document.getElementById('when').value='';
 save();render();
};
function render(){
 const open=document.getElementById('open'),done=document.getElementById('done');open.innerHTML='';done.innerHTML='';
 const today=new Date();today.setHours(0,0,0,0);
 const o=state.filter(l=>!l.done).sort((a,b)=>(a.when||'9').localeCompare(b.when||'9'));
 const d=state.filter(l=>l.done);
 if(!o.length)open.innerHTML='<div class="empty">All caught up — nobody waiting. Lovely. ✓</div>';
 o.forEach(l=>open.appendChild(row(l,today)));
 if(!d.length)done.innerHTML='<div class="empty" style="padding:12px">Completed follow-ups rest here.</div>';
 d.forEach(l=>done.appendChild(row(l,today)));
}
function row(l,today){
 const el=document.createElement('div');el.className='lead'+(l.done?' done':'');
 let due='';
 if(l.when){const dt=new Date(l.when+'T00:00:00');const days=Math.round((dt-today)/86400000);const now=days<=0&&!l.done;due='<span class="due'+(now?' now':'')+'">'+(days<0?'overdue':days===0?'today':days===1?'tomorrow':MON[dt.getMonth()]+' '+dt.getDate())+'</span>'}
 el.innerHTML='<input type="checkbox" '+(l.done?'checked':'')+'><div class="mid"><div class="nm"></div><div class="sub">'+(l.note?esc(l.note):'')+'</div>'+due+'</div><button class="del">✕</button>';
 el.querySelector('.nm').textContent=l.nm;
 el.querySelector('input').onchange=e=>{l.done=e.target.checked;save();render()};
 el.querySelector('.del').onclick=()=>{state=state.filter(x=>x.id!==l.id);save();render()};
 return el;
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
document.getElementById('reset').onclick=()=>{if(confirm('Clear all follow-ups?')){localStorage.removeItem(KEY);state=[];render()}};
render();
</script>
</body>
</html>
