<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cash Envelope Calculator · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
h2{font-size:1.1rem;margin:4px 0 10px}
.env{border:2px solid #f0f0f0;border-radius:12px;padding:12px;margin-bottom:10px;background:var(--teal-tint);border-color:#cfeef1}
.env .top{display:flex;justify-content:space-between;align-items:center}
.env .nm{font-weight:800}
.env .bal{font-weight:800;color:var(--teal);font-size:1.2rem}
.env.empty-env{background:var(--pink-tint);border-color:#f9d6e6}
.env.empty-env .bal{color:var(--pink)}
.env .ebtns{display:flex;gap:8px;margin-top:8px}
.env .ebtns button{flex:1;font-size:.82rem;padding:9px}
.alloc{color:#666;font-size:.82rem;font-weight:700}
.del{background:none;color:var(--muted);font-size:.8rem;padding:4px;min-height:auto}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Cash Envelope Calculator</h1>
<p class="tagline">Split your budget into digital cash envelopes — spend from them and always know what's left.</p>
</header>
<p class="howto">How to use this: make an envelope for each spending area, fill it, then log spending as you go.</p>

<div class="card tint-pink">
<label for="ename">New envelope</label>
<input id="ename" placeholder="e.g. Groceries, Gas, Fun" autocomplete="off">
<div class="row" style="margin-top:10px">
<input id="estart" type="number" inputmode="decimal" min="0" placeholder="Starting amount" style="flex:1;min-width:130px">
<button class="btn-primary" id="add">Add</button>
</div>
</div>

<div class="card">
<h2>Total across envelopes: <span id="total" style="color:var(--teal)">$0</span></h2>
<div id="list"></div>
</div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-envelopes';
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return []}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function money(n){return '$'+(n||0).toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:2})}

document.getElementById('add').onclick=()=>{
 const n=document.getElementById('ename'),s=document.getElementById('estart');
 const nm=n.value.trim(),amt=parseFloat(s.value)||0;
 if(!nm){alert('Give your envelope a name 💛');return}
 state.push({id:Date.now(),nm,start:amt,bal:amt});n.value='';s.value='';save();render();
};
function render(){
 const list=document.getElementById('list');list.innerHTML='';
 if(!state.length){list.innerHTML='<div class="empty">No envelopes yet — and that\'s perfectly okay. Add your first when you\'re ready.</div>';}
 let total=0;
 state.forEach(e=>{
  total+=e.bal;
  const empty=e.bal<=0;
  const d=document.createElement('div');d.className='env'+(empty?' empty-env':'');
  d.innerHTML='<div class="top"><span class="nm"></span><span class="bal">'+money(e.bal)+'</span></div>'
   +'<div class="alloc">Started with '+money(e.start)+(empty?' · all spent — and that\'s the plan working!':'')+'</div>'
   +'<div class="ebtns"><button class="btn-ghost spend">Spend</button><button class="btn-ghost fill">Add cash</button><button class="del">✕</button></div>';
  d.querySelector('.nm').textContent=e.nm;
  d.querySelector('.spend').onclick=()=>{const v=parseFloat(prompt('How much did you spend from '+e.nm+'?'));if(v>0){e.bal=Math.round((e.bal-v)*100)/100;save();render()}};
  d.querySelector('.fill').onclick=()=>{const v=parseFloat(prompt('How much to add to '+e.nm+'?'));if(v>0){e.bal=Math.round((e.bal+v)*100)/100;e.start+=v;save();render()}};
  d.querySelector('.del').onclick=()=>{state=state.filter(x=>x.id!==e.id);save();render()};
  list.appendChild(d);
 });
 document.getElementById('total').textContent=money(total);
}
document.getElementById('reset').onclick=()=>{if(confirm('Clear all envelopes?')){localStorage.removeItem(KEY);state=[];render()}};
render();
</script>
</body>
</html>
