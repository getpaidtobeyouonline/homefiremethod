<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Appointment Reminder Hub · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
h2{font-size:1.1rem;margin:4px 0 10px}
.appt{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #f3f3f3}
.appt:last-child{border-bottom:none}
.appt .date{width:58px;flex:0 0 auto;border-radius:12px;background:var(--teal-tint);color:var(--teal);text-align:center;padding:6px 0;font-weight:800;line-height:1.1}
.appt .date small{display:block;font-size:.6rem}
.appt .date.soon{background:var(--pink-tint);color:var(--pink)}
.appt .mid{flex:1}
.appt .nm{font-weight:700}
.appt .sub{font-size:.82rem;color:#888}
.del{background:none;color:var(--muted);font-size:.78rem;padding:4px;min-height:auto}
.countdown{font-size:.72rem;font-weight:800;color:var(--teal)}
.countdown.soon{color:var(--pink)}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Appointment Reminder Hub</h1>
<p class="tagline">Every doctor, dentist, and school date in one calm list — counted down for you.</p>
</header>
<p class="howto">How to use this: add each appointment with its date. We sort them and show what's coming soon.</p>

<div class="card tint-teal">
<label for="what">Add an appointment</label>
<input id="what" placeholder="e.g. Dentist — Maya" autocomplete="off">
<div class="row" style="margin-top:10px">
<input id="who" placeholder="With whom / where" autocomplete="off" style="flex:1;min-width:120px">
<input id="date" type="date" style="flex:1;min-width:130px">
<input id="time" type="time" style="flex:1;min-width:110px">
</div>
<button class="btn-secondary" id="add" style="width:100%;margin-top:10px">Add</button>
</div>

<div class="card">
<h2>Coming up</h2>
<div id="list"></div>
</div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-appointments';
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return []}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmtTime(t){if(!t)return '';const[h,m]=t.split(':');const hh=+h%12||12;return hh+':'+m+(+h<12?'am':'pm')}

document.getElementById('add').onclick=()=>{
 const what=document.getElementById('what').value.trim();const date=document.getElementById('date').value;
 if(!what||!date){alert('Add what it\'s for and the date 💛');return}
 state.push({id:Date.now(),what,who:document.getElementById('who').value.trim(),date,time:document.getElementById('time').value});
 document.getElementById('what').value='';document.getElementById('who').value='';document.getElementById('time').value='';
 save();render();
};
function render(){
 const list=document.getElementById('list');list.innerHTML='';
 const today=new Date();today.setHours(0,0,0,0);
 const upcoming=state.filter(a=>new Date(a.date+'T23:59')>=today).sort((a,b)=>a.date.localeCompare(b.date)||(a.time||'').localeCompare(b.time||''));
 if(!upcoming.length){list.innerHTML='<div class="empty">Nothing on the calendar — and that\'s perfectly okay. Add an appointment when you need to.</div>';return}
 upcoming.forEach(a=>{
  const d=new Date(a.date+'T00:00:00');
  const days=Math.round((d-today)/86400000);
  const soon=days<=3;
  const row=document.createElement('div');row.className='appt';
  let cd=days===0?'Today':days===1?'Tomorrow':'in '+days+' days';
  row.innerHTML='<div class="date'+(soon?' soon':'')+'"><small>'+MON[d.getMonth()]+'</small>'+d.getDate()+'</div>'
   +'<div class="mid"><div class="nm"></div><div class="sub">'+(a.time?fmtTime(a.time)+' · ':'')+(a.who?esc(a.who):'')+'</div><span class="countdown'+(soon?' soon':'')+'">'+cd+'</span></div>'
   +'<button class="del">✕</button>';
  row.querySelector('.nm').textContent=a.what;
  row.querySelector('.del').onclick=()=>{state=state.filter(x=>x.id!==a.id);save();render()};
  list.appendChild(row);
 });
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
document.getElementById('date').value=new Date().toISOString().slice(0,10);
document.getElementById('reset').onclick=()=>{if(confirm('Clear all appointments?')){localStorage.removeItem(KEY);state=[];render()}};
render();
</script>
</body>
</html>
