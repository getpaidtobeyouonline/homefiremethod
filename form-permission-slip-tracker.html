<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form & Permission Slip Tracker · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
h2{font-size:1.1rem;margin:4px 0 10px}
.form{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #f3f3f3}
.form:last-child{border-bottom:none}
.form.done{opacity:.55}
.form input[type=checkbox]{width:28px;height:28px;min-height:28px;accent-color:var(--teal);flex:0 0 auto}
.form .mid{flex:1}
.form .nm{font-weight:700}
.form.done .nm{text-decoration:line-through}
.form .sub{font-size:.82rem;color:#888}
.form .due{font-size:.72rem;font-weight:800;padding:2px 8px;border-radius:999px;background:var(--teal-tint);color:var(--teal)}
.form .due.soon{background:var(--pink-tint);color:var(--pink)}
.del{background:none;color:var(--muted);font-size:.78rem;padding:4px;min-height:auto}
.tally{text-align:center;font-weight:800;color:var(--pink)}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Form & Permission Slip Tracker</h1>
<p class="tagline">Never lose another school form — log it the second it comes home.</p>
</header>
<p class="howto">How to use this: add each form with its due date. Tick it the moment it's signed and back in the bag.</p>

<div class="card tint-teal">
<label for="what">Add a form</label>
<input id="what" placeholder="e.g. Field trip slip — Leo" autocomplete="off">
<div class="row" style="margin-top:10px">
<input id="kid" placeholder="Which child / class" autocomplete="off" style="flex:1;min-width:120px">
<input id="due" type="date" style="flex:1;min-width:130px">
</div>
<button class="btn-secondary" id="add" style="width:100%;margin-top:10px">Add</button>
</div>

<div class="card">
<h2>To handle</h2>
<div class="tally" id="tally"></div>
<div id="open"></div>
</div>

<div class="card">
<h2>Done ✓</h2>
<div id="done"></div>
</div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-forms';
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return []}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

document.getElementById('add').onclick=()=>{
 const what=document.getElementById('what').value.trim();if(!what){document.getElementById('what').focus();return}
 state.push({id:Date.now(),what,kid:document.getElementById('kid').value.trim(),due:document.getElementById('due').value,done:false});
 document.getElementById('what').value='';document.getElementById('kid').value='';document.getElementById('due').value='';
 save();render();
};
function render(){
 const open=document.getElementById('open'),done=document.getElementById('done');
 open.innerHTML='';done.innerHTML='';
 const today=new Date();today.setHours(0,0,0,0);
 const o=state.filter(f=>!f.done).sort((a,b)=>(a.due||'9').localeCompare(b.due||'9'));
 const d=state.filter(f=>f.done);
 if(!o.length)open.innerHTML='<div class="empty">All caught up — nothing waiting. Wonderful. ✓</div>';
 document.getElementById('tally').textContent=o.length?o.length+' form'+(o.length>1?'s':'')+' to sign':'';
 o.forEach(f=>open.appendChild(row(f,today)));
 if(!d.length)done.innerHTML='<div class="empty" style="padding:12px">Signed forms will rest here.</div>';
 d.forEach(f=>done.appendChild(row(f,today)));
}
function row(f,today){
 const el=document.createElement('div');el.className='form'+(f.done?' done':'');
 let due='';
 if(f.due){const dt=new Date(f.due+'T00:00:00');const days=Math.round((dt-today)/86400000);const soon=days<=2&&!f.done;due='<span class="due'+(soon?' soon':'')+'">'+(days<0?'past due':days===0?'due today':days===1?'due tmrw':'due '+MON[dt.getMonth()]+' '+dt.getDate())+'</span>'}
 el.innerHTML='<input type="checkbox" '+(f.done?'checked':'')+'><div class="mid"><div class="nm"></div><div class="sub">'+(f.kid?esc(f.kid)+' · ':'')+'</div>'+due+'</div><button class="del">✕</button>';
 el.querySelector('.nm').textContent=f.what;
 el.querySelector('input').onchange=e=>{f.done=e.target.checked;save();render()};
 el.querySelector('.del').onclick=()=>{state=state.filter(x=>x.id!==f.id);save();render()};
 return el;
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
document.getElementById('reset').onclick=()=>{if(confirm('Clear all forms?')){localStorage.removeItem(KEY);state=[];render()}};
render();
</script>
</body>
</html>
