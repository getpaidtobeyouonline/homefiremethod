<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debt Snowball Tracker · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
h2{font-size:1.1rem;margin:4px 0 10px}
.focus{text-align:center}
.focus .lbl{color:#a23b73;font-weight:700;font-size:.85rem}
.focus .nm{font-size:1.3rem;font-weight:800;color:var(--pink)}
.debt{padding:12px 0;border-bottom:1px solid #f3f3f3}
.debt:last-child{border-bottom:none}
.debt.paid{opacity:.6}
.debt .top{display:flex;justify-content:space-between;align-items:center}
.debt .nm{font-weight:700}.debt.paid .nm{text-decoration:line-through}
.bar{height:12px;background:#eee;border-radius:999px;overflow:hidden;margin:8px 0}
.bar>i{display:block;height:100%;background:var(--teal);width:0;transition:width .3s}
.dbtns{display:flex;gap:8px;margin-top:6px}
.dbtns button{flex:1;font-size:.82rem;padding:9px}
.badge{background:var(--teal-tint);color:var(--teal);font-weight:800;font-size:.72rem;padding:2px 8px;border-radius:999px}
.del{background:none;color:var(--muted);font-size:.8rem;padding:4px 8px;min-height:auto}
.cheer{background:var(--teal-tint);color:var(--teal);border-radius:10px;padding:8px;text-align:center;font-weight:800;margin-top:6px}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Debt Snowball Tracker</h1>
<p class="tagline">Smallest debt first — knock it out, then roll the momentum to the next.</p>
</header>
<p class="howto">How to use this: add what you owe. We line them up smallest-first and cheer every payoff.</p>

<div class="card tint-pink focus">
<div class="lbl">Your focus right now</div>
<div class="nm" id="focus">Add a debt to begin</div>
<div id="focusSub" style="font-weight:700;color:#a23b73"></div>
</div>

<div class="card tint-teal">
<label for="dname">Add a debt</label>
<input id="dname" placeholder="e.g. Credit card, Store card" autocomplete="off">
<div class="row" style="margin-top:10px">
<input id="dbal" type="number" inputmode="decimal" min="1" step="1" placeholder="Balance" style="flex:1;min-width:120px">
<button class="btn-secondary" id="add">Add</button>
</div>
</div>

<div class="card">
<h2>Your debts, smallest first</h2>
<div id="list"></div>
</div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-snowball';
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return []}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function money(n){return '$'+(n||0).toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:2})}

document.getElementById('add').onclick=()=>{
 const n=document.getElementById('dname'),b=document.getElementById('dbal');
 const nm=n.value.trim(),bal=parseFloat(b.value);
 if(!nm||!bal||bal<=0){alert('Add a name and balance 💛');return}
 state.push({id:Date.now(),nm,start:bal,bal});n.value='';b.value='';save();render();
};
function render(){
 const active=state.filter(d=>d.bal>0).sort((a,b)=>a.bal-b.bal);
 const fc=document.getElementById('focus'),fs=document.getElementById('focusSub');
 if(!state.length){fc.textContent='Add a debt to begin';fs.textContent='';}
 else if(!active.length){fc.textContent='🎉 All paid off!';fs.textContent='You did this. Genuinely incredible.';}
 else {fc.textContent=active[0].nm;fs.textContent=money(active[0].bal)+' to go — you\'ve got this one.';}
 const list=document.getElementById('list');list.innerHTML='';
 if(!state.length){list.innerHTML='<div class="empty">Nothing here yet — and that\'s perfectly okay. Add your first when you\'re ready.</div>';return}
 const ordered=state.slice().sort((a,b)=>(a.bal<=0)-(b.bal<=0)||a.bal-b.bal);
 ordered.forEach((d,i)=>{
  const paid=d.bal<=0;const pct=Math.min(100,(d.start-d.bal)/d.start*100);
  const isFocus=!paid&&active.length&&d.id===active[0].id;
  const row=document.createElement('div');row.className='debt'+(paid?' paid':'');
  row.innerHTML='<div class="top"><span class="nm"></span>'+(paid?'<span class="badge">✓ Paid off</span>':(isFocus?'<span class="badge">Focus</span>':''))+'</div>'
   +'<div class="bar"><i style="width:'+pct+'%"></i></div>'
   +'<div class="row" style="justify-content:space-between"><small style="color:#666;font-weight:700">'+money(d.bal)+' left of '+money(d.start)+'</small><button class="del">remove</button></div>'
   +(paid?'<div class="cheer">Snowball rolling — on to the next! ❄️</div>'
     :'<div class="dbtns"><button class="btn-ghost p25">+ $25 paid</button><button class="btn-ghost p100">+ $100</button><button class="btn-secondary pX">Log payment</button></div>');
  row.querySelector('.nm').textContent=d.nm;
  row.querySelector('.del').onclick=()=>{state=state.filter(x=>x.id!==d.id);save();render()};
  if(!paid){
   row.querySelector('.p25').onclick=()=>pay(d,25);
   row.querySelector('.p100').onclick=()=>pay(d,100);
   row.querySelector('.pX').onclick=()=>{const v=parseFloat(prompt('Payment amount?'));if(v>0)pay(d,v)};
  }
  list.appendChild(row);
 });
}
function pay(d,amt){const was=d.bal;d.bal=Math.max(0,d.bal-amt);save();render();if(was>0&&d.bal===0)setTimeout(()=>alert('🎉 '+d.nm+' is PAID OFF! Take a breath and feel that win.'),100)}
document.getElementById('reset').onclick=()=>{if(confirm('Clear all debts?')){localStorage.removeItem(KEY);state=[];render()}};
render();
</script>
</body>
</html>
