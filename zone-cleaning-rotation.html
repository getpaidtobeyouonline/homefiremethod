<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zone Cleaning Rotation · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
.today{text-align:center}
.today .big{font-size:1.7rem;font-weight:800;color:var(--pink);margin:6px 0}
.task{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid #f3f3f3}
.task:last-child{border-bottom:none}
.task input[type=checkbox]{width:26px;height:26px;min-height:26px;accent-color:var(--teal);flex:0 0 auto}
.task.done span{text-decoration:line-through;color:var(--muted)}
.zone{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f3f3f3}
.zone.active{color:var(--pink);font-weight:800}
.win{background:var(--teal-tint);border-radius:12px;padding:14px;text-align:center;font-weight:700;color:var(--teal);margin-top:10px}
h2{font-size:1.1rem;margin:4px 0 10px}
.dot{width:10px;height:10px;border-radius:50%;background:#ddd;display:inline-block;margin-right:8px}
.dot.on{background:var(--pink)}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Zone Cleaning Rotation</h1>
<p class="tagline">Your home, split into easy zones — so you only think about today's.</p>
</header>
<p class="howto">How to use this: do today's zone whenever you get a pocket of time. Tomorrow rotates on its own.</p>

<div class="card tint-pink today">
<div>Today's zone is</div>
<div class="big" id="zoneName">—</div>
<div id="zoneSub" style="color:#a23b73;font-weight:700"></div>
</div>

<div class="card">
<h2>Quick wins for this zone</h2>
<div id="tasks"></div>
<div id="win"></div>
</div>

<div class="card">
<h2>This week's rotation</h2>
<div id="schedule"></div>
</div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-zone-rotation';
const ZONES=[
 {n:'Entry & Living Areas',t:['Tidy surfaces','Fluff & fold throws','Quick vacuum/sweep','Put away stray items']},
 {n:'Kitchen',t:['Wipe counters','Clear the sink','Wipe appliance fronts','Sweep the floor']},
 {n:'Bathrooms',t:['Wipe sinks','Swish toilets','Fresh towels','Empty trash']},
 {n:'Bedrooms',t:['Make beds','Clear nightstands','Put away laundry','Clear one surface']},
 {n:'Floors & Catch-alls',t:['Vacuum high-traffic','Tackle one clutter spot','Wipe a mirror','Empty bins']}
];
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
function todayIdx(){const d=new Date();return (d.getDate())%ZONES.length}

let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{}}catch(e){return {}}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function dateStamp(){return new Date().toISOString().slice(0,10)}

function curTasks(){
 const z=ZONES[todayIdx()];
 const stamp=dateStamp();
 if(!state[stamp])state[stamp]=z.t.map(()=>false);
 return {z,checks:state[stamp]};
}

function render(){
 const {z,checks}=curTasks();
 document.getElementById('zoneName').textContent=z.n;
 document.getElementById('zoneSub').textContent='A little here goes a long way.';
 const tEl=document.getElementById('tasks');tEl.innerHTML='';
 z.t.forEach((t,i)=>{
  const l=document.createElement('label');
  l.className='task'+(checks[i]?' done':'');
  l.innerHTML='<input type="checkbox" '+(checks[i]?'checked':'')+'><span></span>';
  l.querySelector('span').textContent=t;
  l.querySelector('input').onchange=e=>{checks[i]=e.target.checked;save();render()};
  tEl.appendChild(l);
 });
 const done=checks.filter(Boolean).length;
 document.getElementById('win').innerHTML = done===z.t.length
  ? '<div class="win">✓ Zone done for today. That\'s a real win — go put your feet up.</div>'
  : (done?'<div class="win">✓ '+done+' done. Whatever you finish today is plenty.</div>':'');
 const sEl=document.getElementById('schedule');sEl.innerHTML='';
 const base=new Date().getDate();
 for(let i=0;i<ZONES.length;i++){
  const idx=(base+i)%ZONES.length;
  const d=document.createElement('div');
  d.className='zone'+(i===0?' active':'');
  d.innerHTML='<span><span class="dot '+(i===0?'on':'')+'"></span>'+(i===0?'Today':'+'+i+' day'+(i>1?'s':''))+'</span><span>'+ZONES[idx].n+'</span>';
  sEl.appendChild(d);
 }
}
document.getElementById('reset').onclick=()=>{if(confirm('Clear all zone progress?')){localStorage.removeItem(KEY);state={};render()}};
render();
</script>
</body>
</html>
