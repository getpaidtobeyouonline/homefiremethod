<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Back-to-School Checklist · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.tabs button{background:#f4f4f4;color:#666;padding:9px 14px;border-radius:999px;font-size:.85rem}
.tabs button.on{background:var(--pink);color:#fff}
h2{font-size:.95rem;margin:12px 0 6px;color:var(--teal)}
.task{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #f3f3f3}
.task:last-child{border-bottom:none}
.task input[type=checkbox]{width:24px;height:24px;min-height:24px;accent-color:var(--teal)}
.task.done span{text-decoration:line-through;color:var(--muted)}
.task span{flex:1}
.del{background:none;color:var(--muted);font-size:.78rem;padding:4px;min-height:auto}
.bar{height:14px;background:#eee;border-radius:999px;overflow:hidden;margin:10px 0}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--teal),var(--pink));width:0;transition:width .3s}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Back-to-School Checklist</h1>
<p class="tagline">Supplies, forms, and shopping — tracked per kid so nobody starts the year scrambling.</p>
</header>
<p class="howto">How to use this: add each child as a tab, then tick off supplies, forms, and clothes for each.</p>

<div class="card">
<div class="tabs" id="tabs"></div>
<div class="bar"><i id="bar"></i></div>
<div id="panel"></div>
</div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-back-to-school';
const SECTIONS={
 Supplies:['Backpack','Lunchbox & water bottle','Pencils & pens','Notebooks & folders','Glue & scissors','Crayons/markers','Ruler','Headphones'],
 Forms:['Enrollment / registration','Emergency contacts','Health/immunization form','Permission slips','Free lunch application (if needed)','Photo / media consent'],
 Clothes:['New shoes','Uniform / clothes that fit','Weather-appropriate jacket','Gym/PE kit','Socks & basics']
};
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{kids:[{id:1,nm:'Child 1',checks:{}}],active:1}}catch(e){return {kids:[{id:1,nm:'Child 1',checks:{}}],active:1}}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}

function render(){
 const tabs=document.getElementById('tabs');tabs.innerHTML='';
 state.kids.forEach(k=>{const b=document.createElement('button');b.textContent=k.nm;if(k.id===state.active)b.classList.add('on');b.onclick=()=>{state.active=k.id;save();render()};b.ondblclick=()=>{const n=prompt('Rename:',k.nm);if(n){k.nm=n;save();render()}};tabs.appendChild(b)});
 const add=document.createElement('button');add.textContent='+ kid';add.onclick=()=>{const nm=prompt('Child\'s name?');if(nm){const id=Date.now();state.kids.push({id,nm,checks:{}});state.active=id;save();render()}};tabs.appendChild(add);
 const kid=state.kids.find(k=>k.id===state.active);
 const panel=document.getElementById('panel');panel.innerHTML='';
 if(!kid)return;
 let total=0,done=0;
 Object.keys(SECTIONS).forEach(sec=>{
  const h=document.createElement('h2');h.textContent=sec;panel.appendChild(h);
  SECTIONS[sec].forEach(item=>{
   const key=sec+'|'+item;total++;const checked=!!kid.checks[key];if(checked)done++;
   const l=document.createElement('label');l.className='task'+(checked?' done':'');
   l.innerHTML='<input type="checkbox" '+(checked?'checked':'')+'><span></span>';
   l.querySelector('span').textContent=item;
   l.querySelector('input').onchange=e=>{kid.checks[key]=e.target.checked;if(!e.target.checked)delete kid.checks[key];save();render()};
   panel.appendChild(l);
  });
 });
 if(state.kids.length>1){const rm=document.createElement('button');rm.className='btn-ghost';rm.style.cssText='margin-top:12px;font-size:.85rem;padding:8px 12px;min-height:auto';rm.textContent='Remove '+kid.nm;rm.onclick=()=>{if(confirm('Remove '+kid.nm+'?')){state.kids=state.kids.filter(k=>k.id!==kid.id);state.active=state.kids[0].id;save();render()}};panel.appendChild(rm)}
 document.getElementById('bar').style.width=(total?done/total*100:0)+'%';
}
document.getElementById('reset').onclick=()=>{if(confirm('Reset the whole checklist?')){localStorage.removeItem(KEY);state={kids:[{id:1,nm:'Child 1',checks:{}}],active:1};render()}};
render();
</script>
</body>
</html>
