<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zero-Based Budget Builder · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
h2{font-size:1.1rem;margin:4px 0 10px}
.big{text-align:center}
.big .lbl{color:#666;font-weight:700;font-size:.85rem}
.big .num{font-size:2.4rem;font-weight:800;line-height:1.1}
.num.zero{color:var(--teal)}.num.pos{color:var(--pink)}.num.neg{color:#e0431f}
.cat{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #f3f3f3}
.cat:last-child{border-bottom:none}
.cat .nm{flex:1;font-weight:700}
.cat input{width:110px;text-align:right}
.del{background:none;color:var(--muted);font-size:.85rem;padding:4px 8px;min-height:auto}
.msg{text-align:center;font-weight:700;margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Zero-Based Budget Builder</h1>
<p class="tagline">Give every dollar a job in a few taps — until "to assign" reaches zero.</p>
</header>
<p class="howto">How to use this: enter your monthly income, then hand each dollar a job. Zero left = every dollar has a home.</p>

<div class="card tint-teal">
<label for="income">Monthly income</label>
<input id="income" type="number" inputmode="decimal" placeholder="0.00" min="0" step="0.01">
</div>

<div class="card">
<div class="big">
<div class="lbl">Left to assign</div>
<div class="num" id="left">$0.00</div>
</div>
<div class="msg" id="msg"></div>
</div>

<div class="card">
<h2>Where it goes</h2>
<div id="cats"></div>
<div class="row" style="margin-top:12px">
<input id="newCat" placeholder="Add a category" autocomplete="off" style="flex:1;min-width:140px">
<button class="btn-secondary" id="addCat">Add</button>
</div>
</div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-zbb';
const DEFAULTS=['Housing','Groceries','Utilities','Transport','Kids','Savings','Fun money','Giving'];
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{income:0,cats:DEFAULTS.map((n,i)=>({id:i,nm:n,amt:0}))}}catch(e){return {income:0,cats:[]}}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}

const inc=document.getElementById('income');
if(state.income)inc.value=state.income;
inc.oninput=()=>{state.income=parseFloat(inc.value)||0;save();render()};

document.getElementById('addCat').onclick=()=>{const el=document.getElementById('newCat');const v=el.value.trim();if(!v)return;state.cats.push({id:Date.now(),nm:v,amt:0});el.value='';save();render()};
document.getElementById('newCat').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('addCat').click()});

function render(){
 const wrap=document.getElementById('cats');wrap.innerHTML='';
 state.cats.forEach(c=>{
  const d=document.createElement('div');d.className='cat';
  d.innerHTML='<span class="nm"></span><input type="number" inputmode="decimal" min="0" step="0.01" placeholder="0.00"><button class="del">✕</button>';
  d.querySelector('.nm').textContent=c.nm;
  const f=d.querySelector('input');if(c.amt)f.value=c.amt;
  f.oninput=()=>{c.amt=parseFloat(f.value)||0;updateLeft()};
  d.querySelector('.del').onclick=()=>{state.cats=state.cats.filter(x=>x.id!==c.id);save();render()};
  wrap.appendChild(d);
 });
 updateLeft();
}
function updateLeft(){
 const assigned=state.cats.reduce((a,c)=>a+(c.amt||0),0);
 const left=(state.income||0)-assigned;
 const el=document.getElementById('left'),msg=document.getElementById('msg');
 el.textContent=(left<0?'-$':'$')+Math.abs(left).toFixed(2);
 el.className='num '+(Math.abs(left)<0.005?'zero':left>0?'pos':'neg');
 if(!state.income)msg.textContent='',msg.style.color='';
 else if(Math.abs(left)<0.005)msg.style.color='#1EA5B4',msg.textContent='🎉 Every dollar has a job. That\'s a finished budget — beautifully done.';
 else if(left>0)msg.style.color='#F05AA5',msg.textContent='$'+left.toFixed(2)+' still to assign. Pop it toward savings or fun.';
 else msg.style.color='#e0431f',msg.textContent='You\'ve assigned a bit more than you have. Trim one category gently — you\'ve got this.';
 save();
}
document.getElementById('reset').onclick=()=>{if(confirm('Start a fresh budget?')){localStorage.removeItem(KEY);state={income:0,cats:DEFAULTS.map((n,i)=>({id:i,nm:n,amt:0}))};inc.value='';save();render()}};
render();
</script>
</body>
</html>
