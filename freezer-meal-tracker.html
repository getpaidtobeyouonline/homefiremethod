<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freezer Meal Tracker · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
h2{font-size:1.1rem;margin:4px 0 10px}
.meal{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #f3f3f3}
.meal:last-child{border-bottom:none}
.meal .mid{flex:1}
.meal .nm{font-weight:700}
.meal .sub{font-size:.82rem}
.tag{font-size:.72rem;font-weight:800;padding:2px 8px;border-radius:999px;display:inline-block}
.tag.ok{background:var(--teal-tint);color:var(--teal)}
.tag.soon{background:#fff4e0;color:#d6890b}
.tag.use{background:var(--pink-tint);color:var(--pink)}
.qty{font-weight:800;color:var(--teal)}
.eat{background:var(--teal);color:#fff;font-size:.8rem;padding:8px 10px;min-height:40px}
.del{background:none;color:var(--muted);font-size:.78rem;padding:4px;min-height:auto}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Freezer Meal Tracker</h1>
<p class="tagline">Know exactly what's in the freezer — and use it before it's forgotten.</p>
</header>
<p class="howto">How to use this: log each meal you freeze. We'll nudge you gently when it's time to eat one.</p>

<div class="card tint-teal">
<label for="mname">Add a freezer meal</label>
<input id="mname" placeholder="e.g. Lasagna, Soup portions" autocomplete="off">
<div class="row" style="margin-top:10px">
<div style="flex:1;min-width:80px"><label style="font-size:.8rem" for="mqty">How many?</label><input id="mqty" type="number" min="1" value="1"></div>
<div style="flex:1;min-width:80px"><label style="font-size:.8rem" for="mweeks">Best within</label>
<select id="mweeks"><option value="4">1 month</option><option value="8">2 months</option><option value="12" selected>3 months</option><option value="24">6 months</option></select></div>
<button class="btn-secondary" id="add" style="align-self:flex-end">Add</button>
</div>
</div>

<div class="card">
<h2>In your freezer</h2>
<div id="list"></div>
</div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-freezer';
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return []}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
const DAY=86400000;

document.getElementById('add').onclick=()=>{
 const n=document.getElementById('mname'),q=document.getElementById('mqty'),w=document.getElementById('mweeks');
 const nm=n.value.trim();if(!nm){n.focus();return}
 state.unshift({id:Date.now(),nm,qty:parseInt(q.value,10)||1,added:Date.now(),weeks:parseInt(w.value,10)});
 n.value='';q.value='1';save();render();
};
function render(){
 const list=document.getElementById('list');list.innerHTML='';
 if(!state.length){list.innerHTML='<div class="empty">Freezer\'s untracked for now — and that\'s perfectly okay. Add your first meal when you\'re ready.</div>';return}
 const now=Date.now();
 state.slice().sort((a,b)=>(a.added+a.weeks*7*DAY)-(b.added+b.weeks*7*DAY)).forEach(m=>{
  const useBy=m.added+m.weeks*7*DAY;
  const daysLeft=Math.round((useBy-now)/DAY);
  let tag,cls;
  if(daysLeft<=0){tag='Use it up 💛';cls='use'}
  else if(daysLeft<=14){tag='Use soon ('+daysLeft+'d)';cls='soon'}
  else{tag='Good · '+Math.round(daysLeft/7)+'wk left';cls='ok'}
  const r=document.createElement('div');r.className='meal';
  r.innerHTML='<span class="qty">×'+m.qty+'</span><div class="mid"><div class="nm"></div><div class="sub"><span class="tag '+cls+'">'+tag+'</span></div></div>'
   +'<button class="eat">Ate one</button><button class="del">remove</button>';
  r.querySelector('.nm').textContent=m.nm;
  r.querySelector('.eat').onclick=()=>{m.qty--;if(m.qty<=0)state=state.filter(x=>x.id!==m.id);save();render()};
  r.querySelector('.del').onclick=()=>{state=state.filter(x=>x.id!==m.id);save();render()};
  list.appendChild(r);
 });
}
document.getElementById('reset').onclick=()=>{if(confirm('Clear the freezer list?')){localStorage.removeItem(KEY);state=[];render()}};
render();
</script>
</body>
</html>
