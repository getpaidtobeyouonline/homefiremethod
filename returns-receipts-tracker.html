<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Returns & Receipts Tracker · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
h2{font-size:1.05rem;margin:4px 0 10px}
.ret{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #f3f3f3}
.ret:last-child{border-bottom:none}
.ret.done{opacity:.5}
.ret input[type=checkbox]{width:26px;height:26px;min-height:26px;accent-color:var(--teal)}
.ret .mid{flex:1}
.ret .nm{font-weight:700}
.ret.done .nm{text-decoration:line-through}
.ret .sub{font-size:.82rem;color:#888}
.ret .due{font-size:.72rem;font-weight:800;padding:2px 8px;border-radius:999px;background:var(--teal-tint);color:var(--teal)}
.ret .due.soon{background:var(--pink-tint);color:var(--pink)}
.del{background:none;color:var(--muted);font-size:.78rem;padding:4px;min-height:auto}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Returns & Receipts Tracker</h1>
<p class="tagline">Log what you bought and its return window — never miss the deadline again.</p>
</header>
<p class="howto">How to use this: add anything you might return and the store's deadline. We'll flag what's closing soon.</p>

<div class="card tint-teal">
<label for="nm">Add an item</label>
<input id="nm" placeholder="e.g. Boots from ShoeCo" autocomplete="off">
<div class="row" style="margin-top:10px">
<input id="store" placeholder="Store (optional)" autocomplete="off" style="flex:1;min-width:110px">
<div style="flex:1;min-width:130px"><label style="font-size:.8rem" for="due">Return by</label><input id="due" type="date"></div>
<button class="btn-secondary" id="add" style="align-self:flex-end">Add</button>
</div>
</div>

<div class="card">
<h2>To return</h2>
<div id="open"></div>
</div>

<div class="card">
<h2>Handled ✓</h2>
<div id="done"></div>
</div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-returns';
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return []}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
document.getElementById('add').onclick=()=>{
 const nm=document.getElementById('nm').value.trim();if(!nm){document.getElementById('nm').focus();return}
 state.push({id:Date.now(),nm,store:document.getElementById('store').value.trim(),due:document.getElementById('due').value,done:false});
 document.getElementById('nm').value='';document.getElementById('store').value='';document.getElementById('due').value='';save();render();
};
function render(){
 const open=document.getElementById('open'),done=document.getElementById('done');open.innerHTML='';done.innerHTML='';
 const today=new Date();today.setHours(0,0,0,0);
 const o=state.filter(r=>!r.done).sort((a,b)=>(a.due||'9').localeCompare(b.due||'9'));
 const d=state.filter(r=>r.done);
 if(!o.length)open.innerHTML='<div class="empty">Nothing to return — and that\'s perfectly okay. Add an item when you need to.</div>';
 o.forEach(r=>open.appendChild(row(r,today)));
 if(!d.length)done.innerHTML='<div class="empty" style="padding:12px">Returned & refunded items rest here.</div>';
 d.forEach(r=>done.appendChild(row(r,today)));
}
function row(r,today){
 const el=document.createElement('div');el.className='ret'+(r.done?' done':'');
 let due='';
 if(r.due){const dt=new Date(r.due+'T00:00:00');const days=Math.round((dt-today)/86400000);const soon=days<=3&&!r.done;due='<span class="due'+(soon?' soon':'')+'">'+(days<0?'window closed':days===0?'last day!':days===1?'1 day left':days+' days left')+'</span>'}
 el.innerHTML='<input type="checkbox" '+(r.done?'checked':'')+'><div class="mid"><div class="nm"></div><div class="sub">'+(r.store?esc(r.store):'')+'</div>'+due+'</div><button class="del">✕</button>';
 el.querySelector('.nm').textContent=r.nm;
 el.querySelector('input').onchange=e=>{r.done=e.target.checked;save();render()};
 el.querySelector('.del').onclick=()=>{state=state.filter(x=>x.id!==r.id);save();render()};
 return el;
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
document.getElementById('reset').onclick=()=>{if(confirm('Clear all items?')){localStorage.removeItem(KEY);state=[];render()}};
render();
</script>
</body>
</html>
