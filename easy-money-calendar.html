<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>"Easy Money" Calendar · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
.today{background:var(--teal-tint);border-radius:14px;padding:18px;text-align:center}
.today .lbl{color:var(--teal);font-weight:700;font-size:.85rem}
.today .task{font-size:1.25rem;font-weight:800;margin:6px 0}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:10px}
.cell{aspect-ratio:1;border-radius:10px;background:#f3f3f3;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.8rem;color:#bbb;cursor:pointer}
.cell.done{background:var(--teal);color:#fff}
.cell.today{box-shadow:0 0 0 3px var(--pink)}
h2{font-size:1.05rem;margin:4px 0 10px}
.stat{text-align:center;font-weight:800;color:var(--pink)}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>"Easy Money" Calendar</h1>
<p class="tagline">One tiny money task a day — small steps that quietly add up to real income.</p>
</header>
<p class="howto">How to use this: do today's little task, then tap to mark it done. Five minutes counts.</p>

<div class="card today">
<div class="lbl">Today's tiny money task</div>
<div class="task" id="task">—</div>
<button class="btn-secondary" id="done">Mark today done ✓</button>
</div>

<div class="card">
<h2>This month</h2>
<div class="stat" id="stat"></div>
<div class="grid" id="grid"></div>
</div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-easy-money';
const TASKS=[
 'List one item you no longer use for sale','Take photos of 3 things to sell','Sign up for one survey or cashback app',
 'Ask a neighbor if they need a small task done','Post your offer in a local group','Follow up with one past customer or lead',
 'Research one thing people pay for that you can do','Set a tiny price for a service you could offer','Declutter one drawer — sell the good stuff',
 'Share what you make/do with one friend','Bundle a few small items to sell together','Spend 10 min learning one new money skill',
 'Check for unused gift cards or refunds owed','Offer to babysit/pet-sit one evening','Write one short post about what you offer',
 'Price-check 3 of your listed items','Reach out to one potential customer','Make a simple list of services you could sell',
 'Cancel one subscription & redirect that money','Sell or return something gathering dust','Brainstorm 5 things people ask your help with',
 'Take a "before" photo for a sellable craft','Restock or tidy your selling supplies','Ask a happy customer for a referral',
 'Set a small income goal for next week','List one item on a second platform','Offer a tiny discount to land a first sale',
 'Tidy your selling space for 10 minutes','Plan tomorrow\'s one money task','Celebrate — note one thing that worked this month'
];
function taskForDay(d){return TASKS[(d-1)%TASKS.length]}
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{done:{}}}catch(e){return {done:{}}}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function key(d){const n=new Date();return n.getFullYear()+'-'+(n.getMonth()+1)+'-'+d}

function render(){
 const now=new Date();const today=now.getDate();
 document.getElementById('task').textContent=taskForDay(today);
 const dim=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
 const grid=document.getElementById('grid');grid.innerHTML='';
 let count=0;
 for(let d=1;d<=dim;d++){
  const c=document.createElement('div');c.className='cell';
  if(state.done[key(d)]){c.classList.add('done');count++}
  if(d===today)c.classList.add('today');
  c.textContent=d;c.title=taskForDay(d);
  c.onclick=()=>{const k=key(d);state.done[k]=!state.done[k];if(!state.done[k])delete state.done[k];save();render()};
  grid.appendChild(c);
 }
 document.getElementById('stat').textContent=count+' tiny task'+(count===1?'':'s')+' done this month — every one is progress. 🎉';
 const t=document.getElementById('done');
 const dk=key(today);
 t.textContent=state.done[dk]?'Done for today ✓ (tap to undo)':'Mark today done ✓';
}
document.getElementById('done').onclick=()=>{const k=key(new Date().getDate());state.done[k]=!state.done[k];if(!state.done[k])delete state.done[k];save();render()};
document.getElementById('reset').onclick=()=>{if(confirm('Clear this month\'s progress?')){localStorage.removeItem(KEY);state={done:{}};render()}};
render();
</script>
</body>
</html>
