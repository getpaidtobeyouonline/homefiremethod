<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mom's Minutes Finder · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
h2{font-size:1.1rem;margin:4px 0 10px}
.slot{display:flex;align-items:center;gap:12px;padding:12px;border-radius:12px;margin-bottom:8px;background:var(--teal-tint)}
.slot .t{font-weight:800;color:var(--teal);width:120px;flex:0 0 auto;font-size:.9rem}
.slot .len{flex:1;font-weight:700}
.slot .mins{background:var(--pink);color:#fff;padding:4px 10px;border-radius:999px;font-size:.8rem;font-weight:800}
.idea{background:var(--pink-tint);border-radius:12px;padding:14px;margin-top:8px;font-weight:700;color:#a23b73;text-align:center}
.in{display:grid;grid-template-columns:1fr 1fr;gap:8px}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Mom's Minutes Finder</h1>
<p class="tagline">Find the little free pockets hiding in your day — they're there, I promise.</p>
</header>
<p class="howto">How to use this: add your set commitments, and we'll show the open gaps that are quietly yours.</p>

<div class="card tint-teal">
<label>Add a commitment (something that fills time)</label>
<input id="what" placeholder="e.g. School drop-off, Nap time" autocomplete="off">
<div class="in" style="margin-top:10px">
<div><label style="font-size:.8rem" for="start">Starts</label><input id="start" type="time"></div>
<div><label style="font-size:.8rem" for="end">Ends</label><input id="end" type="time"></div>
</div>
<button class="btn-secondary" id="add" style="width:100%;margin-top:10px">Add</button>
</div>

<div class="card">
<h2>Your free pockets today</h2>
<div id="slots"></div>
</div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-minutes';
const IDEAS={15:['a cup of tea, sitting down','a quick stretch','a few pages of a book','a tidy of one drawer'],30:['a real coffee break','a short walk','a phone call to a friend','a face mask & quiet'],60:['a proper rest','a hobby you miss','a bath','a nap — yes, really']};
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{dayStart:'07:00',dayEnd:'21:00',busy:[]}}catch(e){return {dayStart:'07:00',dayEnd:'21:00',busy:[]}}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function toMin(t){const[h,m]=t.split(':');return +h*60+ +m}
function fmt(min){const h=Math.floor(min/60),m=min%60;const hh=h%12||12;return hh+':'+String(m).padStart(2,'0')+(h<12?'am':'pm')}

document.getElementById('add').onclick=()=>{
 const what=document.getElementById('what').value.trim();const s=document.getElementById('start').value,e=document.getElementById('end').value;
 if(!what||!s||!e){alert('Add what it is and start/end times 💛');return}
 state.busy.push({what,s,e});document.getElementById('what').value='';document.getElementById('start').value='';document.getElementById('end').value='';save();render();
};
function render(){
 const slots=document.getElementById('slots');slots.innerHTML='';
 const dayS=toMin(state.dayStart),dayE=toMin(state.dayEnd);
 const busy=state.busy.map(b=>({...b,sm:toMin(b.s),em:toMin(b.e)})).sort((a,b)=>a.sm-b.sm);
 let cursor=dayS,gaps=[];
 busy.forEach(b=>{if(b.sm>cursor)gaps.push([cursor,b.sm]);cursor=Math.max(cursor,b.em)});
 if(cursor<dayE)gaps.push([cursor,dayE]);
 const real=gaps.filter(g=>g[1]-g[0]>=15);
 if(!state.busy.length){slots.innerHTML='<div class="empty">Add a commitment or two above, and I\'ll show you the open pockets in between. 💛</div>';return}
 if(!real.length){slots.innerHTML='<div class="empty">A full day, mama. Even five minutes with your eyes closed counts. Be gentle with yourself.</div>';return}
 real.forEach(g=>{
  const len=g[1]-g[0];
  const bucket=len>=60?60:len>=30?30:15;
  const idea=IDEAS[bucket][Math.floor(Math.random()*IDEAS[bucket].length)];
  const el=document.createElement('div');el.className='slot';
  el.innerHTML='<span class="t">'+fmt(g[0])+' – '+fmt(g[1])+'</span><span class="len">That\'s yours</span><span class="mins">'+len+' min</span>';
  slots.appendChild(el);
  const i=document.createElement('div');i.className='idea';i.textContent='✨ Maybe: '+idea;slots.appendChild(i);
 });
}
document.getElementById('reset').onclick=()=>{if(confirm('Clear your commitments?')){localStorage.removeItem(KEY);state={dayStart:'07:00',dayEnd:'21:00',busy:[]};render()}};
render();
</script>
</body>
</html>
