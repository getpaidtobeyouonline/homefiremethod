<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grocery Budget Tracker · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
h2{font-size:1.1rem;margin:4px 0 10px}
.big{text-align:center}
.big .num{font-size:2.4rem;font-weight:800;color:var(--teal)}
.big .lbl{color:#666;font-weight:700;font-size:.85rem}
.bar{height:16px;background:#eee;border-radius:999px;overflow:hidden;margin:12px 0 4px}
.bar>i{display:block;height:100%;background:var(--teal);width:0;transition:width .3s}
.bar.over>i{background:var(--pink)}
.trip{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f3f3f3}
.trip:last-child{border-bottom:none}
.del{background:none;color:var(--muted);font-size:.85rem;padding:4px 8px;min-height:auto}
.msg{text-align:center;font-weight:700;margin-top:6px}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Grocery Budget Tracker</h1>
<p class="tagline">Log each trip against your weekly cap — no math, no guilt.</p>
</header>
<p class="howto">How to use this: set a weekly cap once, then add each shopping trip. The bar shows where you are.</p>

<div class="card tint-pink">
<label for="cap">Weekly grocery cap</label>
<input id="cap" type="number" inputmode="decimal" min="0" step="1" placeholder="e.g. 150">
</div>

<div class="card">
<div class="big"><div class="lbl">Left this week</div><div class="num" id="left">$0</div></div>
<div class="bar" id="barWrap"><i id="bar"></i></div>
<div class="msg" id="msg"></div>
</div>

<div class="card tint-teal">
<label for="amt">Add a trip</label>
<div class="row">
<input id="store" placeholder="Store (optional)" autocomplete="off" style="flex:1;min-width:120px">
<input id="amt" type="number" inputmode="decimal" min="0" step="0.01" placeholder="$0.00" style="flex:1;min-width:100px">
<button class="btn-secondary" id="add">Add</button>
</div>
</div>

<div class="card">
<h2>This week's trips</h2>
<div id="list"></div>
</div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-grocery-budget';
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{cap:0,trips:[]}}catch(e){return {cap:0,trips:[]}}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function money(n){return '$'+(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}

const cap=document.getElementById('cap');
if(state.cap)cap.value=state.cap;
cap.oninput=()=>{state.cap=parseFloat(cap.value)||0;save();render()};

document.getElementById('add').onclick=()=>{
 const s=document.getElementById('store'),a=document.getElementById('amt');
 const amt=parseFloat(a.value);if(!amt||amt<=0){a.focus();return}
 state.trips.unshift({id:Date.now(),store:s.value.trim()||'Grocery trip',amt});
 s.value='';a.value='';save();render();
};
function render(){
 const spent=state.trips.reduce((x,t)=>x+t.amt,0);
 const left=(state.cap||0)-spent;
 document.getElementById('left').textContent=money(left);
 const pct=state.cap?Math.min(100,spent/state.cap*100):0;
 document.getElementById('bar').style.width=pct+'%';
 document.getElementById('barWrap').classList.toggle('over',spent>state.cap&&state.cap>0);
 const msg=document.getElementById('msg');
 if(!state.cap)msg.textContent='Set a cap above to start tracking.',msg.style.color='#999';
 else if(left>=0)msg.style.color='#1EA5B4',msg.textContent='You\'ve got '+money(left)+' left. Looking good. 💛';
 else msg.style.color='#F05AA5',msg.textContent='A little over by '+money(-left)+' — groceries feed your people. That\'s never wasted.';
 const list=document.getElementById('list');list.innerHTML='';
 if(!state.trips.length){list.innerHTML='<div class="empty">No trips logged yet — and that\'s perfectly okay. Add your first when you\'re ready.</div>';return}
 state.trips.forEach(t=>{
  const r=document.createElement('div');r.className='trip';
  r.innerHTML='<span class="s"></span><span><b>'+money(t.amt)+'</b> <button class="del">✕</button></span>';
  r.querySelector('.s').textContent=t.store;
  r.querySelector('.del').onclick=()=>{state.trips=state.trips.filter(x=>x.id!==t.id);save();render()};
  list.appendChild(r);
 });
}
document.getElementById('reset').onclick=()=>{if(confirm('Start a fresh week? This clears trips.')){state.trips=[];save();render()}};
render();
</script>
</body>
</html>
