<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carpool Coordinator · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
h2{font-size:1.1rem;margin:4px 0 10px}
.trip{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #f3f3f3}
.trip:last-child{border-bottom:none}
.trip.mine{background:var(--pink-tint);border-radius:10px;padding:12px;border:none}
.trip .day{width:46px;font-weight:800;color:var(--teal);flex:0 0 auto}
.trip .mid{flex:1}
.trip .what{font-weight:700}
.trip .who{font-size:.82rem;color:#666}
.tag{font-size:.7rem;font-weight:800;padding:2px 8px;border-radius:999px;background:var(--pink);color:#fff}
.del{background:none;color:var(--muted);font-size:.78rem;padding:4px;min-height:auto}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Carpool Coordinator</h1>
<p class="tagline">Who's driving where, and when — all in one spot so no kid gets left waiting.</p>
</header>
<p class="howto">How to use this: log each ride with the driver. Your turns get a gentle highlight.</p>

<div class="card tint-teal">
<label for="what">Add a ride</label>
<input id="what" placeholder="e.g. Practice pickup" autocomplete="off">
<div class="row" style="margin-top:10px">
<select id="day" style="flex:1;min-width:100px"><option>Mon</option><option>Tue</option><option>Wed</option><option>Thu</option><option>Fri</option><option>Sat</option><option>Sun</option></select>
<input id="time" type="time" style="flex:1;min-width:110px">
</div>
<div class="row" style="margin-top:10px">
<input id="driver" placeholder="Who's driving?" autocomplete="off" style="flex:1;min-width:120px">
<label style="display:flex;align-items:center;gap:6px;margin:0;white-space:nowrap"><input type="checkbox" id="mine" style="width:22px;height:22px;min-height:22px"> My turn</label>
</div>
<button class="btn-secondary" id="add" style="width:100%;margin-top:10px">Add ride</button>
</div>

<div class="card">
<h2>The schedule</h2>
<div id="list"></div>
</div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-carpool';
const ORDER=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return []}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function fmtTime(t){if(!t)return '';const[h,m]=t.split(':');const hh=+h%12||12;return hh+':'+m+(+h<12?'am':'pm')}

document.getElementById('add').onclick=()=>{
 const what=document.getElementById('what').value.trim();
 if(!what){alert('What\'s the ride for? 💛');return}
 state.push({id:Date.now(),what,day:document.getElementById('day').value,time:document.getElementById('time').value,driver:document.getElementById('driver').value.trim(),mine:document.getElementById('mine').checked});
 document.getElementById('what').value='';document.getElementById('driver').value='';document.getElementById('time').value='';document.getElementById('mine').checked=false;
 save();render();
};
function render(){
 const list=document.getElementById('list');list.innerHTML='';
 if(!state.length){list.innerHTML='<div class="empty">No rides scheduled yet — and that\'s perfectly okay. Add one when you\'re ready.</div>';return}
 const sorted=state.slice().sort((a,b)=>ORDER.indexOf(a.day)-ORDER.indexOf(b.day)||(a.time||'').localeCompare(b.time||''));
 sorted.forEach(r=>{
  const row=document.createElement('div');row.className='trip'+(r.mine?' mine':'');
  row.innerHTML='<span class="day">'+r.day+'</span><div class="mid"><div class="what"><span class="w"></span> '+(r.mine?'<span class="tag">YOU drive</span>':'')+'</div><div class="who">'+(r.time?fmtTime(r.time)+' · ':'')+(r.driver?'Driver: '+esc(r.driver):'driver TBD')+'</div></div><button class="del">✕</button>';
  row.querySelector('.w').textContent=r.what;
  row.querySelector('.del').onclick=()=>{state=state.filter(x=>x.id!==r.id);save();render()};
  list.appendChild(row);
 });
 const mine=state.filter(r=>r.mine).length;
 if(mine)list.insertAdjacentHTML('beforeend','<p style="text-align:center;color:#1EA5B4;font-weight:700;margin-top:10px">You\'re driving '+mine+' time'+(mine>1?'s':'')+' this week. Thanks for being the one who shows up. 💛</p>');
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
document.getElementById('reset').onclick=()=>{if(confirm('Clear the carpool schedule?')){localStorage.removeItem(KEY);state=[];render()}};
render();
</script>
</body>
</html>
