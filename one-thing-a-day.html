<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One Thing a Day · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
.today{background:var(--pink-tint);border-radius:16px;padding:24px;text-align:center}
.today .lbl{color:#a23b73;font-weight:700;font-size:.85rem}
.today .thing{font-size:1.5rem;font-weight:800;color:var(--pink);margin:8px 0;min-height:40px}
.done-state{background:var(--teal-tint);color:var(--teal);border-radius:12px;padding:14px;text-align:center;font-weight:800}
h2{font-size:1.05rem;margin:4px 0 10px}
.hist{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f3f3f3}
.hist:last-child{border-bottom:none}
.hist .d{font-size:.78rem;color:#999;font-weight:700;width:70px}
.hist .t{flex:1;font-weight:600}
.hist .tick{color:var(--teal)}
.ideas{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.ideas button{background:#fff;color:#a23b73;font-size:.8rem;padding:8px 10px;min-height:40px;border-radius:999px;border:1px solid #f0c4dd}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>One Thing a Day</h1>
<p class="tagline">Just one meaningful task today. Do it, and you're officially not behind.</p>
</header>
<p class="howto">How to use this: name your one thing for today, do it, then mark it done. That's the whole system.</p>

<div class="card today">
<div class="lbl">My one thing today is…</div>
<div class="thing" id="thing">—</div>
<div id="state"></div>
<div class="ideas" id="ideas"></div>
</div>

<div class="card">
<label for="set">Set or change today's one thing</label>
<div class="row">
<input id="set" placeholder="What's the one thing?" autocomplete="off" style="flex:1;min-width:140px">
<button class="btn-secondary" id="save">Set it</button>
</div>
</div>

<div class="card">
<h2>Look how much you've done 💛</h2>
<div id="hist"></div>
</div>

<button class="btn-ghost" id="reset" style="width:100%">Clear history</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-one-thing';
const IDEAS=['Reply to that one message','Make one appointment','Tidy one drawer','Pay one bill','One load of laundry start-to-finish','Plan dinner','A 15-min walk','Clear one surface'];
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{today:null,done:false,history:[]}}catch(e){return {today:null,done:false,history:[]}}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function stamp(){return new Date().toISOString().slice(0,10)}
function pretty(d){return new Date(d+'T00:00:00').toLocaleDateString(undefined,{month:'short',day:'numeric'})}

// roll over a new day
if(state.todayDate!==stamp()){
 if(state.today&&state.done)state.history.unshift({date:state.todayDate||stamp(),t:state.today});
 state.today=null;state.done=false;state.todayDate=stamp();save();
}
document.getElementById('save').onclick=()=>{const el=document.getElementById('set');const v=el.value.trim();if(!v)return;state.today=v;state.done=false;state.todayDate=stamp();el.value='';save();render()};
document.getElementById('set').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('save').click()});
function render(){
 document.getElementById('thing').textContent=state.today||'(not set yet)';
 const st=document.getElementById('state');
 if(!state.today){st.innerHTML='';document.getElementById('ideas').style.display='flex';}
 else if(state.done){st.innerHTML='<div class="done-state">✓ Done! You showed up today. That\'s everything.</div>';document.getElementById('ideas').style.display='none';}
 else {st.innerHTML='<button class="btn-primary" id="mark" style="width:100%">Mark it done ✓</button>';document.getElementById('ideas').style.display='none';document.getElementById('mark').onclick=()=>{state.done=true;state.history.unshift({date:stamp(),t:state.today});save();render()}};
 const ideas=document.getElementById('ideas');ideas.innerHTML='';
 IDEAS.forEach(t=>{const b=document.createElement('button');b.textContent='+ '+t;b.onclick=()=>{state.today=t;state.done=false;state.todayDate=stamp();save();render()};ideas.appendChild(b)});
 // de-dupe history by date+t keeping recent
 const seen=new Set();state.history=state.history.filter(h=>{const k=h.date+h.t;if(seen.has(k))return false;seen.add(k);return true});
 const hist=document.getElementById('hist');hist.innerHTML='';
 if(!state.history.length){hist.innerHTML='<div class="empty">Your wins will gather here — one a day adds up fast.</div>';return}
 state.history.slice(0,30).forEach(h=>{const r=document.createElement('div');r.className='hist';r.innerHTML='<span class="d">'+pretty(h.date)+'</span><span class="t"></span><span class="tick">✓</span>';r.querySelector('.t').textContent=h.t;hist.appendChild(r)});
}
document.getElementById('reset').onclick=()=>{if(confirm('Clear your history?')){state.history=[];save();render()}};
render();
</script>
</body>
</html>
