<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Gift Planner · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
h2{font-size:1.05rem;margin:4px 0 10px}
.teacher{padding:12px 0;border-bottom:1px solid #f3f3f3}
.teacher:last-child{border-bottom:none}
.teacher.done{opacity:.55}
.teacher .top{display:flex;align-items:center;gap:10px}
.teacher input[type=checkbox]{width:24px;height:24px;min-height:24px;accent-color:var(--teal)}
.teacher .nm{flex:1;font-weight:700}
.teacher.done .nm{text-decoration:line-through}
.teacher .sub{font-size:.82rem;color:#888;margin-left:34px}
.teacher .price{font-weight:800;color:var(--teal)}
.del{background:none;color:var(--muted);font-size:.78rem;padding:4px;min-height:auto}
.tot{text-align:center;font-weight:800;color:var(--pink)}
.ideas{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.ideas button{background:#f4f4f4;color:#555;font-size:.8rem;padding:8px 10px;min-height:40px;border-radius:999px}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Teacher Gift Planner</h1>
<p class="tagline">Track teacher gifts and budgets across the year — thoughtful, never last-minute.</p>
</header>
<p class="howto">How to use this: add each teacher, jot a gift idea and budget, then tick off when it's done.</p>

<div class="card tint-teal">
<label for="nm">Add a teacher</label>
<input id="nm" placeholder="e.g. Mrs. Lopez (Leo's teacher)" autocomplete="off">
<div class="row" style="margin-top:10px">
<input id="idea" placeholder="Gift idea" autocomplete="off" style="flex:2;min-width:120px">
<input id="budget" type="number" inputmode="decimal" min="0" placeholder="$" style="flex:1;min-width:70px">
<button class="btn-secondary" id="add">Add</button>
</div>
<div class="ideas" id="ideas"></div>
</div>

<div class="card">
<h2>Your teacher gifts</h2>
<div class="tot" id="tot"></div>
<div id="list"></div>
</div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-teacher-gifts';
const IDEAS=['Gift card to coffee shop','Handwritten thank-you note','Classroom supplies','Plant or flowers','Their favourite snack basket','Bookstore gift card'];
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return []}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function money(n){return '$'+(n||0).toFixed(2)}
document.getElementById('add').onclick=()=>{
 const nm=document.getElementById('nm').value.trim();if(!nm){document.getElementById('nm').focus();return}
 state.push({id:Date.now(),nm,idea:document.getElementById('idea').value.trim(),budget:parseFloat(document.getElementById('budget').value)||0,done:false});
 document.getElementById('nm').value='';document.getElementById('idea').value='';document.getElementById('budget').value='';save();render();
};
function render(){
 const ideas=document.getElementById('ideas');ideas.innerHTML='';
 IDEAS.forEach(t=>{const b=document.createElement('button');b.textContent='💡 '+t;b.onclick=()=>{document.getElementById('idea').value=t};ideas.appendChild(b)});
 const list=document.getElementById('list');list.innerHTML='';
 if(!state.length){list.innerHTML='<div class="empty">Nothing here yet — and that\'s perfectly okay. Add a teacher when you\'re ready.</div>';document.getElementById('tot').textContent='';return}
 state.forEach(t=>{
  const el=document.createElement('div');el.className='teacher'+(t.done?' done':'');
  el.innerHTML='<div class="top"><input type="checkbox" '+(t.done?'checked':'')+'><span class="nm"></span>'+(t.budget?'<span class="price">'+money(t.budget)+'</span>':'')+'<button class="del">✕</button></div>'+(t.idea?'<div class="sub">'+esc(t.idea)+'</div>':'');
  el.querySelector('.nm').textContent=t.nm;
  el.querySelector('input').onchange=e=>{t.done=e.target.checked;save();render()};
  el.querySelector('.del').onclick=()=>{state=state.filter(x=>x.id!==t.id);save();render()};
  list.appendChild(el);
 });
 const tot=state.reduce((a,t)=>a+(t.budget||0),0);
 const done=state.filter(t=>t.done).length;
 document.getElementById('tot').textContent='Total budget: '+money(tot)+' · '+done+'/'+state.length+' sorted';
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
document.getElementById('reset').onclick=()=>{if(confirm('Clear all teacher gifts?')){localStorage.removeItem(KEY);state=[];render()}};
render();
</script>
</body>
</html>
