<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laundry Day Tracker · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
h2{font-size:1.1rem;margin:4px 0 10px}
.load{border:1px solid #f0f0f0;border-radius:12px;padding:12px;margin-bottom:12px}
.load.done{background:var(--teal-tint);border-color:#cfeef1}
.load h3{margin:0 0 4px;font-size:1.05rem}
.stages{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:10px}
.stage{border:2px solid #eee;border-radius:10px;padding:8px 4px;text-align:center;font-weight:700;font-size:.8rem;cursor:pointer;min-height:56px;display:flex;flex-direction:column;justify-content:center;gap:2px}
.stage.on{background:var(--teal);color:#fff;border-color:var(--teal)}
.stage .ico{font-size:1.1rem}
.win{background:var(--teal-tint);border-radius:12px;padding:14px;text-align:center;font-weight:700;color:var(--teal);margin-top:10px}
.del{background:none;color:var(--muted);font-size:.85rem;padding:6px 10px;min-height:auto}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Laundry Day Tracker</h1>
<p class="tagline">Follow each load from washer to drawer — so nothing lives in the basket.</p>
</header>
<p class="howto">How to use this: add a load, then tap each stage as you go. The basket can't hide from you now.</p>

<div class="card tint-pink">
<label for="name">Add a load</label>
<div class="row">
<input id="name" placeholder="e.g. Towels, Kids' colors" autocomplete="off" style="flex:1;min-width:160px">
<button class="btn-primary" id="add">Add</button>
</div>
</div>

<div id="loads"></div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-laundry';
const STAGES=[{k:'wash',ico:'🧺',l:'Washed'},{k:'dry',ico:'☀️',l:'Dried'},{k:'fold',ico:'👕',l:'Folded'},{k:'away',ico:'✅',l:'Put away'}];
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return []}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}

function add(){
 const n=document.getElementById('name');
 const v=n.value.trim();if(!v)return;
 state.unshift({id:Date.now(),name:v,stage:0});
 n.value='';save();render();
}
document.getElementById('add').onclick=add;
document.getElementById('name').addEventListener('keydown',e=>{if(e.key==='Enter')add()});

function render(){
 const wrap=document.getElementById('loads');wrap.innerHTML='';
 if(!state.length){
  wrap.innerHTML='<div class="card"><div class="empty">No loads yet — and that\'s perfectly okay.<br>Add your first one whenever you\'re ready.</div></div>';
  return;
 }
 state.forEach(load=>{
  const done=load.stage>=STAGES.length;
  const c=document.createElement('div');
  c.className='card load'+(done?' done':'');
  let h='<h3></h3>';
  h+='<div class="stages">';
  STAGES.forEach((s,i)=>{
   h+='<div class="stage'+(load.stage>i?' on':'')+'" data-i="'+i+'"><span class="ico">'+s.ico+'</span>'+s.l+'</div>';
  });
  h+='</div>';
  if(done)h+='<div class="win">✓ All done — folded and away. One less thing on your mind.</div>';
  h+='<div style="text-align:right"><button class="del">Remove</button></div>';
  c.innerHTML=h;
  c.querySelector('h3').textContent=load.name;
  c.querySelectorAll('.stage').forEach(el=>{
   el.onclick=()=>{const i=+el.dataset.i; load.stage=(load.stage===i+1)?i:i+1; save();render()};
  });
  c.querySelector('.del').onclick=()=>{state=state.filter(l=>l.id!==load.id);save();render()};
  wrap.appendChild(c);
 });
}
document.getElementById('reset').onclick=()=>{if(confirm('Clear all loads?')){localStorage.removeItem(KEY);state=[];render()}};
render();
</script>
</body>
</html>
