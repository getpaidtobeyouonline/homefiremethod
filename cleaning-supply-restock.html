<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cleaning Supply Restock · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
h2{font-size:1.1rem;margin:4px 0 10px}
.item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f3f3f3}
.item:last-child{border-bottom:none}
.item .nm{flex:1;font-weight:700}
.lvl{display:flex;gap:6px}
.lvl button{padding:8px 10px;min-height:40px;font-size:.85rem;border-radius:10px;background:#f4f4f4;color:#555}
.lvl button.on.good{background:var(--teal);color:#fff}
.lvl button.on.low{background:#f5a623;color:#fff}
.lvl button.on.out{background:var(--pink);color:#fff}
.shop{background:var(--pink-tint);border-radius:12px;padding:12px;margin-top:6px}
.shop li{margin:4px 0;font-weight:700}
.del{background:none;color:var(--muted);font-size:.8rem;padding:6px;min-height:auto}
.tag{font-size:.75rem;font-weight:800;padding:2px 8px;border-radius:999px}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Cleaning Supply Restock</h1>
<p class="tagline">A quick tap tells you what's running low — so you never run out mid-load.</p>
</header>
<p class="howto">How to use this: mark each supply Good, Low, or Out. Your shopping list builds itself.</p>

<div class="card tint-teal">
<label for="add">Add a supply</label>
<div class="row">
<input id="add" placeholder="e.g. Dish soap" autocomplete="off" style="flex:1;min-width:160px">
<button class="btn-secondary" id="addBtn">Add</button>
</div>
</div>

<div class="card">
<h2>Your supplies</h2>
<div id="list"></div>
</div>

<div class="card tint-pink">
<h2 style="color:#a23b73">🛒 Grab these next trip</h2>
<div id="shop"></div>
</div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-restock';
const DEFAULTS=['Dish soap','Laundry detergent','Dishwasher pods','All-purpose spray','Paper towels','Toilet paper','Trash bags','Hand soap','Sponges','Disinfecting wipes'];
let state=load();
function load(){try{const s=JSON.parse(localStorage.getItem(KEY));return s||seed()}catch(e){return seed()}}
function seed(){return DEFAULTS.map((n,i)=>({id:Date.now()+i,nm:n,lvl:'good'}))}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}

function add(){const el=document.getElementById('add');const v=el.value.trim();if(!v)return;state.unshift({id:Date.now(),nm:v,lvl:'good'});el.value='';save();render()}
document.getElementById('addBtn').onclick=add;
document.getElementById('add').addEventListener('keydown',e=>{if(e.key==='Enter')add()});

function render(){
 const el=document.getElementById('list');el.innerHTML='';
 if(!state.length){el.innerHTML='<div class="empty">Nothing here yet — and that\'s perfectly okay. Add your first supply when you\'re ready.</div>';}
 state.forEach(it=>{
  const d=document.createElement('div');d.className='item';
  d.innerHTML='<span class="nm"></span>'
   +'<div class="lvl">'
   +'<button data-l="good" class="good'+(it.lvl==='good'?' on':'')+'">Good</button>'
   +'<button data-l="low" class="low'+(it.lvl==='low'?' on':'')+'">Low</button>'
   +'<button data-l="out" class="out'+(it.lvl==='out'?' on':'')+'">Out</button>'
   +'</div><button class="del">✕</button>';
  d.querySelector('.nm').textContent=it.nm;
  d.querySelectorAll('.lvl button').forEach(b=>b.onclick=()=>{it.lvl=b.dataset.l;save();render()});
  d.querySelector('.del').onclick=()=>{state=state.filter(x=>x.id!==it.id);save();render()};
  el.appendChild(d);
 });
 const need=state.filter(i=>i.lvl!=='good');
 const sh=document.getElementById('shop');
 if(!need.length){sh.innerHTML='<div class="empty" style="padding:8px">You\'re fully stocked. Nothing to buy — lovely. ✓</div>';}
 else{
  sh.innerHTML='<ul style="margin:4px 0 0;padding-left:20px">'+need.map(i=>'<li>'+esc(i.nm)+' <span class="tag" style="background:'+(i.lvl==='out'?'#F05AA5':'#f5a623')+';color:#fff">'+(i.lvl==='out'?'OUT':'low')+'</span></li>').join('')+'</ul>';
 }
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
document.getElementById('reset').onclick=()=>{if(confirm('Reset to the starter supply list?')){localStorage.removeItem(KEY);state=seed();save();render()}};
render();
</script>
</body>
</html>
