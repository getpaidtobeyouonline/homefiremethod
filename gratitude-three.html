<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gratitude Three · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
h2{font-size:1.05rem;margin:4px 0 10px}
.three{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.three .n{width:36px;height:36px;border-radius:50%;background:var(--pink-tint);color:var(--pink);display:flex;align-items:center;justify-content:center;font-weight:800;flex:0 0 auto}
.three input{flex:1}
.done{background:var(--teal-tint);border-radius:12px;padding:14px;text-align:center;font-weight:700;color:var(--teal)}
.entry{padding:10px 0;border-bottom:1px solid #f3f3f3}
.entry:last-child{border-bottom:none}
.entry .date{font-size:.78rem;color:#999;font-weight:700}
.entry ul{margin:4px 0 0;padding-left:20px}
.del{background:none;color:var(--muted);font-size:.78rem;padding:2px;min-height:auto;float:right}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Gratitude Three</h1>
<p class="tagline">Three good things from today — logged in under a minute, kept forever.</p>
</header>
<p class="howto">How to use this: jot three little things you're grateful for, then save. Tiny things count most.</p>

<div class="card tint-pink">
<h2 style="color:#a23b73">Today, I'm grateful for…</h2>
<div class="three"><span class="n">1</span><input id="g1" placeholder="Something small or big" autocomplete="off"></div>
<div class="three"><span class="n">2</span><input id="g2" placeholder="A moment, a person, a feeling" autocomplete="off"></div>
<div class="three"><span class="n">3</span><input id="g3" placeholder="Anything at all" autocomplete="off"></div>
<button class="btn-primary" id="save" style="width:100%;margin-top:6px">Save today's three 💛</button>
<div id="msg"></div>
</div>

<div class="card">
<h2>Your gratitude journal</h2>
<div id="list"></div>
</div>

<button class="btn-ghost" id="reset" style="width:100%">Clear journal</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-gratitude3';
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return []}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function today(){return new Date().toISOString().slice(0,10)}
function pretty(d){return new Date(d+'T00:00:00').toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'})}

document.getElementById('save').onclick=()=>{
 const g=[document.getElementById('g1').value.trim(),document.getElementById('g2').value.trim(),document.getElementById('g3').value.trim()].filter(Boolean);
 if(!g.length){document.getElementById('msg').innerHTML='<div style="color:#999;text-align:center;margin-top:8px">Add at least one good thing 💛</div>';return}
 const existing=state.find(e=>e.date===today());
 if(existing)existing.items=g;else state.unshift({date:today(),items:g});
 save();
 document.getElementById('g1').value='';document.getElementById('g2').value='';document.getElementById('g3').value='';
 document.getElementById('msg').innerHTML='<div class="done" style="margin-top:10px">✓ Saved. Noticing the good is its own kind of self-care.</div>';
 render();
};
function render(){
 const list=document.getElementById('list');list.innerHTML='';
 if(!state.length){list.innerHTML='<div class="empty">Nothing here yet — and that\'s perfectly okay. Your first three are waiting.</div>';return}
 state.forEach((e,i)=>{
  const d=document.createElement('div');d.className='entry';
  d.innerHTML='<button class="del">✕</button><div class="date">'+pretty(e.date)+'</div><ul>'+e.items.map(x=>'<li>'+esc(x)+'</li>').join('')+'</ul>';
  d.querySelector('.del').onclick=()=>{state.splice(i,1);save();render()};
  list.appendChild(d);
 });
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
document.getElementById('reset').onclick=()=>{if(confirm('Clear your whole gratitude journal?')){localStorage.removeItem(KEY);state=[];render()}};
render();
</script>
</body>
</html>
