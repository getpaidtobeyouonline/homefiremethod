<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hustle Hours Planner · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
h2{font-size:1.05rem;margin:4px 0 10px}
.slot{display:flex;align-items:center;gap:12px;padding:12px;border-radius:12px;margin-bottom:8px;background:var(--teal-tint)}
.slot.done{opacity:.55}
.slot input[type=checkbox]{width:26px;height:26px;min-height:26px;accent-color:var(--teal)}
.slot .when{font-weight:800;color:var(--teal);flex:1}
.slot.done .when{text-decoration:line-through}
.slot .focus{font-size:.82rem;color:#666}
.del{background:none;color:var(--muted);font-size:.78rem;padding:4px;min-height:auto}
.total{text-align:center;font-weight:800;color:var(--pink)}
.ideas{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.ideas button{background:#f4f4f4;color:#555;font-size:.8rem;padding:8px 10px;min-height:40px;border-radius:999px}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Hustle Hours Planner</h1>
<p class="tagline">Find and protect the little pockets of time for your side project — and guard them gently.</p>
</header>
<p class="howto">How to use this: block out when you'll work on your hustle this week. Tick each one off as you go.</p>

<div class="card tint-pink">
<label for="when">Add a work slot</label>
<input id="when" placeholder="e.g. Tue 8–9pm" autocomplete="off">
<div class="row" style="margin-top:10px">
<input id="focus" placeholder="What you'll do (optional)" autocomplete="off" style="flex:1;min-width:120px">
<input id="mins" type="number" min="5" step="5" placeholder="mins" style="width:90px">
<button class="btn-primary" id="add">Add</button>
</div>
<div class="ideas" id="ideas"></div>
</div>

<div class="card">
<h2>Your protected hours</h2>
<div class="total" id="total"></div>
<div id="list"></div>
</div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-hustle-hours';
const IDEAS=['Nap-time hour','After bedtime','Early morning','Sat morning','Lunch break','While dinner cooks'];
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return []}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}

document.getElementById('add').onclick=()=>{
 const w=document.getElementById('when'),f=document.getElementById('focus'),m=document.getElementById('mins');
 const when=w.value.trim();if(!when){w.focus();return}
 state.push({id:Date.now(),when,focus:f.value.trim(),mins:parseInt(m.value,10)||60,done:false});
 w.value='';f.value='';m.value='';save();render();
};
function render(){
 const ideas=document.getElementById('ideas');ideas.innerHTML='';
 IDEAS.forEach(t=>{const b=document.createElement('button');b.textContent='+ '+t;b.onclick=()=>{document.getElementById('when').value=t;document.getElementById('focus').focus()};ideas.appendChild(b)});
 const list=document.getElementById('list');list.innerHTML='';
 if(!state.length){list.innerHTML='<div class="empty">No slots planned yet — and that\'s perfectly okay. Block your first one when you\'re ready.</div>';document.getElementById('total').textContent='';return}
 state.forEach(s=>{
  const el=document.createElement('label');el.className='slot'+(s.done?' done':'');
  el.innerHTML='<input type="checkbox" '+(s.done?'checked':'')+'><div style="flex:1"><div class="when"></div>'+(s.focus?'<div class="focus">'+esc(s.focus)+' · '+s.mins+' min</div>':'<div class="focus">'+s.mins+' min</div>')+'</div><button class="del">✕</button>';
  el.querySelector('.when').textContent=s.when;
  el.querySelector('input').onchange=e=>{s.done=e.target.checked;save();render()};
  el.querySelector('.del').onclick=()=>{state=state.filter(x=>x.id!==s.id);save();render()};
  list.appendChild(el);
 });
 const planned=state.reduce((a,s)=>a+s.mins,0);
 const done=state.filter(s=>s.done).reduce((a,s)=>a+s.mins,0);
 document.getElementById('total').textContent=(done/60).toFixed(1)+'h done of '+(planned/60).toFixed(1)+'h planned — protected time is how it happens. 💛';
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
document.getElementById('reset').onclick=()=>{if(confirm('Clear your planned hours?')){localStorage.removeItem(KEY);state=[];render()}};
render();
</script>
</body>
</html>
