<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bill Due-Date Calendar · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
h2{font-size:1.1rem;margin:4px 0 10px}
.bill{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #f3f3f3}
.bill:last-child{border-bottom:none}
.bill.paid{opacity:.55}
.bill.paid .nm{text-decoration:line-through}
.day{width:48px;height:48px;flex:0 0 auto;border-radius:12px;background:var(--pink-tint);color:var(--pink);display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:800;line-height:1}
.day small{font-size:.6rem;font-weight:700;color:#a23b73}
.day.soon{background:#fff4e0;color:#d6890b}.day.soon small{color:#d6890b}
.bill .mid{flex:1}
.bill .nm{font-weight:700}
.bill .sub{font-size:.8rem;color:#888}
.bill .amt{font-weight:800;color:var(--teal)}
.pill{font-size:.72rem;font-weight:800;padding:2px 8px;border-radius:999px;background:var(--teal-tint);color:var(--teal)}
.del{background:none;color:var(--muted);font-size:.85rem;padding:4px 8px;min-height:auto}
.tot{text-align:center;font-weight:800;color:var(--pink)}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Bill Due-Date Calendar</h1>
<p class="tagline">Every bill on one gentle list, sorted by day — so nothing sneaks up.</p>
</header>
<p class="howto">How to use this: add each bill with the day of the month it's due. Mark it paid with one tap.</p>

<div class="card tint-teal">
<label for="bname">Add a bill</label>
<input id="bname" placeholder="e.g. Electric, Phone" autocomplete="off">
<div class="row" style="margin-top:10px">
<div style="flex:1;min-width:90px"><label for="bday" style="font-size:.8rem">Due day</label><input id="bday" type="number" min="1" max="31" placeholder="1–31"></div>
<div style="flex:1;min-width:90px"><label for="bamt" style="font-size:.8rem">Amount</label><input id="bamt" type="number" inputmode="decimal" min="0" step="0.01" placeholder="0.00"></div>
<button class="btn-secondary" id="add" style="align-self:flex-end">Add</button>
</div>
</div>

<div class="card">
<h2>Coming up</h2>
<div class="tot" id="tot"></div>
<div id="list"></div>
</div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-bills';
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return []}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function money(n){return '$'+(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}

document.getElementById('add').onclick=()=>{
 const n=document.getElementById('bname'),d=document.getElementById('bday'),a=document.getElementById('bamt');
 const nm=n.value.trim(),day=parseInt(d.value,10);
 if(!nm||!day||day<1||day>31){alert('Add a name and a due day (1–31) 💛');return}
 state.push({id:Date.now(),nm,day,amt:parseFloat(a.value)||0,paid:false});
 n.value='';d.value='';a.value='';save();render();
};
function render(){
 const today=new Date().getDate();
 const sorted=state.slice().sort((a,b)=>a.day-b.day);
 const list=document.getElementById('list');list.innerHTML='';
 if(!state.length){list.innerHTML='<div class="empty">No bills added yet — and that\'s perfectly okay. Add your first when you\'re ready.</div>';document.getElementById('tot').textContent='';return}
 let unpaid=0;
 sorted.forEach(b=>{
  if(!b.paid)unpaid+=b.amt;
  const soon=!b.paid && b.day>=today && b.day-today<=3;
  const r=document.createElement('div');r.className='bill'+(b.paid?' paid':'');
  r.innerHTML='<div class="day'+(soon?' soon':'')+'"><small>day</small>'+b.day+'</div>'
   +'<div class="mid"><div class="nm"></div><div class="sub">'+(b.amt?money(b.amt):'')+(soon?' · due soon':'')+'</div></div>'
   +'<div style="text-align:right">'
   +'<button class="pill paybtn">'+(b.paid?'✓ Paid':'Mark paid')+'</button>'
   +'<br><button class="del">remove</button></div>';
  r.querySelector('.nm').textContent=b.nm;
  r.querySelector('.paybtn').onclick=()=>{b.paid=!b.paid;save();render()};
  r.querySelector('.del').onclick=()=>{state=state.filter(x=>x.id!==b.id);save();render()};
  list.appendChild(r);
 });
 document.getElementById('tot').textContent=unpaid>0?('Still to pay this month: '+money(unpaid)):'All bills marked paid — wonderful. ✓';
}
document.getElementById('reset').onclick=()=>{if(confirm('Clear all bills?')){localStorage.removeItem(KEY);state=[];render()}};
render();
</script>
</body>
</html>
