<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Overwhelm Triage · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
h2{font-size:1.05rem;margin:4px 0 10px}
.task{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid #f3f3f3}
.task:last-child{border-bottom:none}
.task .t{flex:1;font-weight:600}
.task .sort{display:flex;gap:4px}
.task .sort button{padding:8px 10px;min-height:38px;font-size:.75rem;background:#f4f4f4;color:#666;border-radius:8px}
.task .sort button.now.on{background:var(--pink);color:#fff}
.task .sort button.later.on{background:var(--teal);color:#fff}
.task .sort button.let.on{background:#999;color:#fff}
.del{background:none;color:var(--muted);font-size:.8rem;padding:4px;min-height:auto}
.bucket{margin-bottom:8px}
.bucket h3{margin:0 0 4px;font-size:.95rem}
.bucket.now h3{color:var(--pink)}.bucket.later h3{color:var(--teal)}.bucket.let h3{color:#999}
.bucket .item{padding:8px 0;border-bottom:1px solid #f6f6f6;font-weight:600}
.bucket .item:last-child{border-bottom:none}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Overwhelm Triage</h1>
<p class="tagline">Dump every spinning to-do, then sort each into now, later, or let it go.</p>
</header>
<p class="howto">How to use this: list everything on your mind first. Then calmly sort. Most things can wait — or go.</p>

<div class="card tint-pink">
<label for="add">What's on your plate? (add them all)</label>
<div class="row">
<input id="add" placeholder="One thing at a time" autocomplete="off" style="flex:1;min-width:150px">
<button class="btn-primary" id="addBtn">Add</button>
</div>
</div>

<div class="card">
<h2>Sort each one</h2>
<div id="list"></div>
</div>

<div class="card tint-teal" id="summary" style="display:none">
<h2 style="color:var(--teal)">Your calm plan</h2>
<div id="buckets"></div>
</div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-triage';
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return []}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}

function add(t){if(!t)return;state.push({id:Date.now()+Math.random(),t,bucket:null});save();render()}
document.getElementById('addBtn').onclick=()=>{const el=document.getElementById('add');add(el.value.trim());el.value=''};
document.getElementById('add').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('addBtn').click()});
function render(){
 const list=document.getElementById('list');list.innerHTML='';
 if(!state.length){list.innerHTML='<div class="empty">Nothing dumped yet — and that\'s perfectly okay. Get it all out of your head first.</div>';}
 state.forEach(it=>{
  const d=document.createElement('div');d.className='task';
  d.innerHTML='<span class="t"></span><div class="sort"><button class="now'+(it.bucket==='now'?' on':'')+'">Now</button><button class="later'+(it.bucket==='later'?' on':'')+'">Later</button><button class="let'+(it.bucket==='let'?' on':'')+'">Let go</button></div><button class="del">✕</button>';
  d.querySelector('.t').textContent=it.t;
  d.querySelector('.now').onclick=()=>{it.bucket=it.bucket==='now'?null:'now';save();render()};
  d.querySelector('.later').onclick=()=>{it.bucket=it.bucket==='later'?null:'later';save();render()};
  d.querySelector('.let').onclick=()=>{it.bucket=it.bucket==='let'?null:'let';save();render()};
  d.querySelector('.del').onclick=()=>{state=state.filter(x=>x.id!==it.id);save();render()};
  list.appendChild(d);
 });
 const sorted=state.filter(i=>i.bucket);
 const sum=document.getElementById('summary');
 if(!sorted.length){sum.style.display='none';return}
 sum.style.display='block';
 const b=document.getElementById('buckets');b.innerHTML='';
 [['now','🔴 Do now (just these)'],['later','🟢 Later is fine'],['let','⚪ Let it go — permission granted']].forEach(([k,label])=>{
  const items=state.filter(i=>i.bucket===k);if(!items.length)return;
  const sec=document.createElement('div');sec.className='bucket '+k;sec.innerHTML='<h3>'+label+'</h3>';
  items.forEach(i=>{const el=document.createElement('div');el.className='item';el.textContent=i.t;sec.appendChild(el)});
  b.appendChild(sec);
 });
 const nowCount=state.filter(i=>i.bucket==='now').length;
 if(nowCount){const note=document.createElement('p');note.style.cssText='color:#1EA5B4;font-weight:700;text-align:center;margin:8px 0 0';note.textContent=nowCount<=3?'Only '+nowCount+' thing'+(nowCount>1?'s':'')+' truly needs you now. The rest can wait. 💛':'That\'s a lot in "now." Could any slide to later? Be kind to yourself.';b.appendChild(note)}
}
document.getElementById('reset').onclick=()=>{if(confirm('Clear everything?')){localStorage.removeItem(KEY);state=[];render()}};
render();
</script>
</body>
</html>
