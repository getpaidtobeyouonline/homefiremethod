<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Party Planner · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
h2{font-size:.95rem;margin:14px 0 6px;color:var(--teal)}
.task{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #f3f3f3}
.task:last-child{border-bottom:none}
.task input[type=checkbox]{width:24px;height:24px;min-height:24px;accent-color:var(--teal)}
.task.done span{text-decoration:line-through;color:var(--muted)}
.task span{flex:1}
.del{background:none;color:var(--muted);font-size:.78rem;padding:4px;min-height:auto}
.bar{height:14px;background:#eee;border-radius:999px;overflow:hidden;margin:8px 0}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--teal),var(--pink));width:0;transition:width .3s}
.fields{display:grid;grid-template-columns:1fr 1fr;gap:10px}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Birthday Party Planner</h1>
<p class="tagline">Plan a budget-friendly party start to finish — without losing your mind (or your wallet).</p>
</header>
<p class="howto">How to use this: fill in the basics, then work the checklist by section. Tick as you go.</p>

<div class="card tint-pink">
<div class="fields">
<div><label for="kid">Birthday star</label><input id="kid" placeholder="Name" autocomplete="off"></div>
<div><label for="age">Turning</label><input id="age" type="number" min="1" placeholder="Age"></div>
<div><label for="date">Date</label><input id="date" type="date"></div>
<div><label for="budget">Budget</label><input id="budget" type="number" min="0" placeholder="$"></div>
</div>
</div>

<div class="card">
<div class="bar"><i id="bar"></i></div>
<div id="panel"></div>
<div class="row" style="margin-top:10px">
<input id="add" placeholder="Add your own to-do" autocomplete="off" style="flex:1;min-width:140px">
<button class="btn-secondary" id="addBtn">Add</button>
</div>
</div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-bday-party';
const SECTIONS={
 '4–6 weeks before':['Pick a date & theme','Set the guest list','Choose the location (home/park is cheap!)','Make or buy invitations'],
 '2 weeks before':['Send invitations','Plan the food & cake','Order/buy decorations','Plan 2–3 simple games'],
 'This week':['Buy groceries & supplies','Confirm headcount','Prep goodie bags','Buy/make the cake','Tidy the party space'],
 'Party day':['Decorate','Set out food','Charge the camera','Relax — they\'ll remember the fun, not the flaws 💛']
};
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{info:{},checks:{},extra:[]}}catch(e){return {info:{},checks:{},extra:[]}}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
['kid','age','date','budget'].forEach(id=>{const el=document.getElementById(id);el.value=state.info[id]||'';el.oninput=()=>{state.info[id]=el.value;save()}});
document.getElementById('addBtn').onclick=()=>{const el=document.getElementById('add');const v=el.value.trim();if(!v)return;state.extra.push({t:v,done:false});el.value='';save();render()};
document.getElementById('add').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('addBtn').click()});
function render(){
 const panel=document.getElementById('panel');panel.innerHTML='';
 let total=0,done=0;
 Object.keys(SECTIONS).forEach(sec=>{
  const h=document.createElement('h2');h.textContent=sec;panel.appendChild(h);
  SECTIONS[sec].forEach(item=>{
   const key=sec+'|'+item;total++;const checked=!!state.checks[key];if(checked)done++;
   panel.appendChild(taskRow(item,checked,e=>{state.checks[key]=e;if(!e)delete state.checks[key];save();render()}));
  });
 });
 if(state.extra.length){const h=document.createElement('h2');h.textContent='Your additions';panel.appendChild(h);state.extra.forEach((it,i)=>{total++;if(it.done)done++;panel.appendChild(taskRow(it.t,it.done,e=>{it.done=e;save();render()},()=>{state.extra.splice(i,1);save();render()}))})}
 document.getElementById('bar').style.width=(total?done/total*100:0)+'%';
}
function taskRow(text,checked,onchange,del){
 const l=document.createElement('label');l.className='task'+(checked?' done':'');
 l.innerHTML='<input type="checkbox" '+(checked?'checked':'')+'><span></span>'+(del?'<button class="del">✕</button>':'');
 l.querySelector('span').textContent=text;
 l.querySelector('input').onchange=e=>onchange(e.target.checked);
 if(del)l.querySelector('.del').onclick=del;
 return l;
}
document.getElementById('reset').onclick=()=>{if(confirm('Reset the party plan?')){localStorage.removeItem(KEY);state={info:{},checks:{},extra:[]};['kid','age','date','budget'].forEach(id=>document.getElementById(id).value='');render()}};
render();
</script>
</body>
</html>
