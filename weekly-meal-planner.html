<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Meal Planner · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
h2{font-size:1.1rem;margin:4px 0 10px}
.day{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f3f3f3}
.day:last-child{border-bottom:none}
.day .dname{width:42px;font-weight:800;color:var(--pink);flex:0 0 auto}
.day input{flex:1}
.gl{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f3f3f3}
.gl:last-child{border-bottom:none}
.gl input[type=checkbox]{width:24px;height:24px;min-height:24px;accent-color:var(--teal)}
.gl.done span{text-decoration:line-through;color:var(--muted)}
.gl span{flex:1}
.del{background:none;color:var(--muted);font-size:.8rem;padding:4px;min-height:auto}
.suggest{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.suggest button{background:#f4f4f4;color:#555;font-size:.8rem;padding:8px 10px;min-height:40px;border-radius:999px}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Weekly Meal Planner</h1>
<p class="tagline">Plan 7 easy dinners, then build your grocery list with one tap.</p>
</header>
<p class="howto">How to use this: type a dinner for each day (or tap an idea), then add ingredients to your list.</p>

<div class="card">
<h2>This week's dinners</h2>
<div id="days"></div>
<div class="suggest" id="ideas"></div>
</div>

<div class="card tint-teal">
<h2>Grocery list</h2>
<div class="row">
<input id="gAdd" placeholder="Add an item" autocomplete="off" style="flex:1;min-width:140px">
<button class="btn-secondary" id="gBtn">Add</button>
</div>
<div id="glist" style="margin-top:10px"></div>
</div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-meal-planner';
const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const IDEAS=['Tacos','Spaghetti','Sheet-pan chicken','Breakfast for dinner','Soup & grilled cheese','Stir-fry','Baked potatoes','Pasta bake','Burrito bowls','Homemade pizza'];
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{meals:DAYS.map(()=>''),groceries:[]}}catch(e){return {meals:DAYS.map(()=>''),groceries:[]}}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}

function render(){
 const days=document.getElementById('days');days.innerHTML='';
 DAYS.forEach((d,i)=>{
  const row=document.createElement('div');row.className='day';
  row.innerHTML='<span class="dname">'+d+'</span><input placeholder="What\'s for dinner?" value=""><button class="add-ing btn-ghost" style="padding:8px 10px;min-height:40px;font-size:.8rem">+ list</button>';
  const inp=row.querySelector('input');inp.value=state.meals[i]||'';
  inp.oninput=()=>{state.meals[i]=inp.value;save()};
  row.querySelector('.add-ing').onclick=()=>{
   const meal=state.meals[i].trim();if(!meal){inp.focus();return}
   addGrocery(meal);
  };
  days.appendChild(row);
 });
 const ideas=document.getElementById('ideas');ideas.innerHTML='';
 IDEAS.forEach(idea=>{
  const b=document.createElement('button');b.textContent='+ '+idea;
  b.onclick=()=>{const empty=state.meals.findIndex(m=>!m.trim());if(empty<0){alert('Your week\'s full — lovely! Clear a day to swap.');return}state.meals[empty]=idea;save();render()};
  ideas.appendChild(b);
 });
 renderGroceries();
}
function addGrocery(name){
 if(!state.groceries.some(g=>g.t.toLowerCase()===name.toLowerCase())){
  state.groceries.push({id:Date.now()+Math.floor(performance.now()),t:name,done:false});save();renderGroceries();
 }
}
document.getElementById('gBtn').onclick=()=>{const el=document.getElementById('gAdd');const v=el.value.trim();if(v){addGrocery(v);el.value=''}};
document.getElementById('gAdd').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('gBtn').click()});
function renderGroceries(){
 const gl=document.getElementById('glist');gl.innerHTML='';
 if(!state.groceries.length){gl.innerHTML='<div class="empty" style="padding:12px">Nothing on the list yet — and that\'s perfectly okay. Tap "+ list" by a meal or add your own.</div>';return}
 state.groceries.forEach(g=>{
  const r=document.createElement('label');r.className='gl'+(g.done?' done':'');
  r.innerHTML='<input type="checkbox" '+(g.done?'checked':'')+'><span></span><button class="del">✕</button>';
  r.querySelector('span').textContent=g.t;
  r.querySelector('input').onchange=e=>{g.done=e.target.checked;save();renderGroceries()};
  r.querySelector('.del').onclick=()=>{state.groceries=state.groceries.filter(x=>x.id!==g.id);save();renderGroceries()};
  gl.appendChild(r);
 });
}
document.getElementById('reset').onclick=()=>{if(confirm('Start a fresh week?')){localStorage.removeItem(KEY);state={meals:DAYS.map(()=>''),groceries:[]};render()}};
render();
</script>
</body>
</html>
