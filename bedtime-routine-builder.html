<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bedtime Routine Builder · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
h2{font-size:1.1rem;margin:4px 0 10px}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.tabs button{background:#f4f4f4;color:#666;padding:9px 14px;border-radius:999px;font-size:.85rem}
.tabs button.on{background:var(--pink);color:#fff}
.step{display:flex;align-items:center;gap:10px;padding:11px 8px;border-radius:10px;margin-bottom:6px;background:var(--pink-tint)}
.step.done{opacity:.55}
.step .n{background:var(--teal);color:#fff;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;flex:0 0 auto;font-size:.85rem}
.step .what{flex:1;font-weight:700}
.step.done .what{text-decoration:line-through}
.step input[type=checkbox]{width:26px;height:26px;min-height:26px;accent-color:var(--teal)}
.step .mv{background:rgba(0,0,0,.05);color:#666;padding:2px 8px;min-height:auto;font-size:.9rem}
.del{background:none;color:#aaa;font-size:.78rem;padding:4px;min-height:auto}
.suggest{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.suggest button{background:#f4f4f4;color:#555;font-size:.8rem;padding:8px 10px;min-height:40px;border-radius:999px}
.win{background:var(--teal-tint);border-radius:12px;padding:14px;text-align:center;font-weight:700;color:var(--teal);margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Bedtime Routine Builder</h1>
<p class="tagline">A calm, repeatable bedtime sequence for each child — same steps, smoother nights.</p>
</header>
<p class="howto">How to use this: build each child's routine once, then tick through it together every evening.</p>

<div class="card">
<div class="tabs" id="tabs"></div>
<div id="panel"></div>
</div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-bedtime';
const SUGGEST=['Bath time','Pajamas on','Brush teeth','Tidy toys','Potty','Story time','Cuddles','Lights low','Water & last hug','Quiet music'];
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{kids:[{id:1,nm:'My child',steps:['Bath time','Pajamas on','Brush teeth','Story time','Lights low'].map(t=>({t,done:false}))}],active:1}}catch(e){return {kids:[],active:null}}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}

function render(){
 const tabs=document.getElementById('tabs');tabs.innerHTML='';
 state.kids.forEach(k=>{const b=document.createElement('button');b.textContent=k.nm;if(k.id===state.active)b.classList.add('on');b.onclick=()=>{state.active=k.id;save();render()};tabs.appendChild(b)});
 const addB=document.createElement('button');addB.textContent='+ child';addB.onclick=()=>{const nm=prompt('Child\'s name?');if(nm){const id=Date.now();state.kids.push({id,nm,steps:[]});state.active=id;save();render()}};tabs.appendChild(addB);
 const panel=document.getElementById('panel');panel.innerHTML='';
 const kid=state.kids.find(k=>k.id===state.active);
 if(!kid){panel.innerHTML='<div class="empty">Add a child to build their bedtime routine. 💛</div>';return}
 kid.steps.forEach((s,i)=>{
  const el=document.createElement('label');el.className='step'+(s.done?' done':'');
  el.innerHTML='<input type="checkbox" '+(s.done?'checked':'')+'><span class="n">'+(i+1)+'</span><span class="what"></span><button class="mv up">▲</button><button class="mv dn">▼</button><button class="del">✕</button>';
  el.querySelector('.what').textContent=s.t;
  el.querySelector('input').onchange=e=>{s.done=e.target.checked;save();render()};
  el.querySelector('.up').onclick=e=>{e.preventDefault();if(i>0){[kid.steps[i-1],kid.steps[i]]=[kid.steps[i],kid.steps[i-1]];save();render()}};
  el.querySelector('.dn').onclick=e=>{e.preventDefault();if(i<kid.steps.length-1){[kid.steps[i+1],kid.steps[i]]=[kid.steps[i],kid.steps[i+1]];save();render()}};
  el.querySelector('.del').onclick=e=>{e.preventDefault();kid.steps.splice(i,1);save();render()};
  panel.appendChild(el);
 });
 if(!kid.steps.length)panel.innerHTML='<div class="empty">No steps yet — tap a suggestion below to start building '+esc(kid.nm)+'\'s routine.</div>';
 const sug=document.createElement('div');sug.className='suggest';
 SUGGEST.forEach(t=>{if(kid.steps.some(s=>s.t===t))return;const b=document.createElement('button');b.textContent='+ '+t;b.onclick=()=>{kid.steps.push({t,done:false});save();render()};sug.appendChild(b)});
 panel.appendChild(sug);
 const row=document.createElement('div');row.className='row';row.style.marginTop='10px';
 row.innerHTML='<input id="custom" placeholder="Add your own step" style="flex:1;min-width:140px"><button class="btn-secondary" id="addStep">Add</button>';
 panel.appendChild(row);
 row.querySelector('#addStep').onclick=()=>{const v=row.querySelector('#custom').value.trim();if(v){kid.steps.push({t:v,done:false});save();render()}};
 row.querySelector('#custom').addEventListener('keydown',e=>{if(e.key==='Enter')row.querySelector('#addStep').click()});
 if(kid.steps.length&&kid.steps.every(s=>s.done)){
  const w=document.createElement('div');w.className='win';w.innerHTML='🌙 '+esc(kid.nm)+' is tucked in. The day is done, and you did it beautifully.<br><button class="btn-ghost" id="resetNight" style="margin-top:8px">Reset for tomorrow night</button>';panel.appendChild(w);
  w.querySelector('#resetNight').onclick=()=>{kid.steps.forEach(s=>s.done=false);save();render()};
 }
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
document.getElementById('reset').onclick=()=>{if(confirm('Reset all routines?')){localStorage.removeItem(KEY);state=load();render()}};
render();
</script>
</body>
</html>
