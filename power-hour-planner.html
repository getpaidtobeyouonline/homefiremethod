<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Power Hour Planner · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
h2{font-size:1.05rem;margin:4px 0 10px}
.timer{font-size:2.6rem;font-weight:800;text-align:center;color:var(--teal);font-variant-numeric:tabular-nums}
.timer.low{color:var(--pink)}
.now{background:var(--pink-tint);border-radius:12px;padding:14px;text-align:center;margin-top:8px}
.now .lbl{color:#a23b73;font-weight:700;font-size:.8rem}
.now .task{font-size:1.2rem;font-weight:800;color:var(--pink)}
.task-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #f3f3f3}
.task-item:last-child{border-bottom:none}
.task-item input[type=checkbox]{width:24px;height:24px;min-height:24px;accent-color:var(--teal)}
.task-item.done span{text-decoration:line-through;color:var(--muted)}
.task-item span{flex:1}
.del{background:none;color:var(--muted);font-size:.8rem;padding:4px;min-height:auto}
.bar{height:12px;background:#eee;border-radius:999px;overflow:hidden;margin:8px 0}
.bar>i{display:block;height:100%;background:var(--teal);width:0;transition:width .3s}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Power Hour Planner</h1>
<p class="tagline">Stack a handful of small tasks into one focused, get-it-done hour.</p>
</header>
<p class="howto">How to use this: list quick tasks, start the hour, and blitz them. One focused hour beats a scattered day.</p>

<div class="card tint-teal">
<div class="timer" id="clock">60:00</div>
<div class="row" style="justify-content:center;margin-top:8px">
<button class="btn-secondary" id="start">Start power hour</button>
<button class="btn-ghost" id="pause">Pause</button>
</div>
<div class="now" id="now" style="display:none"><div class="lbl">Right now, just this one</div><div class="task" id="nowTask"></div></div>
</div>

<div class="card">
<h2>Your task stack</h2>
<div class="bar"><i id="bar"></i></div>
<div id="list"></div>
<div class="row" style="margin-top:10px">
<input id="add" placeholder="Add a quick task" autocomplete="off" style="flex:1;min-width:140px">
<button class="btn-secondary" id="addBtn">Add</button>
</div>
</div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-power-hour';
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{secs:3600,running:false,tasks:[]}}catch(e){return {secs:3600,running:false,tasks:[]}}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}

document.getElementById('addBtn').onclick=()=>{const el=document.getElementById('add');const v=el.value.trim();if(!v)return;state.tasks.push({id:Date.now(),t:v,done:false});el.value='';save();render()};
document.getElementById('add').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('addBtn').click()});
function render(){
 const list=document.getElementById('list');list.innerHTML='';
 if(!state.tasks.length)list.innerHTML='<div class="empty">No tasks yet — and that\'s perfectly okay. Add a few quick ones to stack up.</div>';
 state.tasks.forEach(t=>{
  const el=document.createElement('label');el.className='task-item'+(t.done?' done':'');
  el.innerHTML='<input type="checkbox" '+(t.done?'checked':'')+'><span></span><button class="del">✕</button>';
  el.querySelector('span').textContent=t.t;
  el.querySelector('input').onchange=e=>{t.done=e.target.checked;save();render()};
  el.querySelector('.del').onclick=()=>{state.tasks=state.tasks.filter(x=>x.id!==t.id);save();render()};
  list.appendChild(el);
 });
 const done=state.tasks.filter(t=>t.done).length;
 document.getElementById('bar').style.width=(state.tasks.length?done/state.tasks.length*100:0)+'%';
 const next=state.tasks.find(t=>!t.done);
 const now=document.getElementById('now');
 if(next&&state.running){now.style.display='block';document.getElementById('nowTask').textContent=next.t}
 else if(state.tasks.length&&!next){now.style.display='block';document.getElementById('nowTask').textContent='🎉 All done — power hour crushed!'}
 else now.style.display='none';
 renderClock();
}
let tick=null;
function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}
function renderClock(){const c=document.getElementById('clock');c.textContent=fmt(state.secs);c.classList.toggle('low',state.secs<=300)}
function start(){if(state.running)return;state.running=true;save();render();tick=setInterval(()=>{if(state.secs>0){state.secs--;renderClock();save()}else{stop()}},1000)}
function stop(){state.running=false;clearInterval(tick);save();render()}
document.getElementById('start').onclick=start;
document.getElementById('pause').onclick=stop;
document.getElementById('reset').onclick=()=>{if(confirm('Reset the power hour?')){stop();localStorage.removeItem(KEY);state={secs:3600,running:false,tasks:[]};render()}};
render();if(state.running){state.running=false;start();}
</script>
</body>
</html>
