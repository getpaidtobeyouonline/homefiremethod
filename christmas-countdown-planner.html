<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Christmas Countdown Planner · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
h2{font-size:1.05rem;margin:4px 0 10px}
.count{text-align:center;background:var(--pink-tint);border-radius:16px;padding:18px}
.count .days{font-size:2.6rem;font-weight:800;color:var(--pink);line-height:1}
.count .lbl{color:#a23b73;font-weight:700}
.task{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid #f3f3f3}
.task:last-child{border-bottom:none}
.task input[type=checkbox]{width:26px;height:26px;min-height:26px;accent-color:var(--teal)}
.task.done span{text-decoration:line-through;color:var(--muted)}
.task .day{font-weight:800;color:var(--teal);min-width:52px;font-size:.82rem}
.task span{flex:1}
.bar{height:14px;background:#eee;border-radius:999px;overflow:hidden;margin:10px 0}
.bar>i{display:block;height:100%;background:var(--teal);width:0;transition:width .3s}
.del{background:none;color:var(--muted);font-size:.78rem;padding:4px;min-height:auto}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Christmas Countdown Planner</h1>
<p class="tagline">Holiday prep, broken into one small task a day — so December feels merry, not manic.</p>
</header>
<p class="howto">How to use this: do one little task each day. The big to-do list becomes tiny, doable pieces.</p>

<div class="card count">
<div class="days" id="days">—</div>
<div class="lbl" id="lbl">until Christmas 🎄</div>
</div>

<div class="card">
<h2>One task a day</h2>
<div class="bar"><i id="bar"></i></div>
<div id="list"></div>
<div class="row" style="margin-top:10px">
<input id="add" placeholder="Add your own prep task" autocomplete="off" style="flex:1;min-width:140px">
<button class="btn-secondary" id="addBtn">Add</button>
</div>
</div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-xmas-countdown';
const DEFAULTS=['Make your gift list','Set your holiday budget','Order any online gifts early','Plan the holiday meal','Buy wrapping paper & tags','Write & send cards','Decorate the tree','Plan kids\' activities/advent','Tidy & make space for guests','Buy stocking stuffers','Wrap a few gifts','Confirm plans with family','Bake or buy treats','Plan Christmas Eve','Prep an easy back-up dinner','Charge cameras / clear phone storage','Lay out outfits','Wrap remaining gifts','Pre-cook what you can','Rest & enjoy — it\'s ready!'];
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{tasks:DEFAULTS.map(t=>({t,done:false}))}}catch(e){return {tasks:DEFAULTS.map(t=>({t,done:false}))}}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function daysToXmas(){
 const now=new Date();let y=now.getFullYear();let x=new Date(y,11,25);
 if(now>x){x=new Date(y+1,11,25)}
 return Math.ceil((x-new Date(now.getFullYear(),now.getMonth(),now.getDate()))/86400000);
}
document.getElementById('addBtn').onclick=()=>{const el=document.getElementById('add');const v=el.value.trim();if(!v)return;state.tasks.push({t:v,done:false});el.value='';save();render()};
document.getElementById('add').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('addBtn').click()});
function render(){
 const d=daysToXmas();
 document.getElementById('days').textContent=d===0?'🎄':d;
 document.getElementById('lbl').textContent=d===0?'Merry Christmas!':d+' day'+(d===1?'':'s')+' until Christmas 🎄';
 const list=document.getElementById('list');list.innerHTML='';
 state.tasks.forEach((task,i)=>{
  const l=document.createElement('label');l.className='task'+(task.done?' done':'');
  l.innerHTML='<input type="checkbox" '+(task.done?'checked':'')+'><span class="day">#'+(i+1)+'</span><span></span><button class="del">✕</button>';
  l.querySelectorAll('span')[1].textContent=task.t;
  l.querySelector('input').onchange=e=>{task.done=e.target.checked;save();render()};
  l.querySelector('.del').onclick=()=>{state.tasks.splice(i,1);save();render()};
  list.appendChild(l);
 });
 const done=state.tasks.filter(t=>t.done).length;
 document.getElementById('bar').style.width=(state.tasks.length?done/state.tasks.length*100:0)+'%';
}
document.getElementById('reset').onclick=()=>{if(confirm('Reset the countdown plan?')){localStorage.removeItem(KEY);state={tasks:DEFAULTS.map(t=>({t,done:false}))};render()}};
render();
</script>
</body>
</html>
