<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Year-Round Gift Idea Tracker · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
h2{font-size:1.05rem;margin:4px 0 10px}
.idea{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid #f3f3f3}
.idea:last-child{border-bottom:none}
.idea.got{opacity:.55}
.idea input[type=checkbox]{width:26px;height:26px;min-height:26px;accent-color:var(--teal)}
.idea .mid{flex:1}
.idea .nm{font-weight:700}
.idea.got .nm{text-decoration:line-through}
.idea .who{font-size:.8rem;color:#888}
.del{background:none;color:var(--muted);font-size:.78rem;padding:4px;min-height:auto}
.search{margin-bottom:12px}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Year-Round Gift Idea Tracker</h1>
<p class="tagline">Catch gift ideas the moment they strike — so December isn't a guessing panic.</p>
</header>
<p class="howto">How to use this: whenever someone mentions wanting something, jot it here with their name. Done shopping? Tick it.</p>

<div class="card tint-teal">
<label for="idea">Add a gift idea</label>
<input id="idea" placeholder="e.g. Cozy reading socks" autocomplete="off">
<div class="row" style="margin-top:10px">
<input id="who" placeholder="For whom?" autocomplete="off" style="flex:1;min-width:120px">
<input id="occasion" placeholder="Occasion (optional)" autocomplete="off" style="flex:1;min-width:120px">
<button class="btn-secondary" id="add">Add</button>
</div>
</div>

<div class="card">
<input class="search" id="search" placeholder="🔍 Search by name or idea" autocomplete="off">
<h2>Idea stash</h2>
<div id="list"></div>
</div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-gift-ideas';
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return []}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
document.getElementById('add').onclick=()=>{
 const i=document.getElementById('idea').value.trim();if(!i){document.getElementById('idea').focus();return}
 state.unshift({id:Date.now(),idea:i,who:document.getElementById('who').value.trim(),occasion:document.getElementById('occasion').value.trim(),got:false});
 document.getElementById('idea').value='';document.getElementById('who').value='';document.getElementById('occasion').value='';
 save();render();
};
document.getElementById('search').oninput=render;
function render(){
 const q=document.getElementById('search').value.trim().toLowerCase();
 const list=document.getElementById('list');list.innerHTML='';
 const items=state.filter(it=>!q||it.idea.toLowerCase().includes(q)||(it.who||'').toLowerCase().includes(q));
 if(!items.length){list.innerHTML='<div class="empty">'+(q?'No matches — try another search.':'Nothing here yet — and that\'s perfectly okay. Stash your first idea when inspiration hits.')+'</div>';return}
 items.forEach(it=>{
  const el=document.createElement('label');el.className='idea'+(it.got?' got':'');
  el.innerHTML='<input type="checkbox" '+(it.got?'checked':'')+'><div class="mid"><div class="nm"></div><div class="who">'+[it.who,it.occasion].filter(Boolean).map(esc).join(' · ')+'</div></div><button class="del">✕</button>';
  el.querySelector('.nm').textContent=it.idea;
  el.querySelector('input').onchange=e=>{it.got=e.target.checked;save();render()};
  el.querySelector('.del').onclick=()=>{state=state.filter(x=>x.id!==it.id);save();render()};
  list.appendChild(el);
 });
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
document.getElementById('reset').onclick=()=>{if(confirm('Clear all gift ideas?')){localStorage.removeItem(KEY);state=[];render()}};
render();
</script>
</body>
</html>
