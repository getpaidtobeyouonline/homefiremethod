<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pet Care Schedule · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.tabs button{background:#f4f4f4;color:#666;padding:9px 12px;border-radius:999px;font-size:.82rem}
.tabs button.on{background:var(--pink);color:#fff}
h2{font-size:.95rem;margin:14px 0 6px;color:var(--teal)}
.daily{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid #f3f3f3}
.daily:last-child{border-bottom:none}
.daily input[type=checkbox]{width:28px;height:28px;min-height:28px;accent-color:var(--teal)}
.daily.done span{text-decoration:line-through;color:var(--muted)}
.daily span{flex:1;font-weight:700}
.item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #f3f3f3}
.item:last-child{border-bottom:none}
.item .nm{flex:1;font-weight:700}
.item .sub{font-size:.8rem;color:#888}
.del{background:none;color:var(--muted);font-size:.78rem;padding:4px;min-height:auto}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Pet Care Schedule</h1>
<p class="tagline">Feeding, vet visits, and meds for the family pets — so every furry one is cared for.</p>
</header>
<p class="howto">How to use this: add each pet, tick off daily care, and log vet dates & meds. Resets fresh each day.</p>

<div class="card">
<div class="tabs" id="pets"></div>
<h2>Today's care</h2>
<div id="daily"></div>
<div class="row" style="margin-top:8px">
<input id="dAdd" placeholder="Add a daily task (e.g. Walk)" autocomplete="off" style="flex:1;min-width:140px">
<button class="btn-ghost" id="dBtn">Add</button>
</div>
<h2>Vet & meds</h2>
<div id="vet"></div>
<div class="row" style="margin-top:8px">
<input id="vName" placeholder="e.g. Annual checkup" autocomplete="off" style="flex:2;min-width:120px">
<input id="vDate" type="date" style="flex:1;min-width:130px">
<button class="btn-secondary" id="vBtn">Add</button>
</div>
</div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-pet-care';
const DEFAULT_DAILY=['Morning food','Fresh water','Evening food','Potty / walk'];
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||init()}catch(e){return init()}}
function init(){return {pets:[{id:1,nm:'My pet',daily:DEFAULT_DAILY.slice(),vet:[],checks:{}}],active:1,date:today()}}
function today(){return new Date().toISOString().slice(0,10)}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function pet(){return state.pets.find(p=>p.id===state.active)}
// daily reset
if(state.date!==today()){state.pets.forEach(p=>p.checks={});state.date=today();save()}
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

document.getElementById('dBtn').onclick=()=>{const p=pet();const el=document.getElementById('dAdd');const v=el.value.trim();if(v){p.daily.push(v);el.value='';save();render()}};
document.getElementById('vBtn').onclick=()=>{const p=pet();const n=document.getElementById('vName').value.trim();if(!n)return;p.vet.push({id:Date.now(),nm:n,date:document.getElementById('vDate').value});document.getElementById('vName').value='';document.getElementById('vDate').value='';save();render()};
function render(){
 const pets=document.getElementById('pets');pets.innerHTML='';
 state.pets.forEach(p=>{const b=document.createElement('button');b.textContent=p.nm;if(p.id===state.active)b.classList.add('on');b.onclick=()=>{state.active=p.id;save();render()};b.ondblclick=()=>{const n=prompt('Rename pet:',p.nm);if(n){p.nm=n;save();render()}};pets.appendChild(b)});
 const add=document.createElement('button');add.textContent='+ pet';add.onclick=()=>{const nm=prompt('Pet\'s name?');if(nm){const id=Date.now();state.pets.push({id,nm,daily:DEFAULT_DAILY.slice(),vet:[],checks:{}});state.active=id;save();render()}};pets.appendChild(add);
 const p=pet();
 const dailyEl=document.getElementById('daily');dailyEl.innerHTML='';
 p.daily.forEach((t,i)=>{
  const l=document.createElement('label');l.className='daily'+(p.checks[i]?' done':'');
  l.innerHTML='<input type="checkbox" '+(p.checks[i]?'checked':'')+'><span></span><button class="del">✕</button>';
  l.querySelector('span').textContent=t;
  l.querySelector('input').onchange=e=>{p.checks[i]=e.target.checked;if(!e.target.checked)delete p.checks[i];save();render()};
  l.querySelector('.del').onclick=ev=>{ev.preventDefault();p.daily.splice(i,1);p.checks={};save();render()};
  dailyEl.appendChild(l);
 });
 const vetEl=document.getElementById('vet');vetEl.innerHTML='';
 if(!p.vet.length)vetEl.innerHTML='<div class="empty" style="padding:10px;font-size:.9rem">No vet dates or meds logged yet.</div>';
 p.vet.slice().sort((a,b)=>(a.date||'9').localeCompare(b.date||'9')).forEach(v=>{
  const d=document.createElement('div');d.className='item';
  let sub='';if(v.date){const dt=new Date(v.date+'T00:00:00');sub=MON[dt.getMonth()]+' '+dt.getDate()+', '+dt.getFullYear()}
  d.innerHTML='<span style="font-size:1.2rem">🐾</span><div style="flex:1"><div class="nm"></div>'+(sub?'<div class="sub">'+sub+'</div>':'')+'</div><button class="del">✕</button>';
  d.querySelector('.nm').textContent=v.nm;
  d.querySelector('.del').onclick=()=>{p.vet=p.vet.filter(x=>x.id!==v.id);save();render()};
  vetEl.appendChild(d);
 });
}
document.getElementById('reset').onclick=()=>{if(confirm('Reset the whole pet schedule?')){localStorage.removeItem(KEY);state=init();render()}};
render();
</script>
</body>
</html>
