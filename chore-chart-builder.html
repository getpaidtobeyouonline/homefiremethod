<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chore Chart Builder · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
h2{font-size:1.1rem;margin:4px 0 10px}
.kid h3{margin:0;font-size:1.15rem;color:var(--pink)}
.kid .age{color:var(--teal);font-weight:700;font-size:.85rem}
.task{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #f3f3f3}
.task:last-child{border-bottom:none}
.task input[type=checkbox]{width:24px;height:24px;min-height:24px;accent-color:var(--teal)}
.task.done span{text-decoration:line-through;color:var(--muted)}
.task span{flex:1}
.suggest{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.suggest button{background:#f4f4f4;color:#444;font-size:.8rem;padding:8px 10px;min-height:40px;border-radius:999px}
.bar{height:10px;background:#eee;border-radius:999px;overflow:hidden;margin:8px 0}
.bar>i{display:block;height:100%;background:var(--teal);width:0}
.del{background:none;color:var(--muted);font-size:.8rem;padding:4px 8px;min-height:auto}
.star{color:var(--pink);font-weight:800;text-align:center;margin-top:6px}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Chore Chart Builder</h1>
<p class="tagline">Age-friendly chores for each kid — and a happy check when it's done.</p>
</header>
<p class="howto">How to use this: add each child and their age, tap a few suggested chores, and let them check off their own.</p>

<div class="card tint-pink">
<label for="kname">Add a child</label>
<div class="row">
<input id="kname" placeholder="Name" autocomplete="off" style="flex:2;min-width:120px">
<input id="kage" type="number" min="2" max="18" placeholder="Age" style="flex:1;min-width:70px">
<button class="btn-primary" id="addKid">Add</button>
</div>
</div>

<div id="kids"></div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-chores';
function suggestFor(age){
 if(age<=4)return ['Put toys in the bin','Put books on the shelf','Throw trash away','Put clothes in hamper'];
 if(age<=7)return ['Make the bed','Feed the pet','Set the table','Tidy own room','Match socks'];
 if(age<=10)return ['Take out trash','Load dishwasher','Wipe the table','Water plants','Sort laundry'];
 return ['Vacuum a room','Cook a simple meal','Mow / yard help','Fold & put away laundry','Empty dishwasher'];
}
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return []}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}

document.getElementById('addKid').onclick=()=>{
 const n=document.getElementById('kname'),a=document.getElementById('kage');
 const nm=n.value.trim(),age=parseInt(a.value,10);
 if(!nm||!age){alert('Add a name and age to get started 💛');return}
 state.push({id:Date.now(),nm,age,chores:[]});n.value='';a.value='';save();render();
};

function render(){
 const wrap=document.getElementById('kids');wrap.innerHTML='';
 if(!state.length){wrap.innerHTML='<div class="card"><div class="empty">No kids added yet — and that\'s perfectly okay.<br>Add your first when you\'re ready.</div></div>';return}
 state.forEach(kid=>{
  const c=document.createElement('div');c.className='card kid';
  let h='<div class="row" style="justify-content:space-between"><div><h3></h3><span class="age">Age '+kid.age+'</span></div><button class="del">Remove child</button></div>';
  h+='<div class="bar"><i></i></div><div class="tasklist"></div>';
  h+='<div class="suggest"></div>';
  c.innerHTML=h;
  c.querySelector('h3').textContent=kid.nm;
  const tl=c.querySelector('.tasklist');
  if(!kid.chores.length)tl.innerHTML='<div class="empty" style="padding:10px;font-size:.9rem">Pick a few chores below to start.</div>';
  kid.chores.forEach(ch=>{
   const l=document.createElement('label');l.className='task'+(ch.done?' done':'');
   l.innerHTML='<input type="checkbox" '+(ch.done?'checked':'')+'><span></span><button class="del">✕</button>';
   l.querySelector('span').textContent=ch.t;
   l.querySelector('input').onchange=e=>{ch.done=e.target.checked;save();render()};
   l.querySelector('.del').onclick=()=>{kid.chores=kid.chores.filter(x=>x!==ch);save();render()};
   tl.appendChild(l);
  });
  const done=kid.chores.filter(x=>x.done).length;
  c.querySelector('.bar>i').style.width=(kid.chores.length?done/kid.chores.length*100:0)+'%';
  if(kid.chores.length&&done===kid.chores.length){
   const s=document.createElement('div');s.className='star';s.textContent='⭐ All done, '+kid.nm+'! Way to help out.';tl.appendChild(s);
  }
  const sg=c.querySelector('.suggest');
  suggestFor(kid.age).forEach(t=>{
   if(kid.chores.some(x=>x.t===t))return;
   const b=document.createElement('button');b.textContent='+ '+t;
   b.onclick=()=>{kid.chores.push({t,done:false});save();render()};sg.appendChild(b);
  });
  c.querySelector('.row .del').onclick=()=>{if(confirm('Remove '+kid.nm+'?')){state=state.filter(k=>k.id!==kid.id);save();render()}};
  wrap.appendChild(c);
 });
}
document.getElementById('reset').onclick=()=>{if(confirm('Clear the whole chart?')){localStorage.removeItem(KEY);state=[];render()}};
render();
</script>
</body>
</html>
