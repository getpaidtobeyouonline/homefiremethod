<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thanksgiving Command Center · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
.tabs{display:flex;gap:6px;margin-bottom:12px}
.tabs button{flex:1;background:#f4f4f4;color:#666;font-size:.85rem}
.tabs button.on{background:var(--pink);color:#fff}
.item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #f3f3f3}
.item:last-child{border-bottom:none}
.item input[type=checkbox]{width:24px;height:24px;min-height:24px;accent-color:var(--teal)}
.item.done span{text-decoration:line-through;color:var(--muted)}
.item .who{flex:0 0 auto;font-size:.78rem;color:#888}
.item span.t{flex:1}
.item .time{font-weight:800;color:var(--teal);min-width:64px;font-size:.82rem}
.del{background:none;color:var(--muted);font-size:.78rem;padding:4px;min-height:auto}
h2{font-size:1.05rem;margin:4px 0 10px}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Thanksgiving Command Center</h1>
<p class="tagline">Menu, shopping, and a calm cooking timeline — your big day, all in one place.</p>
</header>
<p class="howto">How to use this: build your menu, turn it into a shopping list, and follow the timeline so nothing burns.</p>

<div class="card">
<div class="tabs" id="tabs">
<button data-t="menu" class="on">🍽️ Menu</button>
<button data-t="shop">🛒 Shopping</button>
<button data-t="timeline">⏰ Timeline</button>
</div>
<div id="panel"></div>
</div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-thanksgiving';
const TIMELINE=[
 ['Few days before','Thaw the turkey in the fridge (allow time!)'],
 ['Day before','Make pies & any cold sides'],
 ['Day before','Chop veg, prep stuffing base'],
 ['Day before','Set the table & count chairs'],
 ['Morning','Take turkey out to come to room temp'],
 ['Morning','Get the turkey in the oven'],
 ['Midday','Make sides while turkey roasts'],
 ['1 hr before','Rest the turkey, make gravy'],
 ['30 min before','Warm rolls & finish sides'],
 ['Serve','Plate up, breathe, and enjoy 💛']
];
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{tab:'menu',menu:[],shop:[],timeline:TIMELINE.map(t=>({time:t[0],t:t[1],done:false}))}}catch(e){return {tab:'menu',menu:[],shop:[],timeline:TIMELINE.map(t=>({time:t[0],t:t[1],done:false}))}}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
document.querySelectorAll('#tabs button').forEach(b=>b.onclick=()=>{state.tab=b.dataset.t;save();render()});
function render(){
 document.querySelectorAll('#tabs button').forEach(b=>b.classList.toggle('on',b.dataset.t===state.tab));
 const panel=document.getElementById('panel');panel.innerHTML='';
 if(state.tab==='menu'){
  panel.innerHTML='<h2>The menu (with who\'s bringing it)</h2>';
  listEditor(panel,state.menu,'e.g. Turkey, Mashed potatoes',true,'Nothing on the menu yet — and that\'s perfectly okay. Add dishes, and assign helpers!');
 }else if(state.tab==='shop'){
  panel.innerHTML='<h2>Shopping list</h2>';
  listEditor(panel,state.shop,'e.g. 14-lb turkey',false,'Nothing here yet — add what you need to buy.');
 }else{
  panel.innerHTML='<h2>Cooking timeline</h2>';
  state.timeline.forEach(item=>{
   const l=document.createElement('label');l.className='item'+(item.done?' done':'');
   l.innerHTML='<input type="checkbox" '+(item.done?'checked':'')+'><span class="time">'+item.time+'</span><span class="t"></span>';
   l.querySelector('.t').textContent=item.t;
   l.querySelector('input').onchange=e=>{item.done=e.target.checked;save();render()};
   panel.appendChild(l);
  });
 }
}
function listEditor(panel,arr,placeholder,withWho,emptyMsg){
 const list=document.createElement('div');
 if(!arr.length)list.innerHTML='<div class="empty">'+emptyMsg+'</div>';
 arr.forEach(it=>{
  const l=document.createElement('label');l.className='item'+(it.done?' done':'');
  l.innerHTML='<input type="checkbox" '+(it.done?'checked':'')+'><span class="t"></span>'+(withWho?'<span class="who">'+(it.who?esc(it.who):'')+'</span>':'')+'<button class="del">✕</button>';
  l.querySelector('.t').textContent=it.nm;
  l.querySelector('input').onchange=e=>{it.done=e.target.checked;save();render()};
  if(withWho)l.querySelector('.who').onclick=ev=>{ev.preventDefault();const w=prompt('Who\'s bringing/making "'+it.nm+'"?',it.who||'');if(w!==null){it.who=w;save();render()}};
  l.querySelector('.del').onclick=ev=>{ev.preventDefault();const i=arr.indexOf(it);arr.splice(i,1);save();render()};
  list.appendChild(l);
 });
 panel.appendChild(list);
 const row=document.createElement('div');row.className='row';row.style.marginTop='10px';
 row.innerHTML='<input placeholder="'+placeholder+'" style="flex:1;min-width:140px"><button class="btn-secondary">Add</button>';
 const inp=row.querySelector('input');
 const addFn=()=>{const v=inp.value.trim();if(v){arr.push({nm:v,done:false,who:''});inp.value='';save();render()}};
 row.querySelector('button').onclick=addFn;inp.addEventListener('keydown',e=>{if(e.key==='Enter')addFn()});
 panel.appendChild(row);
 if(withWho){const tip=document.createElement('p');tip.style.cssText='color:#999;font-size:.8rem;margin:8px 0 0';tip.textContent='Tip: tap the right side of a dish to assign who\'s bringing it.';panel.appendChild(tip)}
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
document.getElementById('reset').onclick=()=>{if(confirm('Reset everything?')){localStorage.removeItem(KEY);state={tab:'menu',menu:[],shop:[],timeline:TIMELINE.map(t=>({time:t[0],t:t[1],done:false}))};render()}};
render();
</script>
</body>
</html>
