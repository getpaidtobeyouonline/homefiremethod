<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Reset Checklist · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
h2{font-size:1rem;margin:14px 0 6px;color:var(--teal)}
.task{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #f3f3f3}
.task:last-child{border-bottom:none}
.task input[type=checkbox]{width:26px;height:26px;min-height:26px;accent-color:var(--teal)}
.task.done span{text-decoration:line-through;color:var(--muted)}
.task span{flex:1}
.del{background:none;color:var(--muted);font-size:.78rem;padding:4px;min-height:auto}
.bar{height:16px;background:#eee;border-radius:999px;overflow:hidden;margin:10px 0}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--teal),var(--pink));width:0;transition:width .3s}
.win{background:var(--teal-tint);border-radius:12px;padding:14px;text-align:center;font-weight:700;color:var(--teal)}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Weekly Reset Checklist</h1>
<p class="tagline">Your gentle Sunday "reset the week" mini-system — start Monday ready, not behind.</p>
</header>
<p class="howto">How to use this: work through these whenever your "reset day" lands. Skip any that don't fit — it's yours.</p>

<div class="card">
<div class="bar"><i id="bar"></i></div>
<div id="groups"></div>
<div id="win"></div>
<div class="row" style="margin-top:12px">
<input id="add" placeholder="Add your own reset task" autocomplete="off" style="flex:1;min-width:140px">
<button class="btn-secondary" id="addBtn">Add</button>
</div>
</div>

<button class="btn-ghost" id="newWeek" style="width:100%;margin-bottom:8px">Start a new week (uncheck all)</button>
<button class="btn-ghost" id="reset" style="width:100%">Reset to defaults</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-weekly-reset';
const DEFAULTS=[
 {g:'Home',items:['10-minute whole-house tidy','Wash & put away the laundry','Reset the kitchen & fridge','Take out trash & recycling','Change the bed sheets']},
 {g:'Plan',items:['Look at the week\'s calendar','Plan a few dinners','Make the grocery list','Note any bills due this week']},
 {g:'You',items:['Brain-dump anything on your mind','Pick one thing to look forward to','Restock your bag/essentials','One small act of self-care']}
];
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||fresh()}catch(e){return fresh()}}
function fresh(){return {groups:DEFAULTS.map(d=>({g:d.g,items:d.items.map(t=>({t,done:false}))})),extra:[]}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}

document.getElementById('addBtn').onclick=()=>{const el=document.getElementById('add');const v=el.value.trim();if(!v)return;state.extra.push({t:v,done:false});el.value='';save();render()};
document.getElementById('add').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('addBtn').click()});
function allItems(){let a=[];state.groups.forEach(g=>a=a.concat(g.items));a=a.concat(state.extra);return a}
function render(){
 const wrap=document.getElementById('groups');wrap.innerHTML='';
 state.groups.forEach(g=>{
  const h=document.createElement('h2');h.textContent=g.g;wrap.appendChild(h);
  g.items.forEach(it=>wrap.appendChild(taskRow(it)));
 });
 if(state.extra.length){const h=document.createElement('h2');h.textContent='Your additions';wrap.appendChild(h);state.extra.forEach((it,i)=>wrap.appendChild(taskRow(it,()=>{state.extra.splice(i,1);save();render()})))}
 const items=allItems();const done=items.filter(i=>i.done).length;
 document.getElementById('bar').style.width=(items.length?done/items.length*100:0)+'%';
 document.getElementById('win').innerHTML=done===items.length&&items.length?'<div class="win">✨ Week reset & ready. You\'ve set future-you up beautifully. Now go rest.</div>':'';
}
function taskRow(it,del){
 const el=document.createElement('label');el.className='task'+(it.done?' done':'');
 el.innerHTML='<input type="checkbox" '+(it.done?'checked':'')+'><span></span>'+(del?'<button class="del">✕</button>':'');
 el.querySelector('span').textContent=it.t;
 el.querySelector('input').onchange=e=>{it.done=e.target.checked;save();render()};
 if(del)el.querySelector('.del').onclick=del;
 return el;
}
document.getElementById('newWeek').onclick=()=>{allItems().forEach(i=>i.done=false);save();render()};
document.getElementById('reset').onclick=()=>{if(confirm('Reset the checklist to defaults?')){localStorage.removeItem(KEY);state=fresh();render()}};
render();
</script>
</body>
</html>
