<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>15-Minute Room Reset · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
.timer{font-size:3rem;font-weight:800;color:var(--teal);text-align:center;font-variant-numeric:tabular-nums}
.task{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid #f3f3f3}
.task:last-child{border-bottom:none}
.task input[type=checkbox]{width:26px;height:26px;min-height:26px;accent-color:var(--teal);flex:0 0 auto}
.task.done span{text-decoration:line-through;color:var(--muted)}
.task span{font-size:1.05rem}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.chip{background:#f4f4f4;border-radius:999px;padding:10px 14px;font-weight:700;cursor:pointer;border:2px solid transparent}
.chip[aria-pressed=true]{background:var(--pink-tint);border-color:var(--pink);color:var(--pink)}
.win{background:var(--teal-tint);border-radius:12px;padding:14px;text-align:center;font-weight:700;color:var(--teal);margin-top:10px}
.progress{height:12px;background:#eee;border-radius:999px;overflow:hidden;margin:8px 0}
.progress>i{display:block;height:100%;background:var(--teal);width:0;transition:width .3s}
h2{font-size:1.1rem;margin:4px 0 10px}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>15-Minute Room Reset</h1>
<p class="tagline">Pick a room and get a gentle, timed cleanup list — fresh every day.</p>
</header>
<p class="howto">How to use this: tap your room, press start, and just do what you can in 15 minutes.</p>

<div class="card">
<label for="room">Which room today?</label>
<div class="chips" id="rooms" role="group" aria-label="Choose a room"></div>
</div>

<div class="card tint-teal">
<div class="timer" id="clock" aria-live="polite">15:00</div>
<div class="row" style="justify-content:center;margin-top:10px">
<button class="btn-secondary" id="startBtn">Start</button>
<button class="btn-ghost" id="pauseBtn">Pause</button>
<button class="btn-ghost" id="newBtn">New list</button>
</div>
</div>

<div class="card">
<h2 id="roomTitle">Your reset list</h2>
<div class="progress"><i id="bar"></i></div>
<div id="list"></div>
<div id="win"></div>
</div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer>
<b>The Homefire Method™</b><br>Calm out of chaos.
</footer>
</div>

<script>
const KEY='hf-room-reset';
const ROOMS={
 'Kitchen':['Clear & wipe one counter','Load or empty the dishwasher','Toss anything expired','Sweep the main floor area','Wipe the table'],
 'Living room':['Gather stray cups & dishes','Fold one blanket / fluff cushions','Put away 10 stray items','Quick tidy of the coffee table','Straighten shoes by the door'],
 'Bathroom':['Wipe the sink & faucet','Swish the toilet','Refresh hand towel','Toss empty bottles','Shake out the bath mat'],
 'Bedroom':['Make the bed','Clear the nightstand','Put away clean laundry','Pop dirty clothes in the hamper','Clear one flat surface'],
 'Kids room':['Round up toys into bins','Clear books to the shelf','Dirty clothes to hamper','Clear the floor path','Tidy one drawer']
};
const names=Object.keys(ROOMS);
let state=load();

function load(){try{return JSON.parse(localStorage.getItem(KEY))||fresh()}catch(e){return fresh()}}
function fresh(){
 const day=new Date().getDate();
 const room=names[day%names.length];
 return {room, tasks:makeTasks(room), secs:900, running:false};
}
function makeTasks(room){
 // rotate the list order by day so it feels fresh
 const day=new Date().getDate();
 const base=ROOMS[room].slice();
 const rot=base.slice(day%base.length).concat(base.slice(0,day%base.length));
 return rot.map(t=>({t,done:false}));
}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}

const roomsEl=document.getElementById('rooms');
function renderRooms(){
 roomsEl.innerHTML='';
 names.forEach(n=>{
  const b=document.createElement('button');
  b.className='chip';b.textContent=n;
  b.setAttribute('aria-pressed', n===state.room);
  b.onclick=()=>{state.room=n;state.tasks=makeTasks(n);state.secs=900;state.running=false;save();renderAll()};
  roomsEl.appendChild(b);
 });
}
const listEl=document.getElementById('list');
function renderList(){
 document.getElementById('roomTitle').textContent=state.room+' reset';
 listEl.innerHTML='';
 state.tasks.forEach((task,i)=>{
  const d=document.createElement('label');
  d.className='task'+(task.done?' done':'');
  d.innerHTML='<input type="checkbox" '+(task.done?'checked':'')+'><span></span>';
  d.querySelector('span').textContent=task.t;
  d.querySelector('input').onchange=e=>{task.done=e.target.checked;save();renderList()};
  listEl.appendChild(d);
 });
 const done=state.tasks.filter(t=>t.done).length;
 document.getElementById('bar').style.width=(done/state.tasks.length*100)+'%';
 document.getElementById('win').innerHTML = done===state.tasks.length
   ? '<div class="win">✓ Every bit done — your space feels lighter already. Beautifully done.</div>'
   : (done>0?'<div class="win">✓ '+done+' done. That counts. Keep going only if you\'ve got it in you.</div>':'');
}

let tick=null;
function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}
function renderClock(){document.getElementById('clock').textContent=fmt(state.secs)}
function start(){
 if(state.running)return;
 state.running=true;save();
 tick=setInterval(()=>{
  if(state.secs>0){state.secs--;renderClock();save()}
  else{stop();document.getElementById('win').innerHTML='<div class="win">Time\'s up — and whatever you got to is enough. 💛</div>'}
 },1000);
}
function stop(){state.running=false;clearInterval(tick);save()}

document.getElementById('startBtn').onclick=start;
document.getElementById('pauseBtn').onclick=stop;
document.getElementById('newBtn').onclick=()=>{stop();state.tasks=makeTasks(state.room);state.secs=900;save();renderAll()};
document.getElementById('reset').onclick=()=>{if(confirm('Start fresh? This clears today\'s list.')){stop();localStorage.removeItem(KEY);state=fresh();renderAll()}};

function renderAll(){renderRooms();renderList();renderClock()}
renderAll();
if(state.running){state.running=false;start();}
</script>
</body>
</html>
