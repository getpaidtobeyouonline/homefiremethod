<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rainy Day Idea Jar · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
h2{font-size:1.05rem;margin:4px 0 10px}
.jar{background:var(--teal-tint);border-radius:16px;padding:26px 18px;text-align:center}
.jar .pick{font-size:1.4rem;font-weight:800;color:var(--teal);min-height:50px;display:flex;align-items:center;justify-content:center}
.chip{display:inline-flex;align-items:center;gap:6px;background:#f4f4f4;border-radius:999px;padding:6px 12px;margin:3px;font-weight:700;font-size:.85rem}
.chip button{background:none;color:#999;padding:0;min-height:auto}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Rainy Day Idea Jar</h1>
<p class="tagline">Stuck inside? Pull a slip from the jar and just go with it.</p>
</header>
<p class="howto">How to use this: tap the jar for a surprise indoor activity. Add your family's own favourites too.</p>

<div class="card jar">
<div class="pick" id="pick">Tap the jar! 🫙</div>
<button class="btn-secondary" id="draw" style="margin-top:10px">🫙 Pull an idea</button>
</div>

<div class="card">
<h2>What's in the jar</h2>
<div class="row" style="margin-bottom:10px">
<input id="add" placeholder="Add your own idea" autocomplete="off" style="flex:1;min-width:140px">
<button class="btn-ghost" id="addBtn">Add</button>
</div>
<div id="list"></div>
</div>

<button class="btn-ghost" id="reset" style="width:100%">Reset to defaults</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-rainy-jar';
const DEFAULTS=['Build a blanket fort','Have an indoor picnic','Bake cookies together','Indoor scavenger hunt','Dance party in the living room','Make paper airplanes & race them','Board game tournament','Draw a comic together','Sock puppet show','Build the tallest block tower','Movie & popcorn afternoon','Make homemade playdough','Have a "spa day" with warm towels','Read in a cosy reading nook','Indoor bowling with plastic bottles','Write & mail a letter to a relative'];
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||DEFAULTS.slice()}catch(e){return DEFAULTS.slice()}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}

document.getElementById('draw').onclick=()=>{
 if(!state.length){document.getElementById('pick').textContent='Add some ideas first 💛';return}
 const pickEl=document.getElementById('pick');
 let n=0;const iv=setInterval(()=>{pickEl.textContent=state[Math.floor(Math.random()*state.length)];n++;if(n>10)clearInterval(iv)},70);
};
document.getElementById('addBtn').onclick=()=>{const el=document.getElementById('add');const v=el.value.trim();if(v){state.push(v);el.value='';save();render()}};
document.getElementById('add').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('addBtn').click()});
function render(){
 const list=document.getElementById('list');list.innerHTML='';
 if(!state.length){list.innerHTML='<div class="empty">The jar\'s empty — and that\'s perfectly okay. Add a few ideas to fill it.</div>';return}
 state.forEach((idea,i)=>{const c=document.createElement('span');c.className='chip';c.innerHTML='<span></span><button>✕</button>';c.querySelector('span').textContent=idea;c.querySelector('button').onclick=()=>{state.splice(i,1);save();render()};list.appendChild(c)});
}
document.getElementById('reset').onclick=()=>{if(confirm('Reset to the default ideas?')){localStorage.removeItem(KEY);state=DEFAULTS.slice();document.getElementById('pick').textContent='Tap the jar! 🫙';render()}};
render();
</script>
</body>
</html>
