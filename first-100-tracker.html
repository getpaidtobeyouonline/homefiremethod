<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>First $100 Tracker · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
h2{font-size:1.05rem;margin:4px 0 10px}
.big{text-align:center}
.big .num{font-size:2.8rem;font-weight:800;color:var(--teal);line-height:1}
.big .of{color:#888;font-weight:700}
.bar{height:22px;background:#eee;border-radius:999px;overflow:hidden;margin:14px 0 4px}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--teal),var(--pink));width:0;transition:width .4s}
.entry{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f3f3f3}
.entry:last-child{border-bottom:none}
.entry .amt{font-weight:800;color:var(--teal)}
.del{background:none;color:var(--muted);font-size:.85rem;padding:4px 8px;min-height:auto}
.win{background:var(--teal-tint);border-radius:12px;padding:14px;text-align:center;font-weight:800;color:var(--teal)}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>First $100 Tracker</h1>
<p class="tagline">The hardest dollar is the first. Watch yourself climb to your first $100.</p>
</header>
<p class="howto">How to use this: log every bit you earn from your hustle. Small sales count — they all add up.</p>

<div class="card tint-teal big">
<div class="num" id="num">$0</div>
<div class="of">of your first $100</div>
<div class="bar"><i id="bar"></i></div>
<div id="msg" style="color:#1EA5B4;font-weight:700;margin-top:6px"></div>
</div>

<div class="card tint-pink">
<label for="desc">Log some income</label>
<input id="desc" placeholder="What was it? e.g. Sold a jacket" autocomplete="off">
<div class="row" style="margin-top:10px">
<input id="amt" type="number" inputmode="decimal" min="0" step="0.01" placeholder="$ amount" style="flex:1;min-width:120px">
<button class="btn-primary" id="add">Add</button>
</div>
</div>

<div class="card">
<h2>Your earnings so far</h2>
<div id="list"></div>
</div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-first-100';
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return []}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function money(n){return '$'+n.toFixed(2)}

function add(){
 const d=document.getElementById('desc'),a=document.getElementById('amt');
 const amt=parseFloat(a.value);if(!amt||amt<=0){a.focus();return}
 const wasUnder=total()<100;
 state.unshift({id:Date.now(),desc:d.value.trim()||'Income',amt});d.value='';a.value='';save();render();
 if(wasUnder&&total()>=100)setTimeout(()=>alert('🎉🎉 You hit your first $100! This is the proof: you can do this. So proud of you.'),60);
}
function total(){return state.reduce((s,e)=>s+e.amt,0)}
document.getElementById('add').onclick=add;
document.getElementById('amt').addEventListener('keydown',e=>{if(e.key==='Enter')add()});

function render(){
 const t=total();
 document.getElementById('num').textContent=money(t);
 document.getElementById('bar').style.width=Math.min(100,t)+'%';
 const msg=document.getElementById('msg');
 if(t>=100)msg.textContent='🎉 First $100 — DONE. Onwards and upwards!';
 else if(t>0)msg.textContent='$'+(100-t).toFixed(2)+' to go. You\'re on your way!';
 else msg.textContent='Every empire starts at $0. Log your first win soon.';
 const list=document.getElementById('list');list.innerHTML='';
 if(!state.length){list.innerHTML='<div class="empty">Nothing logged yet — and that\'s perfectly okay. Your first dollar is coming.</div>';return}
 state.forEach(e=>{
  const r=document.createElement('div');r.className='entry';
  r.innerHTML='<span class="d"></span><span><span class="amt">+'+money(e.amt)+'</span> <button class="del">✕</button></span>';
  r.querySelector('.d').textContent=e.desc;
  r.querySelector('.del').onclick=()=>{state=state.filter(x=>x.id!==e.id);save();render()};
  list.appendChild(r);
 });
}
document.getElementById('reset').onclick=()=>{if(confirm('Clear your earnings log?')){localStorage.removeItem(KEY);state=[];render()}};
render();
</script>
</body>
</html>
