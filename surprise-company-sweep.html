<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surprise-Company Sweep · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
.timer{font-size:3rem;font-weight:800;text-align:center;color:var(--teal);font-variant-numeric:tabular-nums}
.timer.low{color:var(--pink)}
.task{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid #f3f3f3}
.task:last-child{border-bottom:none}
.task input[type=checkbox]{width:26px;height:26px;min-height:26px;accent-color:var(--teal);flex:0 0 auto}
.task.done span{text-decoration:line-through;color:var(--muted)}
.task span{font-size:1.05rem}
.room{font-weight:800;color:var(--pink);margin:14px 0 4px}
.win{background:var(--teal-tint);border-radius:12px;padding:14px;text-align:center;font-weight:700;color:var(--teal);margin-top:10px}
h2{font-size:1.1rem;margin:4px 0 10px}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Surprise-Company Sweep</h1>
<p class="tagline">Someone's on their way? Breathe. Here's your 10-minute grab-and-clear.</p>
</header>
<p class="howto">How to use this: hit start, move room to room, and remember — they came for you, not your floors.</p>

<div class="card tint-teal">
<div class="timer" id="clock">10:00</div>
<div class="row" style="justify-content:center;margin-top:10px">
<button class="btn-secondary" id="start">Start the sweep</button>
<button class="btn-ghost" id="pause">Pause</button>
</div>
</div>

<div class="card">
<h2>Grab & clear list</h2>
<div id="list"></div>
<div id="win"></div>
</div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-company-sweep';
const PLAN=[
 {room:'Grab a basket first',items:['Carry one laundry basket — toss anything out of place into it, deal with it later']},
 {room:'Entry',items:['Line up shoes','Hang or hide stray coats']},
 {room:'Living room',items:['Clear cups & dishes','Fluff cushions, fold a throw','Stash clutter in your basket']},
 {room:'Kitchen',items:['Dishes into sink or dishwasher','Wipe the main counter','Shut cabinet doors']},
 {room:'Bathroom (guests notice this!)',items:['Wipe the sink','Fresh hand towel','Close the shower curtain']},
 {room:'Final touch',items:['Hide the basket in a bedroom','Dim lights / light a candle','Pour yourself water and smile']}
];
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{secs:600,checks:{},running:false}}catch(e){return {secs:600,checks:{},running:false}}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}

function render(){
 const el=document.getElementById('list');el.innerHTML='';
 let idx=0,total=0,done=0;
 PLAN.forEach(p=>{
  const h=document.createElement('div');h.className='room';h.textContent=p.room;el.appendChild(h);
  p.items.forEach(it=>{
   const id='i'+idx;total++;
   const checked=!!state.checks[id];if(checked)done++;
   const l=document.createElement('label');l.className='task'+(checked?' done':'');
   l.innerHTML='<input type="checkbox" '+(checked?'checked':'')+'><span></span>';
   l.querySelector('span').textContent=it;
   l.querySelector('input').onchange=e=>{state.checks[id]=e.target.checked;save();render()};
   el.appendChild(l);idx++;
  });
 });
 document.getElementById('win').innerHTML = done===total
  ? '<div class="win">✓ Swept and ready. Your home is welcoming — and so are you.</div>'
  : (done?'<div class="win">✓ '+done+' of '+total+' done. Plenty good enough for people who love you.</div>':'');
 renderClock();
}
let tick=null;
function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}
function renderClock(){const c=document.getElementById('clock');c.textContent=fmt(state.secs);c.classList.toggle('low',state.secs<=60)}
function start(){if(state.running)return;state.running=true;save();
 tick=setInterval(()=>{if(state.secs>0){state.secs--;renderClock();save()}else{stop()}},1000);}
function stop(){state.running=false;clearInterval(tick);save()}
document.getElementById('start').onclick=start;
document.getElementById('pause').onclick=stop;
document.getElementById('reset').onclick=()=>{if(confirm('Reset the sweep?')){stop();localStorage.removeItem(KEY);state={secs:600,checks:{},running:false};render()}};
render();
if(state.running){state.running=false;start();}
</script>
</body>
</html>
