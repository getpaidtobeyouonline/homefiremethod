<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aisle-Order Grocery List · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
h2{font-size:1.1rem;margin:4px 0 10px}
.aisle{margin-bottom:14px}
.aisle h3{margin:0 0 4px;color:var(--teal);font-size:1rem;display:flex;align-items:center;gap:8px}
.item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f3f3f3}
.item:last-child{border-bottom:none}
.item input[type=checkbox]{width:24px;height:24px;min-height:24px;accent-color:var(--teal)}
.item.done span{text-decoration:line-through;color:var(--muted)}
.item span{flex:1}
.del{background:none;color:var(--muted);font-size:.8rem;padding:4px;min-height:auto}
.prog{color:var(--pink);font-weight:800;text-align:center}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Aisle-Order Grocery List</h1>
<p class="tagline">Type your list any old way — it sorts itself by store aisle so you breeze through.</p>
</header>
<p class="howto">How to use this: add items as they pop into your head. We group them so you're not backtracking.</p>

<div class="card tint-teal">
<label for="add">Add to your list</label>
<div class="row">
<input id="add" placeholder="e.g. milk, apples, chicken" autocomplete="off" style="flex:1;min-width:140px">
<button class="btn-secondary" id="addBtn">Add</button>
</div>
</div>

<div class="card">
<div class="prog" id="prog"></div>
<div id="list"></div>
</div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-aisle-list';
const AISLES=[
 {n:'🥬 Produce',keys:['apple','banana','lettuce','tomato','onion','potato','carrot','spinach','berry','berries','grape','pepper','cucumber','broccoli','avocado','lemon','lime','garlic','celery','fruit','veg','salad','greens']},
 {n:'🥛 Dairy & Eggs',keys:['milk','cheese','egg','yogurt','butter','cream','sour']},
 {n:'🍞 Bakery',keys:['bread','bun','bagel','tortilla','roll','muffin','cake','pita']},
 {n:'🥩 Meat & Seafood',keys:['chicken','beef','pork','turkey','fish','salmon','shrimp','bacon','sausage','ground','steak']},
 {n:'❄️ Frozen',keys:['frozen','ice cream','pizza','fries','waffle']},
 {n:'🥫 Pantry & Canned',keys:['rice','pasta','bean','can','soup','sauce','flour','sugar','oil','cereal','oat','peanut','jam','spice','noodle','broth','tomato sauce']},
 {n:'🧴 Household & Other',keys:['paper','soap','detergent','shampoo','toothpaste','trash','diaper','wipe','foil','bag','clean']}
];
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return []}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function aisleFor(name){
 const l=name.toLowerCase();
 for(const a of AISLES){if(a.keys.some(k=>l.includes(k)))return a.n}
 return '🛒 Other';
}
document.getElementById('addBtn').onclick=()=>{
 const el=document.getElementById('add');
 el.value.split(',').forEach(part=>{const v=part.trim();if(v)state.push({id:Date.now()+Math.floor(performance.now()*1000)%100000+Math.random(),t:v,a:aisleFor(v),done:false})});
 el.value='';save();render();
};
document.getElementById('add').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('addBtn').click()});

function render(){
 const list=document.getElementById('list');list.innerHTML='';
 if(!state.length){list.innerHTML='<div class="empty">Nothing on the list yet — and that\'s perfectly okay. Add your first item when you\'re ready.</div>';document.getElementById('prog').textContent='';return}
 const order=AISLES.map(a=>a.n).concat('🛒 Other');
 const groups={};
 state.forEach(it=>{(groups[it.a]=groups[it.a]||[]).push(it)});
 order.forEach(aname=>{
  if(!groups[aname])return;
  const sec=document.createElement('div');sec.className='aisle';
  sec.innerHTML='<h3>'+aname+'</h3>';
  groups[aname].forEach(it=>{
   const r=document.createElement('label');r.className='item'+(it.done?' done':'');
   r.innerHTML='<input type="checkbox" '+(it.done?'checked':'')+'><span></span><button class="del">✕</button>';
   r.querySelector('span').textContent=it.t;
   r.querySelector('input').onchange=e=>{it.done=e.target.checked;save();render()};
   r.querySelector('.del').onclick=()=>{state=state.filter(x=>x.id!==it.id);save();render()};
   sec.appendChild(r);
  });
  list.appendChild(sec);
 });
 const done=state.filter(i=>i.done).length;
 document.getElementById('prog').textContent=done===state.length?'All checked off — nicely done! ✓':done+' of '+state.length+' in the cart';
}
document.getElementById('reset').onclick=()=>{if(confirm('Clear the whole list?')){localStorage.removeItem(KEY);state=[];render()}};
render();
</script>
</body>
</html>
