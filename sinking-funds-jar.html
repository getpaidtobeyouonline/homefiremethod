<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sinking Funds Jar · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
h2{font-size:1.1rem;margin:4px 0 10px}
.jar h3{margin:0 0 2px;font-size:1.1rem}
.jar .nums{font-weight:700;color:#666;font-size:.9rem}
.bar{height:18px;background:#f0f0f0;border-radius:999px;overflow:hidden;margin:10px 0}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--teal),var(--pink));width:0;transition:width .4s}
.jarbtns{display:flex;gap:8px;margin-top:8px}
.jarbtns button{flex:1;font-size:.85rem;padding:10px}
.full{background:var(--teal-tint);color:var(--teal);text-align:center;font-weight:800;border-radius:10px;padding:8px;margin-top:8px}
.del{background:none;color:var(--muted);font-size:.8rem;padding:4px 8px;min-height:auto}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Sinking Funds Jar</h1>
<p class="tagline">Set aside small amounts for the things you know are coming — calmly, ahead of time.</p>
</header>
<p class="howto">How to use this: make a jar with a goal, then add a little whenever you can. Watch it fill.</p>

<div class="card tint-pink">
<label for="jname">New jar</label>
<input id="jname" placeholder="e.g. Christmas, Car repairs" autocomplete="off">
<div class="row" style="margin-top:10px">
<input id="jgoal" type="number" inputmode="decimal" min="1" step="1" placeholder="Goal amount" style="flex:1;min-width:120px">
<button class="btn-primary" id="addJar">Create jar</button>
</div>
</div>

<div id="jars"></div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-sinking-funds';
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return []}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function money(n){return '$'+(n||0).toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:2})}

document.getElementById('addJar').onclick=()=>{
 const n=document.getElementById('jname'),g=document.getElementById('jgoal');
 const nm=n.value.trim(),goal=parseFloat(g.value);
 if(!nm||!goal||goal<=0){alert('Give your jar a name and a goal amount 💛');return}
 state.push({id:Date.now(),nm,goal,saved:0});n.value='';g.value='';save();render();
};
function render(){
 const wrap=document.getElementById('jars');wrap.innerHTML='';
 if(!state.length){wrap.innerHTML='<div class="card"><div class="empty">No jars yet — and that\'s perfectly okay.<br>Start one when you\'re ready, even with $5.</div></div>';return}
 state.forEach(j=>{
  const pct=Math.min(100,j.saved/j.goal*100);
  const c=document.createElement('div');c.className='card jar';
  c.innerHTML='<div class="row" style="justify-content:space-between"><h3></h3><button class="del">✕</button></div>'
   +'<div class="nums">'+money(j.saved)+' of '+money(j.goal)+' · '+Math.floor(pct)+'%</div>'
   +'<div class="bar"><i style="width:'+pct+'%"></i></div>'
   +(j.saved>=j.goal?'<div class="full">🎉 Goal reached! You planned ahead and it paid off.</div>'
     :'<div class="jarbtns"><button class="btn-secondary add5">+ $5</button><button class="btn-secondary add20">+ $20</button><button class="btn-ghost addX">+ Amount</button></div>'
     +'<div class="jarbtns"><button class="btn-ghost takeX" style="font-size:.8rem">Take some out</button></div>');
  c.querySelector('h3').textContent=j.nm;
  c.querySelector('.del').onclick=()=>{if(confirm('Remove the '+j.nm+' jar?')){state=state.filter(x=>x.id!==j.id);save();render()}};
  if(j.saved<j.goal){
   c.querySelector('.add5').onclick=()=>{j.saved+=5;save();render()};
   c.querySelector('.add20').onclick=()=>{j.saved+=20;save();render()};
   c.querySelector('.addX').onclick=()=>{const v=parseFloat(prompt('How much to add?'));if(v>0){j.saved+=v;save();render()}};
   c.querySelector('.takeX').onclick=()=>{const v=parseFloat(prompt('How much to take out? (totally fine — life happens)'));if(v>0){j.saved=Math.max(0,j.saved-v);save();render()}};
  }
  wrap.appendChild(c);
 });
}
document.getElementById('reset').onclick=()=>{if(confirm('Clear all jars?')){localStorage.removeItem(KEY);state=[];render()}};
render();
</script>
</body>
</html>
