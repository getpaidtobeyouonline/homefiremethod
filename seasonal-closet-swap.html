<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seasonal Closet Swap · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
.seasons{display:flex;gap:6px;margin-bottom:12px}
.seasons button{flex:1;background:#f4f4f4;color:#555;font-size:.85rem;padding:10px 4px}
.seasons button.on{background:var(--teal);color:#fff}
.step{display:flex;align-items:center;gap:12px;padding:13px 10px;border-radius:10px;margin-bottom:6px;background:#f7f7f7}
.step.done{background:var(--teal-tint);opacity:.7}
.step input[type=checkbox]{width:28px;height:28px;min-height:28px;accent-color:var(--teal)}
.step .n{background:var(--pink);color:#fff;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;flex:0 0 auto;font-size:.85rem}
.step .what{flex:1;font-weight:700}
.step.done .what{text-decoration:line-through;color:var(--muted)}
.bar{height:14px;background:#eee;border-radius:999px;overflow:hidden;margin:10px 0}
.bar>i{display:block;height:100%;background:var(--teal);width:0;transition:width .3s}
.win{background:var(--teal-tint);border-radius:12px;padding:14px;text-align:center;font-weight:700;color:var(--teal)}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Seasonal Closet Swap</h1>
<p class="tagline">A guided walkthrough for rotating closets each season — calm, quick, and clutter-clearing.</p>
</header>
<p class="howto">How to use this: pick the season you're moving into, then follow the steps. Tick each as you finish.</p>

<div class="card tint-pink">
<div class="seasons" id="seasons"></div>
<div style="text-align:center;font-weight:700;color:#a23b73" id="note"></div>
</div>

<div class="card">
<div class="bar"><i id="bar"></i></div>
<div id="list"></div>
<div id="win"></div>
</div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-closet-swap';
const SEASONS=['Spring','Summer','Fall','Winter'];
const NOTES={Spring:'Out with the heavy, in with the light.',Summer:'Shorts, swimwear & sandals season.',Fall:'Cosy layers coming back.',Winter:'Warm and bundled up.'};
const STEPS=[
 'Pull everything for the outgoing season from drawers & closet',
 'Try-on check: does it still fit you / the kids?',
 'Make 3 piles: keep, donate, toss',
 'Wash anything going into storage',
 'Box & label the off-season clothes',
 'Store boxes up high or under beds',
 'Bring out the incoming season\'s clothes',
 'Note any gaps to buy (and only those!)',
 'Wipe down the empty shelves/drawers',
 'Hang & fold the new season — done!'
];
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{season:guess(),checks:{}}}catch(e){return {season:'Spring',checks:{}}}}
function guess(){const m=new Date().getMonth();return m<2||m===11?'Winter':m<5?'Spring':m<8?'Summer':'Fall'}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function render(){
 const ss=document.getElementById('seasons');ss.innerHTML='';
 SEASONS.forEach(s=>{const b=document.createElement('button');b.textContent=s;if(s===state.season)b.classList.add('on');b.onclick=()=>{state.season=s;save();render()};ss.appendChild(b)});
 document.getElementById('note').textContent=NOTES[state.season];
 const ch=state.checks[state.season]||(state.checks[state.season]=STEPS.map(()=>false));
 const list=document.getElementById('list');list.innerHTML='';
 STEPS.forEach((t,i)=>{
  const l=document.createElement('label');l.className='step'+(ch[i]?' done':'');
  l.innerHTML='<input type="checkbox" '+(ch[i]?'checked':'')+'><span class="n">'+(i+1)+'</span><span class="what"></span>';
  l.querySelector('.what').textContent=t;
  l.querySelector('input').onchange=e=>{ch[i]=e.target.checked;save();render()};
  list.appendChild(l);
 });
 const done=ch.filter(Boolean).length;
 document.getElementById('bar').style.width=(done/STEPS.length*100)+'%';
 document.getElementById('win').innerHTML=done===STEPS.length?'<div class="win">✓ Closets swapped for '+state.season+'! Lighter, tidier, and ready. Beautifully done.</div>':'';
}
document.getElementById('reset').onclick=()=>{if(confirm('Reset this season\'s progress?')){localStorage.removeItem(KEY);state={season:guess(),checks:{}};render()}};
render();
</script>
</body>
</html>
