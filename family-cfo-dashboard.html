<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family CFO Dashboard · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
h2{font-size:1.1rem;margin:4px 0 10px}
.snapshot{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center}
.snapshot .b{padding:12px 6px;border-radius:12px}
.snapshot .b small{display:block;color:#666;font-weight:700;font-size:.72rem}
.snapshot .b b{font-size:1.15rem}
.in{background:var(--teal-tint)}.in b{color:var(--teal)}
.out{background:var(--pink-tint)}.out b{color:var(--pink)}
.left{background:#f4f4f4}.left b{color:#333}
.entry{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f3f3f3}
.entry:last-child{border-bottom:none}
.entry .amt{font-weight:800}
.entry .amt.plus{color:var(--teal)}.entry .amt.minus{color:var(--pink)}
.del{background:none;color:var(--muted);font-size:.85rem;padding:4px 8px;min-height:auto}
.seg{display:flex;gap:8px;margin-bottom:10px}
.seg button{flex:1;background:#f4f4f4;color:#666}
.seg button.on{background:var(--teal);color:#fff}
.note{text-align:center;font-weight:700;margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Family CFO Dashboard</h1>
<p class="tagline">A calm monthly snapshot: money in, money out, and what's left.</p>
</header>
<p class="howto">How to use this: jot down income and spending as it happens. No spreadsheets, no shame.</p>

<div class="card">
<div class="snapshot">
<div class="b in"><small>Money in</small><b id="sumIn">$0</b></div>
<div class="b out"><small>Money out</small><b id="sumOut">$0</b></div>
<div class="b left"><small>What's left</small><b id="sumLeft">$0</b></div>
</div>
<div class="note" id="note"></div>
</div>

<div class="card tint-teal">
<div class="seg" id="seg">
<button data-t="in" class="on">+ Money in</button>
<button data-t="out">– Money out</button>
</div>
<label for="desc">What's it for?</label>
<input id="desc" placeholder="e.g. Paycheck, Groceries" autocomplete="off">
<label for="amt" style="margin-top:10px">Amount</label>
<div class="row">
<input id="amt" type="number" inputmode="decimal" placeholder="0.00" min="0" step="0.01" style="flex:1">
<button class="btn-primary" id="add">Add</button>
</div>
</div>

<div class="card">
<h2>This month</h2>
<div id="list"></div>
</div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-cfo';
let type='in';
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return []}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function money(n){return (n<0?'-$':'$')+Math.abs(n).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}

document.querySelectorAll('#seg button').forEach(b=>b.onclick=()=>{
 type=b.dataset.t;document.querySelectorAll('#seg button').forEach(x=>x.classList.toggle('on',x===b));
});
function add(){
 const d=document.getElementById('desc'),a=document.getElementById('amt');
 const amt=parseFloat(a.value);if(!amt||amt<=0){a.focus();return}
 state.unshift({id:Date.now(),t:type,desc:d.value.trim()||(type==='in'?'Income':'Expense'),amt});
 d.value='';a.value='';save();render();
}
document.getElementById('add').onclick=add;
document.getElementById('amt').addEventListener('keydown',e=>{if(e.key==='Enter')add()});

function render(){
 let inSum=0,outSum=0;
 state.forEach(e=>{if(e.t==='in')inSum+=e.amt;else outSum+=e.amt});
 const left=inSum-outSum;
 document.getElementById('sumIn').textContent=money(inSum);
 document.getElementById('sumOut').textContent=money(outSum);
 document.getElementById('sumLeft').textContent=money(left);
 const note=document.getElementById('note');
 if(!state.length)note.textContent='';
 else if(left>=0)note.style.color='#1EA5B4',note.textContent='You\'ve got $'+left.toFixed(2)+' of breathing room. Nicely managed. 💛';
 else note.style.color='#F05AA5',note.textContent='A little over this month — happens to everyone. You see it, and that\'s step one.';
 const list=document.getElementById('list');list.innerHTML='';
 if(!state.length){list.innerHTML='<div class="empty">Nothing logged yet — and that\'s perfectly okay. Add your first entry when you\'re ready.</div>';return}
 state.forEach(e=>{
  const r=document.createElement('div');r.className='entry';
  r.innerHTML='<span class="d"></span><span><span class="amt '+(e.t==='in'?'plus':'minus')+'">'+(e.t==='in'?'+':'–')+money(e.amt)+'</span> <button class="del">✕</button></span>';
  r.querySelector('.d').textContent=e.desc;
  r.querySelector('.del').onclick=()=>{state=state.filter(x=>x.id!==e.id);save();render()};
  list.appendChild(r);
 });
}
document.getElementById('reset').onclick=()=>{if(confirm('Clear this month\'s entries?')){localStorage.removeItem(KEY);state=[];render()}};
render();
</script>
</body>
</html>
