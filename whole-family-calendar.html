<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whole-Family Calendar · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
h2{font-size:1.1rem;margin:4px 0 10px}
.daygroup{margin-bottom:14px}
.daygroup h3{margin:0 0 6px;color:var(--teal);font-size:.95rem;border-bottom:2px solid var(--teal-tint);padding-bottom:4px}
.ev{display:flex;align-items:center;gap:10px;padding:8px 0}
.ev .dot{width:12px;height:12px;border-radius:50%;flex:0 0 auto}
.ev .time{font-weight:800;font-size:.85rem;width:64px;flex:0 0 auto}
.ev .what{flex:1}
.ev .who{font-size:.78rem;color:#888}
.del{background:none;color:var(--muted);font-size:.78rem;padding:4px;min-height:auto}
.today-badge{background:var(--pink);color:#fff;font-size:.68rem;padding:1px 7px;border-radius:999px;font-weight:800}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Whole-Family Calendar</h1>
<p class="tagline">Everyone's events in one calm view — no more surprises or double-bookings.</p>
</header>
<p class="howto">How to use this: add who, what, and when. Events sort themselves by day automatically.</p>

<div class="card tint-teal">
<label for="what">Add an event</label>
<input id="what" placeholder="e.g. Soccer practice" autocomplete="off">
<div class="row" style="margin-top:10px">
<input id="who" placeholder="Who? (optional)" autocomplete="off" style="flex:1;min-width:110px">
<input id="date" type="date" style="flex:1;min-width:130px">
<input id="time" type="time" style="flex:1;min-width:110px">
</div>
<button class="btn-secondary" id="add" style="width:100%;margin-top:10px">Add to calendar</button>
</div>

<div class="card">
<h2>Coming up</h2>
<div id="list"></div>
</div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-family-cal';
const COLORS=['#F05AA5','#1EA5B4','#7B61FF','#F5A623','#34A853','#E0431F'];
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{events:[],people:{}}}catch(e){return {events:[],people:{}}}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function colorFor(who){
 const key=(who||'').toLowerCase()||'family';
 if(!state.people[key])state.people[key]=COLORS[Object.keys(state.people).length%COLORS.length];
 return state.people[key];
}
document.getElementById('add').onclick=()=>{
 const what=document.getElementById('what').value.trim();
 const who=document.getElementById('who').value.trim();
 const date=document.getElementById('date').value;
 const time=document.getElementById('time').value;
 if(!what||!date){alert('Add at least what and which day 💛');return}
 colorFor(who);
 state.events.push({id:Date.now(),what,who,date,time});
 document.getElementById('what').value='';document.getElementById('who').value='';document.getElementById('time').value='';
 save();render();
};
function fmtDay(d){const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString(undefined,{weekday:'long',month:'short',day:'numeric'})}
function fmtTime(t){if(!t)return 'All day';const[h,m]=t.split(':');const hh=+h%12||12;return hh+':'+m+(+h<12?'am':'pm')}
function todayStr(){return new Date().toISOString().slice(0,10)}
function render(){
 const list=document.getElementById('list');list.innerHTML='';
 const upcoming=state.events.filter(e=>e.date>=todayStr()).sort((a,b)=>(a.date+(a.time||'99')).localeCompare(b.date+(b.time||'99')));
 if(!upcoming.length){list.innerHTML='<div class="empty">Nothing coming up — and that\'s perfectly okay. A clear calendar is a gift. Add an event when you\'re ready.</div>';return}
 let curDay=null;
 upcoming.forEach(e=>{
  if(e.date!==curDay){
   curDay=e.date;
   const g=document.createElement('div');g.className='daygroup';
   g.innerHTML='<h3>'+fmtDay(e.date)+(e.date===todayStr()?' <span class="today-badge">TODAY</span>':'')+'</h3>';
   g.id='day-'+e.date;list.appendChild(g);
  }
  const g=document.getElementById('day-'+e.date);
  const row=document.createElement('div');row.className='ev';
  row.innerHTML='<span class="dot" style="background:'+colorFor(e.who)+'"></span><span class="time">'+fmtTime(e.time)+'</span><span class="what"><span class="w"></span>'+(e.who?'<span class="who"> · '+esc(e.who)+'</span>':'')+'</span><button class="del">✕</button>';
  row.querySelector('.w').textContent=e.what;
  row.querySelector('.del').onclick=()=>{state.events=state.events.filter(x=>x.id!==e.id);save();render()};
  g.appendChild(row);
 });
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
document.getElementById('date').value=todayStr();
document.getElementById('reset').onclick=()=>{if(confirm('Clear the whole calendar?')){localStorage.removeItem(KEY);state={events:[],people:{}};render()}};
render();
</script>
</body>
</html>
