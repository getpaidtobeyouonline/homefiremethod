<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tiny Habit Stacker · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
h2{font-size:1.05rem;margin:4px 0 10px}
.builder{font-size:1.05rem;line-height:2}
.builder .pill{display:inline-block;background:var(--teal-tint);color:var(--teal);border-radius:999px;padding:2px 10px;font-weight:800}
.stack{background:var(--pink-tint);border-radius:12px;padding:14px;margin-bottom:8px}
.stack .formula{font-weight:700;font-size:1.05rem}
.stack .formula b{color:var(--pink)}
.del{background:none;color:var(--muted);font-size:.78rem;padding:4px;min-height:auto;float:right}
.ideas{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.ideas button{background:#f4f4f4;color:#555;font-size:.78rem;padding:8px 10px;min-height:40px;border-radius:999px}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Tiny Habit Stacker</h1>
<p class="tagline">Glue a new little habit onto one you already do — the easiest way to make it stick.</p>
</header>
<p class="howto">How to use this: fill in "After I ___, I will ___." Anchoring to an existing habit makes the new one automatic.</p>

<div class="card tint-teal">
<label for="anchor">After I… (something you already do)</label>
<input id="anchor" placeholder="e.g. pour my morning coffee" autocomplete="off">
<div class="ideas" id="anchorIdeas"></div>
<label for="newh" style="margin-top:12px">…I will (the tiny new habit)</label>
<input id="newh" placeholder="e.g. take my vitamins" autocomplete="off">
<div class="ideas" id="habitIdeas"></div>
<button class="btn-primary" id="add" style="width:100%;margin-top:12px">Stack this habit</button>
</div>

<div class="card">
<h2>Your habit stacks</h2>
<div id="list"></div>
</div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-habit-stack';
const ANCHORS=['pour my coffee','brush my teeth','start the kettle','sit down for breakfast','buckle my seatbelt','wash my hands','turn off my alarm','close my laptop'];
const HABITS=['drink a glass of water','take 3 deep breaths','take my vitamins','write one gratitude','do 5 squats','tidy one thing','text someone I love','stretch for 30 seconds'];
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return []}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}

document.getElementById('add').onclick=()=>{
 const a=document.getElementById('anchor').value.trim(),h=document.getElementById('newh').value.trim();
 if(!a||!h){alert('Fill in both halves of the sentence 💛');return}
 state.unshift({id:Date.now(),a,h});document.getElementById('anchor').value='';document.getElementById('newh').value='';save();render();
};
function render(){
 const ai=document.getElementById('anchorIdeas');ai.innerHTML='';
 ANCHORS.forEach(t=>{const b=document.createElement('button');b.textContent=t;b.onclick=()=>{document.getElementById('anchor').value=t};ai.appendChild(b)});
 const hi=document.getElementById('habitIdeas');hi.innerHTML='';
 HABITS.forEach(t=>{const b=document.createElement('button');b.textContent=t;b.onclick=()=>{document.getElementById('newh').value=t};hi.appendChild(b)});
 const list=document.getElementById('list');list.innerHTML='';
 if(!state.length){list.innerHTML='<div class="empty">No stacks yet — and that\'s perfectly okay. Build your first one above.</div>';return}
 state.forEach(s=>{
  const d=document.createElement('div');d.className='stack';
  d.innerHTML='<button class="del">✕</button><div class="formula">After I <b></b>, I will <b></b>.</div>';
  d.querySelectorAll('b')[0].textContent=s.a;
  d.querySelectorAll('b')[1].textContent=s.h;
  d.querySelector('.del').onclick=()=>{state=state.filter(x=>x.id!==s.id);save();render()};
  list.appendChild(d);
 });
}
document.getElementById('reset').onclick=()=>{if(confirm('Clear all habit stacks?')){localStorage.removeItem(KEY);state=[];render()}};
render();
</script>
</body>
</html>
