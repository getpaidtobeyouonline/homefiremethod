<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Launch Pad · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
h2{font-size:1.1rem;margin:4px 0 10px}
.timer{font-size:2.6rem;font-weight:800;text-align:center;color:var(--teal);font-variant-numeric:tabular-nums}
.timer.low{color:var(--pink)}
.task{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid #f3f3f3}
.task:last-child{border-bottom:none}
.task input[type=checkbox]{width:28px;height:28px;min-height:28px;accent-color:var(--teal);flex:0 0 auto}
.task.done span{text-decoration:line-through;color:var(--muted)}
.task span{font-size:1.1rem;flex:1}
.del{background:none;color:var(--muted);font-size:.78rem;padding:4px;min-height:auto}
.bar{height:14px;background:#eee;border-radius:999px;overflow:hidden;margin:10px 0}
.bar>i{display:block;height:100%;background:var(--teal);width:0;transition:width .3s}
.win{background:var(--teal-tint);border-radius:12px;padding:14px;text-align:center;font-weight:700;color:var(--teal);margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Morning Launch Pad</h1>
<p class="tagline">A simple countdown checklist to get everyone out the door — calmly.</p>
</header>
<p class="howto">How to use this: set your "leave by" countdown, then tap each step as the family clears it.</p>

<div class="card tint-teal">
<div class="timer" id="clock">25:00</div>
<div class="row" style="justify-content:center;margin-top:8px">
<button class="btn-secondary" id="start">Start countdown</button>
<button class="btn-ghost" id="pause">Pause</button>
<button class="btn-ghost" id="setBtn">Set time</button>
</div>
</div>

<div class="card">
<h2>Out-the-door checklist</h2>
<div class="bar"><i id="bar"></i></div>
<div id="list"></div>
<div id="win"></div>
<div class="row" style="margin-top:12px">
<input id="add" placeholder="Add a step" autocomplete="off" style="flex:1;min-width:140px">
<button class="btn-ghost" id="addBtn">Add</button>
</div>
</div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-launch-pad';
const DEFAULTS=['Breakfast eaten','Teeth brushed','Dressed & shoes on','Backpacks packed','Lunches in bags','Water bottles filled','Coats & weather check','Everyone potty break'];
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{secs:1500,total:1500,tasks:DEFAULTS.map(t=>({t,done:false}))}}catch(e){return {secs:1500,total:1500,tasks:[]}}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}

function render(){
 const list=document.getElementById('list');list.innerHTML='';
 state.tasks.forEach(task=>{
  const l=document.createElement('label');l.className='task'+(task.done?' done':'');
  l.innerHTML='<input type="checkbox" '+(task.done?'checked':'')+'><span></span><button class="del">✕</button>';
  l.querySelector('span').textContent=task.t;
  l.querySelector('input').onchange=e=>{task.done=e.target.checked;save();render()};
  l.querySelector('.del').onclick=()=>{state.tasks=state.tasks.filter(x=>x!==task);save();render()};
  list.appendChild(l);
 });
 const done=state.tasks.filter(t=>t.done).length;
 document.getElementById('bar').style.width=(state.tasks.length?done/state.tasks.length*100:0)+'%';
 document.getElementById('win').innerHTML = state.tasks.length&&done===state.tasks.length
  ? '<div class="win">✓ Everyone\'s ready! However the morning went, you got them out the door. That\'s a win.</div>' : '';
 renderClock();
}
let tick=null;
function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}
function renderClock(){const c=document.getElementById('clock');c.textContent=fmt(state.secs);c.classList.toggle('low',state.secs<=120)}
function start(){if(state.running)return;state.running=true;save();tick=setInterval(()=>{if(state.secs>0){state.secs--;renderClock();save()}else{stop();document.getElementById('win').innerHTML='<div class="win">Time to roll — whatever\'s done is done. You\'ve got this. 💛</div>'}},1000)}
function stop(){state.running=false;clearInterval(tick);save()}
document.getElementById('start').onclick=start;
document.getElementById('pause').onclick=stop;
document.getElementById('setBtn').onclick=()=>{const m=parseInt(prompt('How many minutes until you leave?',Math.round(state.total/60)),10);if(m>0){stop();state.total=state.secs=m*60;save();renderClock()}};
document.getElementById('addBtn').onclick=()=>{const el=document.getElementById('add');const v=el.value.trim();if(v){state.tasks.push({t:v,done:false});el.value='';save();render()}};
document.getElementById('add').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('addBtn').click()});
document.getElementById('reset').onclick=()=>{if(confirm('Reset the morning checklist?')){stop();localStorage.removeItem(KEY);state={secs:1500,total:1500,tasks:DEFAULTS.map(t=>({t,done:false}))};render()}};
render();
if(state.running){state.running=false;start();}
</script>
</body>
</html>
