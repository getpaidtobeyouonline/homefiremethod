<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Bucket List · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
h2{font-size:1.05rem;margin:4px 0 10px}
.seasons{display:flex;gap:6px;margin-bottom:12px}
.seasons button{flex:1;background:#f4f4f4;color:#555;font-size:.85rem;padding:10px 4px}
.seasons button.on{background:var(--pink);color:#fff}
.item{display:flex;align-items:center;gap:12px;padding:11px 4px;border-bottom:1px solid #f3f3f3}
.item:last-child{border-bottom:none}
.item input[type=checkbox]{width:26px;height:26px;min-height:26px;accent-color:var(--teal)}
.item.done span{text-decoration:line-through;color:var(--muted)}
.item span{flex:1}
.del{background:none;color:var(--muted);font-size:.78rem;padding:4px;min-height:auto}
.bar{height:12px;background:#eee;border-radius:999px;overflow:hidden;margin:8px 0}
.bar>i{display:block;height:100%;background:var(--teal);width:0;transition:width .3s}
.prog{text-align:center;color:var(--teal);font-weight:800}
.ideas{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.ideas button{background:#f4f4f4;color:#555;font-size:.8rem;padding:8px 10px;min-height:40px;border-radius:999px}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Family Bucket List</h1>
<p class="tagline">Dream up cheap little adventures by season — then check them off together.</p>
</header>
<p class="howto">How to use this: pick a season, add the things you'd love to do, and celebrate each one you complete.</p>

<div class="card tint-teal">
<div class="seasons" id="seasons"></div>
<div class="row">
<input id="add" placeholder="Add an adventure" autocomplete="off" style="flex:1;min-width:140px">
<button class="btn-secondary" id="addBtn">Add</button>
</div>
<div class="ideas" id="ideas"></div>
</div>

<div class="card">
<div class="prog" id="prog"></div>
<div class="bar"><i id="bar"></i></div>
<div id="list"></div>
</div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-bucket';
const SEASONS=['Spring','Summer','Fall','Winter'];
const IDEAS={
 Spring:['Fly a kite','Plant a seed','Jump in puddles','Picnic in the park','Visit a farm'],
 Summer:['Catch fireflies','Run through sprinklers','Make popsicles','Stargaze','Beach or lake day'],
 Fall:['Jump in leaf piles','Visit a pumpkin patch','Make caramel apples','Nature walk','Bonfire & s\'mores'],
 Winter:['Build a snowman','Hot cocoa night','Make paper snowflakes','Drive to see lights','Indoor camping']
};
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{season:guess(),items:{}}}catch(e){return {season:'Spring',items:{}}}}
function guess(){const m=new Date().getMonth();return m<2||m===11?'Winter':m<5?'Spring':m<8?'Summer':'Fall'}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}

function curItems(){return state.items[state.season]||(state.items[state.season]=[])}
function add(t){if(!t)return;curItems().push({t,done:false});save();render()}
document.getElementById('addBtn').onclick=()=>{const el=document.getElementById('add');add(el.value.trim());el.value=''};
document.getElementById('add').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('addBtn').click()});
function render(){
 const ss=document.getElementById('seasons');ss.innerHTML='';
 SEASONS.forEach(s=>{const b=document.createElement('button');b.textContent=s;if(s===state.season)b.classList.add('on');b.onclick=()=>{state.season=s;save();render()};ss.appendChild(b)});
 const ideas=document.getElementById('ideas');ideas.innerHTML='';
 IDEAS[state.season].forEach(t=>{if(curItems().some(i=>i.t===t))return;const b=document.createElement('button');b.textContent='+ '+t;b.onclick=()=>add(t);ideas.appendChild(b)});
 const list=document.getElementById('list');list.innerHTML='';
 const items=curItems();
 if(!items.length){list.innerHTML='<div class="empty">Nothing on the list for '+state.season+' yet — and that\'s perfectly okay. Add a dream or two.</div>';}
 items.forEach(it=>{
  const l=document.createElement('label');l.className='item'+(it.done?' done':'');
  l.innerHTML='<input type="checkbox" '+(it.done?'checked':'')+'><span></span><button class="del">✕</button>';
  l.querySelector('span').textContent=it.t;
  l.querySelector('input').onchange=e=>{it.done=e.target.checked;save();render();if(e.target.checked)setTimeout(()=>{},0)};
  l.querySelector('.del').onclick=()=>{const i=items.indexOf(it);items.splice(i,1);save();render()};
  list.appendChild(l);
 });
 const done=items.filter(i=>i.done).length;
 document.getElementById('bar').style.width=(items.length?done/items.length*100:0)+'%';
 document.getElementById('prog').textContent=items.length?(done+' of '+items.length+' adventures done this '+state.season.toLowerCase()):'';
}
document.getElementById('reset').onclick=()=>{if(confirm('Clear the whole bucket list?')){localStorage.removeItem(KEY);state={season:guess(),items:{}};render()}};
render();
</script>
</body>
</html>
