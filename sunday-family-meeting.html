<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sunday Family Meeting · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
h2{font-size:1.05rem;margin:0 0 4px;color:var(--pink)}
.agenda{margin-bottom:14px}
.agenda .desc{font-size:.85rem;color:#888;margin-bottom:8px}
.agenda textarea{min-height:70px;resize:vertical}
.step{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.step .ico{font-size:1.3rem}
.done-chk{display:flex;align-items:center;gap:8px;font-weight:700;color:var(--teal)}
.done-chk input{width:24px;height:24px;min-height:24px;accent-color:var(--teal)}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Sunday Family Meeting</h1>
<p class="tagline">A gentle 15-minute huddle to plan the week together — connection, not a lecture.</p>
</header>
<p class="howto">How to use this: gather everyone, work down the friendly agenda, and jot notes as you go.</p>

<div id="sections"></div>

<button class="btn-ghost" id="reset" style="width:100%">Clear notes / Start fresh</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-family-meeting';
const SECTIONS=[
 {k:'wins',ico:'🎉',h:'Wins from last week',desc:'Go around and share one good thing each. Start positive.'},
 {k:'calendar',ico:'📅',h:'What\'s happening this week',desc:'Practices, appointments, events, who needs rides.'},
 {k:'meals',ico:'🍽️',h:'Meals & helpers',desc:'Rough dinner plan and who\'s helping with what.'},
 {k:'jobs',ico:'🧹',h:'Family jobs',desc:'Any chores or projects to share out this week.'},
 {k:'fun',ico:'🎈',h:'Something to look forward to',desc:'Pick one fun thing — big or tiny — for the week.'},
 {k:'concerns',ico:'💬',h:'Anything on anyone\'s mind',desc:'Open floor. Everyone gets a turn, no judgment.'}
];
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{notes:{},done:false}}catch(e){return {notes:{},done:false}}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}

function render(){
 const wrap=document.getElementById('sections');wrap.innerHTML='';
 SECTIONS.forEach(s=>{
  const c=document.createElement('div');c.className='card agenda';
  c.innerHTML='<div class="step"><span class="ico">'+s.ico+'</span><h2>'+s.h+'</h2></div><div class="desc">'+s.desc+'</div><textarea placeholder="Jot notes here (optional)"></textarea>';
  const ta=c.querySelector('textarea');ta.value=state.notes[s.k]||'';
  ta.oninput=()=>{state.notes[s.k]=ta.value;save()};
  wrap.appendChild(c);
 });
 const fin=document.createElement('div');fin.className='card tint-teal';
 fin.innerHTML='<label class="done-chk"><input type="checkbox" '+(state.done?'checked':'')+'> We had our family meeting this week ✓</label>'
  +(state.done?'<div style="margin-top:8px;font-weight:700;color:var(--teal)">Lovely. Showing up together is the whole point — perfectly imperfect counts. 💛</div>':'');
 fin.querySelector('input').onchange=e=>{state.done=e.target.checked;save();render()};
 wrap.appendChild(fin);
}
document.getElementById('reset').onclick=()=>{if(confirm('Clear notes for a fresh week?')){localStorage.removeItem(KEY);state={notes:{},done:false};render()}};
render();
</script>
</body>
</html>
