<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Income Goal Thermometer · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
h2{font-size:1.05rem;margin:4px 0 10px}
.thermo{display:flex;gap:18px;align-items:flex-end;justify-content:center;padding:10px 0}
.tube{width:54px;height:240px;background:#eee;border-radius:30px;position:relative;overflow:hidden;border:3px solid #ddd}
.fill{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(0deg,var(--pink),var(--teal));border-radius:0 0 26px 26px;transition:height .5s}
.bulb{width:70px;height:70px;border-radius:50%;background:var(--pink);margin:-20px auto 0;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:1.3rem;border:3px solid #ddd;position:relative;z-index:2}
.readout{text-align:center}
.readout .num{font-size:2rem;font-weight:800;color:var(--teal)}
.readout .of{color:#888;font-weight:700}
.readout .pct{color:var(--pink);font-weight:800}
.msg{text-align:center;font-weight:700;color:#1EA5B4;margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Income Goal Thermometer</h1>
<p class="tagline">Set a monthly goal and watch it fill up — a satisfying picture of your progress.</p>
</header>
<p class="howto">How to use this: set your goal, then add income as it comes in. The thermometer rises with you.</p>

<div class="card tint-pink">
<label for="goal">Monthly income goal</label>
<input id="goal" type="number" inputmode="decimal" min="1" placeholder="e.g. 500">
</div>

<div class="card">
<div class="thermo">
<div style="display:flex;flex-direction:column;align-items:center">
<div class="tube"><div class="fill" id="fill"></div></div>
<div class="bulb" id="bulb">$</div>
</div>
<div class="readout">
<div class="num" id="num">$0</div>
<div class="of">of <span id="goalTxt">$0</span></div>
<div class="pct" id="pct">0%</div>
</div>
</div>
<div class="msg" id="msg"></div>
</div>

<div class="card tint-teal">
<label for="amt">Add income</label>
<div class="row">
<input id="amt" type="number" inputmode="decimal" min="0" step="0.01" placeholder="$ amount" style="flex:1;min-width:120px">
<button class="btn-secondary" id="add">Add</button>
</div>
<div style="text-align:right;margin-top:8px"><button class="btn-ghost" id="undo" style="font-size:.85rem;padding:8px 12px;min-height:auto">Undo last</button></div>
</div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-thermometer';
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{goal:500,entries:[]}}catch(e){return {goal:500,entries:[]}}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function money(n){return '$'+(n||0).toLocaleString(undefined,{maximumFractionDigits:2})}

const goal=document.getElementById('goal');goal.value=state.goal||'';
goal.oninput=()=>{state.goal=parseFloat(goal.value)||0;save();render()};
document.getElementById('add').onclick=()=>{const a=document.getElementById('amt');const v=parseFloat(a.value);if(!v||v<=0){a.focus();return}const was=total();state.entries.push(v);a.value='';save();render();if(was<state.goal&&total()>=state.goal)setTimeout(()=>alert('🎉 GOAL REACHED! You set a target and you hit it. That\'s entrepreneur energy.'),60)};
document.getElementById('amt').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('add').click()});
document.getElementById('undo').onclick=()=>{state.entries.pop();save();render()};
function total(){return state.entries.reduce((a,b)=>a+b,0)}
function render(){
 const t=total();const g=state.goal||0;
 const pct=g?Math.min(100,t/g*100):0;
 document.getElementById('fill').style.height=pct+'%';
 document.getElementById('num').textContent=money(t);
 document.getElementById('goalTxt').textContent=money(g);
 document.getElementById('pct').textContent=Math.round(pct)+'%';
 const msg=document.getElementById('msg');
 if(!g)msg.textContent='Set a goal above to begin.';
 else if(t>=g)msg.textContent='🎉 You did it — goal complete!';
 else if(pct>=50)msg.textContent='Over halfway! Keep that momentum going.';
 else if(t>0)msg.textContent='Off to a real start. Every bit counts.';
 else msg.textContent='The thermometer\'s ready when you are. 💛';
}
document.getElementById('reset').onclick=()=>{if(confirm('Reset for a new month?')){state.entries=[];save();render()}};
render();
</script>
</body>
</html>
