<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grocery Price Book · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
h2{font-size:1.1rem;margin:4px 0 10px}
.prod{padding:12px 0;border-bottom:1px solid #f3f3f3}
.prod:last-child{border-bottom:none}
.prod .top{display:flex;justify-content:space-between;align-items:baseline}
.prod .nm{font-weight:800;font-size:1.05rem}
.prod .best{color:var(--teal);font-weight:800}
.prod .where{color:#888;font-size:.82rem}
.entries{margin-top:6px;font-size:.85rem;color:#666}
.entries .e{display:flex;justify-content:space-between;padding:3px 0}
.entries .e.low{color:var(--teal);font-weight:800}
.addLog{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.addLog input{flex:1;min-width:70px;padding:9px}
.addLog button{padding:9px 12px;min-height:40px;font-size:.85rem}
.del{background:none;color:var(--muted);font-size:.78rem;padding:4px;min-height:auto}
.deal{background:var(--teal-tint);color:var(--teal);font-weight:800;font-size:.72rem;padding:2px 8px;border-radius:999px}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Grocery Price Book</h1>
<p class="tagline">Remember the lowest price you've paid — so you always know a real deal.</p>
</header>
<p class="howto">How to use this: add the things you buy often, then log prices as you shop. We track the best.</p>

<div class="card tint-teal">
<label for="pname">Add a product</label>
<div class="row">
<input id="pname" placeholder="e.g. Milk (gallon)" autocomplete="off" style="flex:1;min-width:140px">
<button class="btn-secondary" id="add">Add</button>
</div>
</div>

<div class="card">
<h2>Your price book</h2>
<div id="list"></div>
</div>

<button class="btn-ghost" id="reset" style="width:100%">Reset / Start over</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-price-book';
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return []}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function money(n){return '$'+n.toFixed(2)}

document.getElementById('add').onclick=()=>{const el=document.getElementById('pname');const v=el.value.trim();if(!v)return;state.unshift({id:Date.now(),nm:v,logs:[]});el.value='';save();render()};
document.getElementById('pname').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('add').click()});

function render(){
 const list=document.getElementById('list');list.innerHTML='';
 if(!state.length){list.innerHTML='<div class="empty">Nothing tracked yet — and that\'s perfectly okay. Add a product you buy often.</div>';return}
 state.forEach(p=>{
  const best=p.logs.length?Math.min(...p.logs.map(l=>l.price)):null;
  const bestLog=p.logs.find(l=>l.price===best);
  const d=document.createElement('div');d.className='prod';
  let h='<div class="top"><span class="nm"></span>'+(best!==null?'<span class="best">Best: '+money(best)+'</span>':'<span class="where">no prices yet</span>')+'</div>';
  if(bestLog&&bestLog.store)h+='<div class="where">cheapest at '+esc(bestLog.store)+'</div>';
  if(p.logs.length){
   h+='<div class="entries">';
   p.logs.slice().sort((a,b)=>a.price-b.price).forEach(l=>{h+='<div class="e'+(l.price===best?' low':'')+'"><span>'+(l.store?esc(l.store):'(store)')+(l.price===best?' <span class="deal">lowest</span>':'')+'</span><span>'+money(l.price)+'</span></div>'});
   h+='</div>';
  }
  h+='<div class="addLog"><input class="lp" type="number" inputmode="decimal" min="0" step="0.01" placeholder="$ price"><input class="ls" placeholder="Store (optional)"><button class="btn-ghost logbtn">Log</button></div>';
  h+='<div style="text-align:right"><button class="del">remove product</button></div>';
  d.innerHTML=h;
  d.querySelector('.nm').textContent=p.nm;
  d.querySelector('.logbtn').onclick=()=>{
   const price=parseFloat(d.querySelector('.lp').value);if(!price||price<=0)return;
   const store=d.querySelector('.ls').value.trim();
   const wasBest=best;
   p.logs.push({price,store});save();render();
   if(wasBest!==null&&price<wasBest)setTimeout(()=>alert('🎉 New lowest price! That\'s a real deal — stock up if it keeps.'),50);
  };
  d.querySelector('.del').onclick=()=>{state=state.filter(x=>x.id!==p.id);save();render()};
  list.appendChild(d);
 });
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
document.getElementById('reset').onclick=()=>{if(confirm('Clear your price book?')){localStorage.removeItem(KEY);state=[];render()}};
render();
</script>
</body>
</html>
