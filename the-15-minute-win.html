<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The 15-Minute Win · The Homefire Method™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#F05AA5;--teal:#1EA5B4;--ink:#000;--muted:#999;--pink-tint:#FDE8F2;--teal-tint:#E3F5F7;--radius:14px}
*{box-sizing:border-box}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#fff;margin:0;line-height:1.5;-webkit-text-size-adjust:100%}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header h1{color:var(--pink);font-size:1.6rem;margin:0 0 6px;font-weight:800}
.tagline{margin:0 0 4px;font-size:1rem}
.howto{color:var(--teal);font-size:.9rem;margin:0 0 20px;font-weight:700}
.card{background:#fff;border:1px solid #f0f0f0;border-radius:var(--radius);box-shadow:0 4px 14px rgba(0,0,0,.05);padding:16px;margin-bottom:14px}
.tint-pink{background:var(--pink-tint);border-color:#f9d6e6}
.tint-teal{background:var(--teal-tint);border-color:#cfeef1}
button,.btn{font-family:inherit;font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:12px 18px;min-height:44px;cursor:pointer}
.btn-primary{background:var(--pink);color:#fff}
.btn-secondary{background:var(--teal);color:#fff}
.btn-ghost{background:#f4f4f4;color:#333}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:12px;border:2px solid #eee;border-radius:12px;min-height:44px;background:#fff;color:var(--ink)}
label{font-weight:700;display:block;margin-bottom:6px}
.empty{color:var(--muted);text-align:center;padding:24px 10px}
footer{margin-top:40px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}
.areas{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.areas button{flex:1;min-width:90px;background:#f4f4f4;color:#555;font-size:.85rem}
.areas button.on{background:var(--teal);color:#fff}
.task{background:var(--pink-tint);border-radius:14px;padding:20px;text-align:center;font-size:1.25rem;font-weight:800;color:var(--pink);min-height:80px;display:flex;align-items:center;justify-content:center}
.timer{font-size:3rem;font-weight:800;text-align:center;color:var(--teal);font-variant-numeric:tabular-nums}
.timer.low{color:var(--pink)}
.win{background:var(--teal-tint);border-radius:12px;padding:14px;text-align:center;font-weight:700;color:var(--teal)}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>The 15-Minute Win</h1>
<p class="tagline">Pick one area, get one focused task, set the timer — and feel accomplished.</p>
</header>
<p class="howto">How to use this: choose an area, tap for a task, start 15 minutes, and stop when it dings. Done is the win.</p>

<div class="card tint-teal">
<label>Where do you want a quick win?</label>
<div class="areas" id="areas"></div>
<button class="btn-secondary" id="pick" style="width:100%">🎯 Give me a 15-min task</button>
</div>

<div class="card task" id="task">Pick an area and tap above ✨</div>

<div class="card tint-pink">
<div class="timer" id="clock">15:00</div>
<div class="row" style="justify-content:center;margin-top:8px">
<button class="btn-primary" id="start">Start 15 min</button>
<button class="btn-ghost" id="pause">Pause</button>
</div>
<div id="win" style="margin-top:10px"></div>
</div>

<button class="btn-ghost" id="reset" style="width:100%">Reset</button>

<footer><b>The Homefire Method™</b><br>Calm out of chaos.</footer>
</div>

<script>
const KEY='hf-15-win';
const AREAS={
 Kitchen:['Clear and wipe all the counters','Empty the dishwasher','Tackle the pile by the sink','Wipe down the fridge front & handles','Clear out one shelf of old food'],
 Bedroom:['Make the bed & clear nightstands','Put away the clean laundry pile','Clear one flat surface fully','Sort the floor "chair pile"','Tidy your sock/underwear drawer'],
 Paperwork:['Sort today\'s mail & recycle junk','Clear the paper pile on the counter','File or photograph 5 documents','Empty your email for 15 min','Pay one bill & note the next'],
 Kids:['Round up & sort the toys','Clear out one outgrown clothing bin','Tidy the craft/art supplies','Pack tomorrow\'s bags','Sort the kids\' shoe pile'],
 Bathroom:['Wipe sink, faucet & mirror','Swish the toilet & wipe the seat','Toss empties & expired items','Refresh towels & restock TP','Tidy the cabinet shelf'],
 'You':['Reply to messages you\'ve put off','Stretch & drink a big glass of water','Plan tomorrow in 3 bullet points','Tidy your phone — delete 15 photos','Sit quietly with a warm drink']
};
const names=Object.keys(AREAS);
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{area:names[0],secs:900,running:false}}catch(e){return {area:names[0],secs:900,running:false}}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}

function renderAreas(){
 const a=document.getElementById('areas');a.innerHTML='';
 names.forEach(n=>{const b=document.createElement('button');b.textContent=n;if(n===state.area)b.classList.add('on');b.onclick=()=>{state.area=n;save();renderAreas()};a.appendChild(b)});
}
document.getElementById('pick').onclick=()=>{
 const list=AREAS[state.area];const t=list[Math.floor(Math.random()*list.length)];
 document.getElementById('task').textContent=t;
};
let tick=null;
function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}
function renderClock(){const c=document.getElementById('clock');c.textContent=fmt(state.secs);c.classList.toggle('low',state.secs<=60)}
function start(){if(state.running)return;state.running=true;save();tick=setInterval(()=>{if(state.secs>0){state.secs--;renderClock();save()}else{stop();document.getElementById('win').innerHTML='<div class="win">🎉 Time! You did a focused 15 minutes — that\'s a real win. Go you.</div>'}},1000)}
function stop(){state.running=false;clearInterval(tick);save()}
document.getElementById('start').onclick=start;
document.getElementById('pause').onclick=stop;
document.getElementById('reset').onclick=()=>{stop();state={area:names[0],secs:900,running:false};save();renderAreas();renderClock();document.getElementById('task').textContent='Pick an area and tap above ✨';document.getElementById('win').innerHTML=''};
renderAreas();renderClock();if(state.running){state.running=false;start();}
</script>
</body>
</html>
